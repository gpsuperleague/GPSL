  window.CURRENT_PAGE = "playoffs";

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playoffs — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="competition_themes.css">
  <style>
    body { background: #111; color: #ddd; font-family: Arial, sans-serif; margin: 0; }
    .page-container { width: 95%; max-width: 1100px; margin: 20px auto 40px; }
    h1 { color: #ff9900; margin-bottom: 8px; }
    .meta { color: #aaa; margin-bottom: 16px; font-size: 14px; }
    .banner {
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 20px; line-height: 1.45;
    }
    .banner.warn { border-color: #665533; color: #fc9; }
    .section { margin-bottom: 28px; }
    .section h2 {
      color: #ff9900; font-size: 18px; margin: 0 0 12px;
      border-bottom: 1px solid #333; padding-bottom: 8px;
    }
    .tie {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px 14px;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .tie.mine { border-color: #ff9900; box-shadow: inset 3px 0 0 #ff9900; }
    .tie .label { grid-column: 1 / -1; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .tie .club { font-size: 15px; }
    .tie .club.winner { color: #9d9; font-weight: bold; }
    .tie .score {
      text-align: center; font-family: Consolas, monospace; font-size: 18px; color: #fff;
      min-width: 72px;
    }
    .tie .status { grid-column: 1 / -1; font-size: 13px; color: #999; }
    .tie a { color: #ff9900; }
    .tbd { color: #666; font-style: italic; }
    .movements { width: 100%; border-collapse: collapse; font-size: 13px; }
    .movements th, .movements td {
      border-bottom: 1px solid #333; padding: 8px 10px; text-align: left;
    }
    .movements th { color: #ff9900; font-size: 12px; text-transform: uppercase; }
    .admin-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    button.button {
      background: #ff9900; color: #111; border: 0; border-radius: 4px;
      padding: 8px 14px; font-weight: bold; cursor: pointer;
    }
    button.button.secondary { background: #444; color: #ddd; }
    #statusLine { margin-top: 10px; font-size: 13px; color: #aaa; }
    #statusLine.err { color: #f88; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Playoffs</h1>
    <p id="meta" class="meta">Loading…</p>
    <div id="banner"></div>
    <div id="root"></div>
    <div id="adminBox" class="section" style="display:none">
      <h2>Admin</h2>
      <div class="admin-row">
        <button type="button" id="genBtn" class="button">Generate / refresh brackets</button>
        <button type="button" id="forceBtn" class="button secondary">Force regenerate</button>
        <button type="button" id="applyBtn" class="button secondary">Apply movements</button>
      </div>
      <div id="statusLine"></div>
    </div>
  </div>
  <script type="module" src="playoffs.js?v=20260718-ph7"></script>
</body>
</html>
