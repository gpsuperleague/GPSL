<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Season club purchases — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    h1 {
      background: #222;
      color: #ff9900;
      padding: 10px 16px;
      border-radius: 6px;
      width: fit-content;
      margin: 20px auto 12px;
      font-size: 26px;
    }

    #nav {
      text-align: center;
      margin-bottom: 16px;
    }

    a.button, button.button {
      display: inline-block;
      padding: 8px 16px;
      background: #1a1a1a;
      color: #ff9900;
      border: 1px solid #666;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    a.button:hover, button.button:hover {
      background: #222;
      transform: scale(1.05);
    }

    .page-wrap {
      width: 92%;
      max-width: 1220px;
      margin: 0 auto 40px;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin: 0 0 16px;
      line-height: 1.5;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #bbb;
    }

    .summary strong {
      color: #ff9900;
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #1a1a1a;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      vertical-align: middle;
    }

    table.gpsl-table tr:nth-child(even) {
      background: #161616;
    }

    table.gpsl-table tfoot td {
      background: #222;
      color: #ffcc66;
      font-weight: bold;
    }

    .gpsl-link {
      color: #6cf;
      text-decoration: none;
    }

    .gpsl-link:hover {
      text-decoration: underline;
    }

    .owner-tag {
      color: #9fdf9f;
      font-weight: bold;
    }

    .rank-cell {
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      color: #888;
      font-style: italic;
      padding: 24px 0;
    }

    #logoutBtn {
      background: #cc0000 !important;
      color: #fff !important;
      border: 1px solid #990000 !important;
    }
  </style>
</head>
<body>
  <h1>Season club purchases</h1>
  <div id="nav"></div>

  <div class="page-wrap">
    <p class="meta">
      <a href="all_listings.html" class="button">← Transfer Market</a>
      <a href="season_transfers.html" class="button">Season transfers</a>
      <span id="seasonLabel"></span>
    </p>

    <div class="summary" id="summaryBar" hidden></div>

    <div id="tableHost">
      <p class="empty">Loading…</p>
    </div>
  </div>

  <script type="module" src="season_club_purchases.js"></script>
</body>
</html>
