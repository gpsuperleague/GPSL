<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Remove owner from club — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .card .note { color:#999; font-size:13px; line-height:1.45; margin:0 0 12px; }
    button.button.secondary { background:#444; color:#ddd; }
    button.button.secondary:hover { background:#555; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Remove owner from club</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="ow-break">
        <h2>Remove owner from club (short break)</h2>
        <p class="note">
          Detaches the owner from their club and national team. They rejoin the waiting list as a
          <b>returning member</b> (above new joins). Season history is retained.
        </p>
        <div class="row">
          <div><input id="breakOwnerEmail" placeholder="Owner email"></div>
        </div>
        <button id="breakOwnerBtn" class="button secondary">Remove from club</button>
        <div id="breakOwnerStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_owners.js"></script>
</body>
</html>
