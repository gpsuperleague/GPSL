<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Draft Auction – Player</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    #nav { padding:15px; background:#1a1a1a; border-bottom:1px solid #333; text-align:center; }
    a.button, button.button {
      display:inline-block; padding:10px 20px; background:#ff9900; color:#111;
      text-decoration:none; font-weight:bold; border-radius:6px; margin:5px;
      transition:0.2s; cursor:pointer; border:none;
    }
    a.button:hover, button.button:hover { background:#ffaa22; transform:scale(1.05); }

    .container { margin:20px; }
    .player-header { display:flex; gap:20px; margin-bottom:20px; }
    .player-card { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; flex:1; }
    .player-img { width:160px; height:160px; object-fit:contain; border-radius:8px; background:#000; }
    .meta { font-size:13px; color:#ccc; margin-top:4px; }

    .bid-panel { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; margin-bottom:20px; }
    .bid-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .bid-row input { padding:6px; border-radius:4px; border:1px solid #444; background:#111; color:#ddd; width:160px; }

    .quick-btn, .inc-btn {
      padding:6px 10px; font-size:12px; border-radius:4px; border:1px solid #555;
      background:#222; color:#ddd; cursor:pointer;
    }
    .quick-btn:hover, .inc-btn:hover { background:#333; }

    .submit-btn {
      padding:6px 12px; font-size:13px; border-radius:4px; border:none;
      background:#2f7a2f; color:#fff; cursor:pointer;
    }
    .submit-btn:hover { background:#369a36; }
    .submit-btn.disabled { background:#444; color:#999; cursor:not-allowed; }

    .status-note { font-size:12px; color:#ccc; margin-top:8px; }

    table.history { width:100%; border-collapse:collapse; margin-top:10px; }
    table.history th, table.history td {
      border:1px solid #333; padding:6px; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    table.history th { background:#222; color:#ff9900; }
  </style>
</head>

<body>
  <div id="nav"></div>

  <div class="container">
    <div class="player-header">
      <div>
        <img id="playerImg" class="player-img" src="" alt="Player">
      </div>
      <div class="player-card">
        <h2 id="playerName"></h2>
        <div class="meta" id="playerMeta"></div>
        <div class="meta" id="playerValue"></div>
        <div class="meta" id="currentHighest"></div>
        <div class="meta" id="leadingClub"></div>
        <div class="meta" id="timeRemaining"></div>
        <div class="meta" id="creditsInfo"></div>
      </div>
    </div>

    <div class="bid-panel">
      <h3>Place Bid</h3>
      <div class="bid-row">
        <span style="font-size:18px; color:#ff9900; font-weight:bold;">₿</span>
        <input type="text" id="bidAmount" placeholder="amount">
        <button id="quickBidBtn" class="quick-btn">Quick Bid</button>
        <button class="inc-btn" data-delta="500000">+500k</button>
        <button class="inc-btn" data-delta="1000000">+1m</button>
        <button class="inc-btn" data-delta="5000000">+5m</button>
        <button class="dec-btn" data-delta="-500000">–500k</button>
        <button class="dec-btn" data-delta="-1000000">–1m</button>
        <button class="dec-btn" data-delta="-5000000">–5m</button>
        <button id="submitBidBtn" class="submit-btn">Submit Bid</button>
      </div>
      <div class="status-note" id="bidStatus"></div>
    </div>

    <div class="history-panel">
      <h3>Bid History (Current Window)</h3>
      <table class="history">
        <thead>
          <tr>
            <th>Time</th>
            <th>Club</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    /* ============================================================
       IMPORT UNIFIED ENGINE + CLUB LOOKUP
       ============================================================ */
    import {
      supabase,
      getUKNow,
      loadGlobalSettings,
      getDraftPhaseFromStart,
      getDraftTimelineFromStart,
      draftPhaseLabel,
      formatMs,
      getDraftCredits,
      canClubBidOnPlayerDraft,
      getActiveDraftListingId,
      syncDraftListingHighBid,
    } from "./draft_engine.js";

    import { fullClubName } from "./clubs_lookup.js";

    /* ============================================================
       STATE
       ============================================================ */
    let buyerShortName = null;
    let draftEnabled = false;
    let draftAuctionStartTimeUK = null;

    let playerId = null;
    let currentHighestBid = 0;
    let currentLeadingClub = null;
    let canBid = false;

    /* ============================================================
       INIT
       ============================================================ */
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      playerId = params.get("player");

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadSettings();
      await buildNav(user);
      await loadBuyerClubShortName(user.id);
      await loadPlayerAndBids();
      setupBidControls();
    });

    /* ============================================================
       LOAD GLOBAL SETTINGS (UNIFIED)
       ============================================================ */
    async function loadSettings() {
      const settings = await loadGlobalSettings();
      draftEnabled = settings.draftAuctionEnabled;
      draftAuctionStartTimeUK = settings.draftAuctionStartTime;
    }

    function draftStatusText(nowUK) {
      const phase = getDraftPhaseFromStart(nowUK, draftAuctionStartTimeUK);
      const timeline = getDraftTimelineFromStart(draftAuctionStartTimeUK);
      let extra = "";
      if (timeline && phase === "random_active") {
        const ms = timeline.publicEnd - nowUK;
        extra = ` — latest possible end ${formatMs(ms)}`;
      }
      return draftPhaseLabel(phase) + extra;
    }

    /* ============================================================
       NAV
       ============================================================ */
    async function buildNav(user) {
      const nav = document.getElementById("nav");

      let html = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <a href="draftauction.html" class="button">Draft Auction</a>
      `;

      if (user.email === "rotavator66@outlook.com") {
        html += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }

      html += `<button id="logoutBtn" class="button">Logout</button>`;
      nav.innerHTML = html;

      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    /* ============================================================
       LOAD OWNER CLUB SHORTNAME
       ============================================================ */
    async function loadBuyerClubShortName(userId) {
      const { data } = await supabase
        .from("Clubs")
        .select("ShortName")
        .eq("owner_id", userId)
        .single();

      buyerShortName = data ? data.ShortName : null;
    }

    /* ============================================================
       LOAD PLAYER + BIDS
       ============================================================ */
    async function loadPlayerAndBids() {
      const { data: player } = await supabase
        .from("Players")
        .select("*")
        .eq("Konami_ID", playerId)
        .single();

      if (!player || player.Contracted_Team !== null) {
        document.getElementById("playerName").textContent =
          "Player not eligible for draft auction.";
        return;
      }

      /* --- Player Info --- */
      document.getElementById("playerName").textContent = player.Name;
      document.getElementById("playerMeta").textContent =
        `Pos: ${player.Position} | Rating: ${player.Rating} | Age: ${player.Age}`;
      document.getElementById("playerValue").textContent =
        `Market Value: ₿ ${Number(player.market_value).toLocaleString("en-GB")}`;

      const img = document.getElementById("playerImg");
      img.src = `https://pesdb.net/assets/img/card/b${player.Konami_ID}.png`;
      img.onerror = () => img.src = "images/silhouette.png";

      /* --- Bids (current window) --- */
      const nowUK = getUKNow();
      const phase = getDraftPhaseFromStart(nowUK, draftAuctionStartTimeUK);

      const windowStart = new Date(nowUK.getTime() - 24 * 60 * 60 * 1000);
      const windowEnd = nowUK;

      const { data: bids } = await supabase
        .from("Player_Transfer_Bids")
        .select("*")
        .eq("direct_bid_id", player.Konami_ID)
        .eq("is_direct", true)
        .gte("bid_time", windowStart.toISOString())
        .lt("bid_time", windowEnd.toISOString())
        .order("bid_time", { ascending: true });

      if (!bids || !bids.length) {
        document.getElementById("historyBody").innerHTML =
          `<tr><td colspan="5">No bids in this window.</td></tr>`;
        document.getElementById("currentHighest").textContent = "Current Highest Bid: None";
        document.getElementById("leadingClub").textContent = "Leading Club: None";
      } else {
        const highest = bids.reduce((max, b) =>
          b.bid_amount > max.bid_amount ? b : max, bids[0]);

        currentHighestBid = highest.bid_amount;
        currentLeadingClub = highest.bidder_club_id;

        document.getElementById("currentHighest").textContent =
          `Current Highest Bid: ₿ ${Number(currentHighestBid).toLocaleString("en-GB")}`;

        const leadingFull = await fullClubName(currentLeadingClub);
        document.getElementById("leadingClub").textContent =
          `Leading Club: ${leadingFull}`;

        renderHistory(bids);
      }

      /* --- Time Remaining --- */
      document.getElementById("timeRemaining").textContent = draftStatusText(nowUK);

      /* --- Credits --- */
      const { credits } = await getDraftCredits(buyerShortName, draftAuctionStartTimeUK);
      document.getElementById("creditsInfo").textContent =
        `Draft Credits: ${credits}`;

      /* --- Eligibility (Unified) --- */
      canBid = await canClubBidOnPlayerDraft({
        konamiId: player.Konami_ID,
        buyerShortName,
        draftAuctionEnabled: draftEnabled,
        draftAuctionStartTime: draftAuctionStartTimeUK,
      });

      updateBidControlsState();
    }

    /* ============================================================
       RENDER HISTORY
       ============================================================ */
    function renderHistory(bids) {
      const tbody = document.getElementById("historyBody");
      tbody.innerHTML = "";

      for (const bid of bids) {
        const d = new Date(bid.bid_time);
        const timeText = isNaN(d.getTime())
          ? "—"
          : d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

        let type = "-";
        let notes = "";

        if (bid.is_first_draft_bid) {
          type = "First Bid";
          notes = "Earned 2 credits";
        } else if (bid.is_draft_join) {
          type = "Join Bid";
          if (bid.draft_join_consumed) notes = "Consumed 1 credit";
        } else {
          type = "Bid";
        }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${timeText}</td>
          <td>${bid.bidder_club_id}</td>
          <td>₿ ${Number(bid.bid_amount).toLocaleString("en-GB")}</td>
          <td>${type}</td>
          <td>${notes}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    /* ============================================================
       BID CONTROLS
       ============================================================ */
    function setupBidControls() {
      const amountInput = document.getElementById("bidAmount");
      const quickBtn = document.getElementById("quickBidBtn");
      const submitBtn = document.getElementById("submitBidBtn");

      function minBid() {
        return currentHighestBid + 500000;
      }

      amountInput.addEventListener("input", () => {
        let raw = amountInput.value.replace(/,/g, "").replace(/\D/g, "");
        let num = Number(raw || 0);
        if (num < minBid()) num = minBid();
        amountInput.value = num.toLocaleString("en-GB");
      });

      quickBtn.onclick = () => {
        amountInput.value = minBid().toLocaleString("en-GB");
      };

      document.querySelectorAll(".inc-btn, .dec-btn").forEach(btn => {
        btn.onclick = () => {
          let raw = amountInput.value.replace(/,/g, "");
          let current = Number(raw || 0);
          if (!current) current = minBid();

          const delta = Number(btn.dataset.delta);
          let next = current + delta;
          if (next < minBid()) next = minBid();

          amountInput.value = next.toLocaleString("en-GB");
        };
      });

      submitBtn.onclick = submitBid;
    }

    function updateBidControlsState() {
      const submitBtn = document.getElementById("submitBidBtn");
      submitBtn.disabled = !canBid;
      submitBtn.classList.toggle("disabled", !canBid);
    }

    /* ============================================================
       SUBMIT BID (LOCAL INSERT LOGIC)
       ============================================================ */
    async function submitBid() {
      if (!canBid || !buyerShortName || !playerId) return;

      const amountRaw = document.getElementById("bidAmount").value;
      const amount = Number(amountRaw.replace(/,/g, ""));
      if (!amount || amount <= currentHighestBid) {
        document.getElementById("bidStatus").textContent =
          "Bid must be higher than current highest.";
        return;
      }

      /* --- Determine flags using unified helpers --- */
      const nowUK = getUKNow();

      const { data: existing } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id")
        .eq("direct_bid_id", playerId)
        .eq("is_direct", true)
        .order("bid_time", { ascending: true });

      const isFirstBidder = existing && existing.length
        ? existing[0].bidder_club_id === buyerShortName
        : false;

      let is_first_draft_bid = false;
      let is_draft_join = false;
      let draft_join_consumed = false;

      if (isFirstBidder) {
        const { data: firstAlready } = await supabase
          .from("Player_Transfer_Bids")
          .select("bid_id")
          .eq("direct_bid_id", playerId)
          .eq("bidder_club_id", buyerShortName)
          .eq("is_first_draft_bid", true);

        if (!firstAlready || !firstAlready.length) {
          is_first_draft_bid = true;
        }
      } else {
        is_draft_join = true;

        const { data: priorJoins } = await supabase
          .from("Player_Transfer_Bids")
          .select("bid_id")
          .eq("direct_bid_id", playerId)
          .eq("bidder_club_id", buyerShortName)
          .eq("is_draft_join", true);

        if (!priorJoins || !priorJoins.length) {
          const { credits } = await getDraftCredits(buyerShortName, draftAuctionStartTimeUK);
          if (credits <= 0) {
            document.getElementById("bidStatus").textContent =
              "You do not have enough draft credits to join this auction.";
            return;
          }
          draft_join_consumed = true;
        }
      }

      const listingId = await getActiveDraftListingId(supabase, playerId);

      /* --- Insert Bid --- */
      const { error } = await supabase
        .from("Player_Transfer_Bids")
        .insert({
          listing_id: listingId,
          bidder_club_id: buyerShortName,
          seller_club_id: null,
          bid_amount: amount,
          is_direct: true,
          direct_bid_id: playerId,
          is_first_draft_bid,
          is_draft_join,
          draft_join_consumed,
          bid_time: new Date().toISOString(),
        });

      if (error) {
        document.getElementById("bidStatus").textContent =
          "Error submitting bid. Please try again.";
        return;
      }

      if (listingId) {
        await syncDraftListingHighBid(supabase, listingId, playerId);
      }

      document.getElementById("bidStatus").textContent = "Bid submitted.";
      await loadPlayerAndBids();
    }
  </script>
</body>
</html>
