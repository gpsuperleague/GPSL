<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Draft Auction – Player</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    #nav { padding:15px; background:#1a1a1a; border-bottom:1px solid #333; text-align:center; }
    a.button, button.button {
      display:inline-block; padding:10px 20px; background:#ff9900; color:#111;
      text-decoration:none; font-weight:bold; border-radius:6px; margin:5px;
      transition:0.2s; cursor:pointer; border:none;
    }
    a.button:hover, button.button:hover { background:#ffaa22; transform:scale(1.05); }

    .container { margin:20px; }
    .player-header { display:flex; gap:20px; margin-bottom:20px; }
    .player-card { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; flex:1; }
    .player-img { width:160px; height:160px; object-fit:contain; border-radius:8px; background:#000; }
    .meta { font-size:13px; color:#ccc; margin-top:4px; }

    .bid-panel { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; margin-bottom:20px; }
    .bid-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .bid-row input { padding:6px; border-radius:4px; border:1px solid #444; background:#111; color:#ddd; width:160px; }

    .quick-btn, .inc-btn {
      padding:6px 10px; font-size:12px; border-radius:4px; border:1px solid #555;
      background:#222; color:#ddd; cursor:pointer;
    }
    .quick-btn:hover, .inc-btn:hover { background:#333; }

    .submit-btn {
      padding:6px 12px; font-size:13px; border-radius:4px; border:none;
      background:#2f7a2f; color:#fff; cursor:pointer;
    }
    .submit-btn:hover { background:#369a36; }
    .submit-btn.disabled { background:#444; color:#999; cursor:not-allowed; }
    .bid-panel.view-only { opacity:0.92; }
    .bid-panel.view-only input,
    .bid-panel.view-only .quick-btn,
    .bid-panel.view-only .inc-btn,
    .bid-panel.view-only .dec-btn { pointer-events:none; opacity:0.55; }
    .bid-ended-banner {
      color:#ff9900;
      font-size:13px;
      margin:0 0 10px;
      font-weight:bold;
    }
    #bidSquadWarning {
      color: #e6c200;
      font-size: 13px;
      margin: 10px 0 6px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .status-note { font-size:12px; color:#ccc; margin-top:8px; }

    table.history { width:100%; border-collapse:collapse; margin-top:10px; }
    table.history th, table.history td {
      border:1px solid #333; padding:6px; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    table.history th { background:#222; color:#ff9900; }

    .fav-btn {
      background:transparent;
      border:1px solid #555;
      color:#666;
      font-size:16px;
      cursor:pointer;
      padding:4px 10px;
      border-radius:4px;
      margin-left:8px;
      vertical-align:middle;
    }
    .fav-btn.fav-on { color:#ff9900; border-color:#ff9900; }
    .fav-btn:hover { color:#ffcc66; }
  </style>
</head>

<body>
  <div id="nav"></div>

  <div class="container">
    <p style="margin:0 0 16px;">
      <a href="draftauction.html" class="button">← Back to Draft Auction</a>
    </p>

    <div class="player-header">
      <div>
        <a id="playerImgLink" href="#" target="_blank" rel="noopener">
          <img id="playerImg" class="player-img" src="" alt="Player">
        </a>
      </div>
      <div class="player-card">
        <h2 style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
          <span id="playerName"></span>
          <button type="button" id="draftFavBtn" class="fav-btn" title="Save draft auction" aria-label="Save draft auction">☆</button>
        </h2>
        <div class="meta" id="playerMeta"></div>
        <div class="meta" id="playerValue"></div>
        <div class="meta" id="currentHighest"></div>
        <div class="meta" id="leadingClub"></div>
        <div class="meta" id="timeRemaining"></div>
        <div class="meta" id="timeRemainingSub" style="font-size:12px;color:#aaa;"></div>
        <div class="meta" id="creditsInfo"></div>
      </div>
    </div>

    <div class="bid-panel">
      <h3>Place Bid</h3>
      <div class="bid-row">
        <span style="font-size:18px; color:#ff9900; font-weight:bold;">₿</span>
        <input type="text" id="bidAmount" placeholder="amount">
        <button id="quickBidBtn" class="quick-btn">Quick Bid</button>
        <button class="inc-btn" data-delta="500000">+500k</button>
        <button class="inc-btn" data-delta="1000000">+1m</button>
        <button class="inc-btn" data-delta="5000000">+5m</button>
        <button class="dec-btn" data-delta="-500000">–500k</button>
        <button class="dec-btn" data-delta="-1000000">–1m</button>
        <button class="dec-btn" data-delta="-5000000">–5m</button>
        <button id="submitBidBtn" class="submit-btn">Submit Bid</button>
      </div>
      <div id="bidSquadWarning" role="status" aria-live="polite"></div>
      <div class="status-note" id="bidStatus"></div>
    </div>

    <div class="history-panel">
      <h3>Bid History (Current Window)</h3>
      <table class="history">
        <thead>
          <tr>
            <th>Time</th>
            <th>Club</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    /* ============================================================
       IMPORT UNIFIED ENGINE + CLUB LOOKUP
       ============================================================ */
    import {
      buildNav,
      loadGlobalSettings,
      refreshDraftBiddingOpen,
      getDraftBiddingOpen,
    } from "./global.js";
    import {
      supabase,
      getUKNow,
      isDraftAuctionEnded,
      getDraftPhaseFromStart,
      getDraftTimelineFromStart,
      draftPhaseLabel,
      getDraftCredits,
      canClubBidOnPlayerDraft,
      getActiveDraftListingId,
      syncDraftListingHighBid,
      fetchCurrentDraftAuctionBids,
      draftMinimumBidAmount,
      highestDraftBid,
      normalizeKonamiId,
    } from "./draft_engine.js";

    import { fullClubName, loadClubsMap } from "./clubs_lookup.js";
    import {
      formatLiveCountdownLines,
      formatTargetTimesSubline,
    } from "./countdown_display.js";
    import { getDraftCountdownTick } from "./draft_timeline.js";
    import {
      loadDraftFavouriteIds,
      toggleDraftFavourite,
      favouriteStarChar,
      favouriteButtonLabel,
    } from "./draft_favourites.js";
    import {
      confirmSquadRulesBeforeBid,
      squadRulesBidWarningLines,
    } from "./squad_rules.js";
    import {
      playerNameLinkHtml,
      pesdbPlayerUrl,
      pesdbPlayerCardUrl,
    } from "./player_links.js";

    /* ============================================================
       STATE
       ============================================================ */
    let buyerShortName = null;
    let buyerClubNation = null;
    let draftBidPlayer = null;
    let draftEnabled = false;
    let draftAuctionStartTimeUK = null;

    let playerId = null;
    let currentHighestBid = 0;
    let currentLeadingClub = null;
    let canBid = false;
    let auctionEnded = false;
    let draftCountdownInterval = null;

    /* ============================================================
       INIT
       ============================================================ */
    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      playerId = params.get("player");

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadSettings();
      await buildNav();
      await loadClubsMap();
      await loadBuyerClubShortName(user.id);
      wireDraftFavouriteButton();
      await loadPlayerAndBids();
      setupBidControls();
    });

    function wireDraftFavouriteButton() {
      const btn = document.getElementById("draftFavBtn");
      if (!btn) return;

      btn.addEventListener("click", async () => {
        if (!buyerShortName) {
          alert("Link a club to your account to save draft auctions.");
          return;
        }
        if (!playerId) return;
        try {
          await toggleDraftFavourite(supabase, buyerShortName, playerId);
          await refreshDraftFavouriteButton();
        } catch (err) {
          console.error(err);
          alert(err.message || "Could not update saved draft auction.");
        }
      });
    }

    async function refreshDraftFavouriteButton() {
      const btn = document.getElementById("draftFavBtn");
      if (!btn || !buyerShortName || !playerId) {
        if (btn) btn.style.display = "none";
        return;
      }

      const favs = await loadDraftFavouriteIds(supabase, buyerShortName);
      const isFav = favs.has(String(playerId));
      btn.textContent = favouriteStarChar(isFav);
      btn.classList.toggle("fav-on", isFav);
      btn.title = favouriteButtonLabel(isFav);
      btn.setAttribute("aria-label", favouriteButtonLabel(isFav));
      btn.style.display = "";
    }

    /* ============================================================
       LOAD GLOBAL SETTINGS (UNIFIED)
       ============================================================ */
    async function loadSettings() {
      const settings = await loadGlobalSettings();
      draftEnabled = settings.draftEnabled;
      draftAuctionStartTimeUK = settings.draftStart;
    }

    function applyViewOnlyMode() {
      const panel = document.querySelector(".bid-panel");
      const h3 = panel?.querySelector("h3");
      if (!panel) return;

      let banner = document.getElementById("draftEndedBanner");
      if (auctionEnded) {
        panel.classList.add("view-only");
        if (h3) h3.textContent = "Bidding (view only)";
        if (!banner) {
          banner = document.createElement("p");
          banner.id = "draftEndedBanner";
          banner.className = "bid-ended-banner";
          panel.insertBefore(banner, panel.firstChild);
        }
        banner.textContent =
          "Draft auction ended — you can review bids below but cannot place new ones.";
      } else {
        panel.classList.remove("view-only");
        if (h3) h3.textContent = "Place Bid";
        if (banner) banner.remove();
      }
    }

    async function updateDraftCountdownUI() {
      if (draftEnabled && draftAuctionStartTimeUK) {
        await refreshDraftBiddingOpen();
      }
      const nowUK = getUKNow();
      const el = document.getElementById("timeRemaining");
      const sub = document.getElementById("timeRemainingSub");
      const open = getDraftBiddingOpen();
      const tick = getDraftCountdownTick(
        nowUK,
        draftAuctionStartTimeUK,
        open === null ? {} : { biddingOpen: open }
      );

      auctionEnded = isDraftAuctionEnded(nowUK, draftAuctionStartTimeUK);
      applyViewOnlyMode();
      updateBidControlsState();

      if (tick.phase === "ended") {
        el.textContent = draftPhaseLabel(tick.phase);
        if (sub) sub.textContent = "";
        return;
      }

      const { duration, subline } = formatLiveCountdownLines(
        tick.label,
        tick.ms,
        tick.target,
        { countUp: tick.countUp }
      );
      el.textContent = duration;
      if (sub) {
        sub.textContent =
          subline || (tick.target ? formatTargetTimesSubline(tick.target) : "");
      }
    }

    function startDraftPlayerCountdown() {
      if (draftCountdownInterval) clearInterval(draftCountdownInterval);
      updateDraftCountdownUI();
      draftCountdownInterval = setInterval(updateDraftCountdownUI, 1000);
    }

    /* ============================================================
       LOAD OWNER CLUB SHORTNAME
       ============================================================ */
    async function loadBuyerClubShortName(userId) {
      const { data } = await supabase
        .from("Clubs")
        .select("ShortName, Nation")
        .eq("owner_id", userId)
        .single();

      buyerShortName = data ? data.ShortName : null;
      buyerClubNation = data?.Nation ?? null;
    }

    async function refreshSquadBidWarnings() {
      const el = document.getElementById("bidSquadWarning");
      if (!el) return;
      el.textContent = "";

      if (!buyerShortName || !draftBidPlayer) return;

      const lines = await squadRulesBidWarningLines(
        supabase,
        buyerShortName,
        buyerClubNation,
        draftBidPlayer
      );
      if (lines.length) {
        el.textContent = lines.map((l) => `⚠ ${l}`).join("\n\n");
      }
    }

    /* ============================================================
       LOAD PLAYER + BIDS
       ============================================================ */
    async function loadPlayerAndBids() {
      if (!playerId) {
        document.getElementById("playerName").textContent = "No player selected.";
        return;
      }

      const konamiKey = Number(playerId);
      const { data: player, error: playerError } = await supabase
        .from("Players")
        .select("*")
        .eq("Konami_ID", Number.isFinite(konamiKey) ? konamiKey : playerId)
        .maybeSingle();

      if (playerError) {
        console.error("loadPlayerAndBids:", playerError);
        document.getElementById("playerName").textContent =
          "Could not load player.";
        return;
      }

      if (!player || player.Contracted_Team !== null) {
        draftBidPlayer = null;
        document.getElementById("playerName").textContent =
          "Player not eligible for draft auction.";
        return;
      }

      draftBidPlayer = player;

      /* --- Player Info --- */
      const nameEl = document.getElementById("playerName");
      if (nameEl) {
        nameEl.innerHTML = playerNameLinkHtml(player.Konami_ID, player.Name);
      }
      document.getElementById("playerMeta").textContent =
        `Pos: ${player.Position} | Rating: ${player.Rating} | Age: ${player.Age}`;
      document.getElementById("playerValue").textContent =
        `Market Value: ₿ ${Number(player.market_value).toLocaleString("en-GB")}`;

      const img = document.getElementById("playerImg");
      const imgLink = document.getElementById("playerImgLink");
      img.src = pesdbPlayerCardUrl(player.Konami_ID);
      img.onerror = () => { img.src = "images/silhouette.png"; };
      if (imgLink) imgLink.href = pesdbPlayerUrl(player.Konami_ID);

      /* --- Bids (current draft window, draft-only rows) --- */
      const bids = await fetchCurrentDraftAuctionBids(
        player.Konami_ID,
        draftAuctionStartTimeUK
      );

      currentHighestBid = 0;
      currentLeadingClub = null;

      const listingId = await getActiveDraftListingId(supabase, player.Konami_ID);
      if (listingId) {
        const { data: listing } = await supabase
          .from("Player_Transfer_Listings")
          .select("current_highest_bid, current_highest_bidder")
          .eq("id", listingId)
          .maybeSingle();
        if (listing?.current_highest_bid != null) {
          currentHighestBid = Math.max(
            currentHighestBid,
            Number(listing.current_highest_bid) || 0
          );
          currentLeadingClub = listing.current_highest_bidder || null;
        }
      }

      if (!bids || !bids.length) {
        document.getElementById("historyBody").innerHTML =
          `<tr><td colspan="5">No bids in this window.</td></tr>`;
        if (currentHighestBid > 0) {
          document.getElementById("currentHighest").textContent =
            `Current Highest Bid: ₿ ${Number(currentHighestBid).toLocaleString("en-GB")}`;
          const leadingFull = await fullClubName(currentLeadingClub);
          document.getElementById("leadingClub").textContent =
            `Leading Club: ${leadingFull || currentLeadingClub || "—"}`;
        } else {
          document.getElementById("currentHighest").textContent =
            "Current Highest Bid: None";
          document.getElementById("leadingClub").textContent = "Leading Club: None";
        }
      } else {
        const highest = highestDraftBid(bids);

        currentHighestBid = Math.max(
          currentHighestBid,
          Number(highest.bid_amount) || 0
        );
        currentLeadingClub = highest.bidder_club_id || currentLeadingClub;

        document.getElementById("currentHighest").textContent =
          `Current Highest Bid: ₿ ${Number(currentHighestBid).toLocaleString("en-GB")}`;

        const leadingFull = await fullClubName(currentLeadingClub);
        document.getElementById("leadingClub").textContent =
          `Leading Club: ${leadingFull}`;

        await renderHistory(bids);
      }

      await refreshDraftFavouriteButton();
      if (draftEnabled && draftAuctionStartTimeUK) {
        startDraftPlayerCountdown();
      } else {
        const el = document.getElementById("timeRemaining");
        const sub = document.getElementById("timeRemainingSub");
        if (el) el.textContent = "";
        if (sub) sub.textContent = "";
      }

      /* --- Credits --- */
      const { credits } = await getDraftCredits(buyerShortName, draftAuctionStartTimeUK);
      document.getElementById("creditsInfo").textContent =
        `Draft Credits: ${credits}`;

      /* --- Eligibility (Unified) --- */
      const nowUK = getUKNow();
      auctionEnded = isDraftAuctionEnded(nowUK, draftAuctionStartTimeUK);

      canBid =
        !auctionEnded &&
        (await canClubBidOnPlayerDraft({
          konamiId: player.Konami_ID,
          buyerShortName,
          draftAuctionEnabled: draftEnabled,
          draftAuctionStartTime: draftAuctionStartTimeUK,
        }));

      applyViewOnlyMode();
      updateBidControlsState();
      await refreshSquadBidWarnings();
    }

    /* ============================================================
       RENDER HISTORY
       ============================================================ */
    async function renderHistory(bids) {
      const tbody = document.getElementById("historyBody");
      tbody.innerHTML = "";

      for (const bid of bids) {
        const d = new Date(bid.bid_time);
        const timeText = isNaN(d.getTime())
          ? "—"
          : d.toLocaleString([], {
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });

        let type = "-";
        let notes = "";

        if (bid.is_first_draft_bid) {
          type = "First Bid";
          notes = "Earned 2 credits";
        } else if (bid.is_draft_join) {
          type = "Join Bid";
          if (bid.draft_join_consumed) notes = "Consumed 1 credit";
        } else {
          type = "Bid";
        }

        const clubLabel =
          (await fullClubName(bid.bidder_club_id)) || bid.bidder_club_id;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${timeText}</td>
          <td>${clubLabel}</td>
          <td>₿ ${Number(bid.bid_amount).toLocaleString("en-GB")}</td>
          <td>${type}</td>
          <td>${notes}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    /* ============================================================
       BID CONTROLS
       ============================================================ */
    function setupBidControls() {
      const amountInput = document.getElementById("bidAmount");
      const quickBtn = document.getElementById("quickBidBtn");
      const submitBtn = document.getElementById("submitBidBtn");

      function minBid() {
        return draftMinimumBidAmount(
          draftBidPlayer?.market_value,
          currentHighestBid > 0
            ? [{ bid_amount: currentHighestBid }]
            : []
        );
      }

      amountInput.addEventListener("input", () => {
        let raw = amountInput.value.replace(/,/g, "").replace(/\D/g, "");
        let num = Number(raw || 0);
        if (num < minBid()) num = minBid();
        amountInput.value = num.toLocaleString("en-GB");
      });

      quickBtn.onclick = () => {
        amountInput.value = minBid().toLocaleString("en-GB");
      };

      document.querySelectorAll(".inc-btn, .dec-btn").forEach(btn => {
        btn.onclick = () => {
          let raw = amountInput.value.replace(/,/g, "");
          let current = Number(raw || 0);
          if (!current) current = minBid();

          const delta = Number(btn.dataset.delta);
          let next = current + delta;
          if (next < minBid()) next = minBid();

          amountInput.value = next.toLocaleString("en-GB");
        };
      });

      submitBtn.onclick = submitBid;
    }

    function updateBidControlsState() {
      const submitBtn = document.getElementById("submitBidBtn");
      const readOnly = auctionEnded || !canBid;
      submitBtn.disabled = readOnly;
      submitBtn.classList.toggle("disabled", readOnly);
      submitBtn.textContent = auctionEnded ? "Auction ended" : "Submit Bid";
      document.getElementById("bidAmount")?.toggleAttribute("readonly", auctionEnded);
    }

    /* ============================================================
       SUBMIT BID (LOCAL INSERT LOGIC)
       ============================================================ */
    async function submitBid() {
      if (!canBid || !buyerShortName || !playerId) return;

      const amountRaw = document.getElementById("bidAmount").value;
      const amount = Number(amountRaw.replace(/,/g, ""));
      const minimum = draftMinimumBidAmount(
        draftBidPlayer?.market_value,
        currentHighestBid > 0
          ? [{ bid_amount: currentHighestBid }]
          : []
      );

      if (!amount || amount < minimum) {
        document.getElementById("bidStatus").textContent =
          currentHighestBid > 0
            ? `Bid must be at least current high + ₿500k (₿ ${minimum.toLocaleString("en-GB")}).`
            : `Bid must be at least market value (₿ ${minimum.toLocaleString("en-GB")}).`;
        return;
      }

      if (
        !(await confirmSquadRulesBeforeBid(
          supabase,
          buyerShortName,
          buyerClubNation,
          draftBidPlayer
        ))
      ) {
        return;
      }

      /* --- Determine flags using unified helpers --- */
      const nowUK = getUKNow();

      const windowBids = await fetchCurrentDraftAuctionBids(
        playerId,
        draftAuctionStartTimeUK
      );
      const hasBids = windowBids.length > 0;
      const openerClub = hasBids ? windowBids[0].bidder_club_id : null;

      let is_first_draft_bid = false;
      let is_draft_join = false;
      let draft_join_consumed = false;

      if (!hasBids) {
        // First bid on this player in the live draft window (earns 2 credits).
        is_first_draft_bid = true;
      } else if (openerClub === buyerShortName) {
        // Opening club raising their bid — no join credit.
        is_first_draft_bid = false;
        is_draft_join = false;
      } else {
        is_draft_join = true;

        const priorJoins = windowBids.filter(
          (b) =>
            b.bidder_club_id === buyerShortName && b.is_draft_join === true
        );

        if (!priorJoins.length) {
          const { credits } = await getDraftCredits(
            buyerShortName,
            draftAuctionStartTimeUK
          );
          if (credits <= 0) {
            document.getElementById("bidStatus").textContent =
              "You do not have enough draft credits to join this auction. Open a new free agent in GPDB first to earn credits.";
            return;
          }
          draft_join_consumed = true;
        }
      }

      const listingId = await getActiveDraftListingId(supabase, playerId);
      const konamiKey = normalizeKonamiId(
        draftBidPlayer?.Konami_ID ?? playerId
      );

      /* --- Insert Bid --- */
      const { error } = await supabase
        .from("Player_Transfer_Bids")
        .insert({
          listing_id: listingId,
          player_id: konamiKey,
          bidder_club_id: buyerShortName,
          seller_club_id: null,
          bid_amount: amount,
          is_direct: true,
          direct_bid_id: konamiKey,
          is_first_draft_bid,
          is_draft_join,
          draft_join_consumed,
          bid_time: new Date().toISOString(),
        });

      if (error) {
        document.getElementById("bidStatus").textContent =
          "Error submitting bid. Please try again.";
        return;
      }

      if (listingId) {
        await syncDraftListingHighBid(
          supabase,
          listingId,
          konamiKey,
          draftAuctionStartTimeUK
        );
      }

      document.getElementById("bidStatus").innerHTML =
        'Bid submitted. <a href="draftauction.html" style="color:#ff9900;font-weight:bold;">Return to Draft Auction</a>';
      await loadPlayerAndBids();
    }
  </script>
</body>
</html>
