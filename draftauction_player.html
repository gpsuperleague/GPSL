<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Draft Auction – Player</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    #nav { padding:15px; background:#1a1a1a; border-bottom:1px solid #333; text-align:center; }
    a.button, button.button {
      display:inline-block; padding:10px 20px; background:#ff9900; color:#111;
      text-decoration:none; font-weight:bold; border-radius:6px; margin:5px;
      transition:0.2s; cursor:pointer; border:none;
    }
    a.button:hover, button.button:hover { background:#ffaa22; transform:scale(1.05); }
    .container { margin:20px; }
    .player-header { display:flex; gap:20px; margin-bottom:20px; }
    .player-card { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; flex:1; }
    .player-img { width:160px; height:160px; object-fit:contain; border-radius:8px; background:#000; }
    .meta { font-size:13px; color:#ccc; margin-top:4px; }
    .bid-panel { background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #333; margin-bottom:20px; }
    .bid-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .bid-row input { padding:6px; border-radius:4px; border:1px solid #444; background:#111; color:#ddd; width:160px; }
    .quick-btn, .inc-btn {
      padding:6px 10px; font-size:12px; border-radius:4px; border:1px solid #555;
      background:#222; color:#ddd; cursor:pointer;
    }
    .quick-btn:hover, .inc-btn:hover { background:#333; }
    .submit-btn {
      padding:6px 12px; font-size:13px; border-radius:4px; border:none;
      background:#2f7a2f; color:#fff; cursor:pointer;
    }
    .submit-btn:hover { background:#369a36; }
    .submit-btn.disabled { background:#444; color:#999; cursor:not-allowed; }
    .status-note { font-size:12px; color:#ccc; margin-top:8px; }
    table.history { width:100%; border-collapse:collapse; margin-top:10px; }
    table.history th, table.history td {
      border:1px solid #333; padding:6px; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    table.history th { background:#222; color:#ff9900; }
  </style>
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="player-header">
      <div>
        <img id="playerImg" class="player-img" src="" alt="Player">
      </div>
      <div class="player-card">
        <h2 id="playerName"></h2>
        <div class="meta" id="playerMeta"></div>
        <div class="meta" id="playerValue"></div>
        <div class="meta" id="currentHighest"></div>
        <div class="meta" id="leadingClub"></div>
        <div class="meta" id="timeRemaining"></div>
        <div class="meta" id="creditsInfo"></div>
      </div>
    </div>

    <div class="bid-panel">
      <h3>Place Bid</h3>
      <div class="bid-row">
        <input type="text" id="bidAmount" placeholder="₿ amount">
        <button id="quickBidBtn" class="quick-btn">Quick Bid</button>
        <button class="inc-btn" data-delta="500000">+500k</button>
        <button class="inc-btn" data-delta="1000000">+1m</button>
        <button class="inc-btn" data-delta="5000000">+5m</button>
        <button id="submitBidBtn" class="submit-btn">Submit Bid</button>
      </div>
      <div class="status-note" id="bidStatus"></div>
    </div>

    <div class="history-panel">
      <h3>Bid History (Current Window)</h3>
      <table class="history">
        <thead>
          <tr>
            <th>Time</th>
            <th>Club</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://omyyogfumrjoaweuawjn.supabase.co',
      'YOUR_ANON_KEY_HERE'
    );

    let buyerShortName = null;
    let draftEnabled = false;
    let randomFinishTime = null;
    let playerId = null;
    let currentHighestBid = 0;
    let currentLeadingClub = null;
    let canBid = false;
    let credits = 0;

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      playerId = params.get("player");

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { window.location = "login.html"; return; }

      await loadGlobalSettings();
      await buildNav(user);
      await loadBuyerClubShortName(user.id);
      await loadPlayerAndBids();
      setupBidControls();
    });

    async function buildNav(user) {
      const nav = document.getElementById("nav");
      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <a href="draftauction.html" class="button">Draft Auction</a>
        <button id="logoutBtn" class="button">Logout</button>
      `;
      if (user.email === "rotavator66@outlook.com") {
        nav.innerHTML += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }
      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    async function loadGlobalSettings() {
      const { data, error } = await supabase
        .from("global_settings")
        .select("draft_auction_enabled, draft_random_finish_time")
        .eq("id", 1)
        .single();

      if (error || !data) {
        draftEnabled = false;
        return;
      }
      draftEnabled = data.draft_auction_enabled === true;
      randomFinishTime = data.draft_random_finish_time
        ? new Date(data.draft_random_finish_time)
        : null;
    }

    async function loadBuyerClubShortName(authId) {
      const { data, error } = await supabase
        .from("Clubs")
        .select("ShortName")
        .eq("owner_id", authId)
        .single();

      if (error || !data) {
        buyerShortName = null;
        return;
      }
      buyerShortName = data.ShortName;
    }

    function getDraftWindowTimes() {
      const nowLocal = new Date();
      const today = new Date(nowLocal.getFullYear(), nowLocal.getMonth(), nowLocal.getDate());
      const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);

      const sevenPmYesterday = new Date(yesterday);
      sevenPmYesterday.setHours(19, 0, 0, 0);

      const sixPmToday = new Date(today);
      sixPmToday.setHours(18, 0, 0, 0);

      const sevenPmToday = new Date(today);
      sevenPmToday.setHours(19, 0, 0, 0);

      return { sevenPmYesterday, sixPmToday, sevenPmToday };
    }

    async function loadPlayerAndBids() {
      if (!playerId) return;

      const { data: player, error: pErr } = await supabase
        .from("Players")
        .select("Konami_ID, Name, Position, Rating, Age, Playstyle, market_value, Contracted_Team")
        .eq("Konami_ID", playerId)
        .single();

      if (pErr || !player || player.Contracted_Team !== null) {
        document.getElementById("playerName").textContent = "Player not eligible for draft auction.";
        return;
      }

      document.getElementById("playerName").textContent = player.Name;
      document.getElementById("playerMeta").textContent =
        `Pos: ${player.Position} | Rating: ${player.Rating} | Age: ${player.Age} | Playstyle: ${player.Playstyle || "-"}`;
      document.getElementById("playerValue").textContent =
        `Market Value: ₿ ${Number(player.market_value).toLocaleString("en-GB")}`;

      const img = document.getElementById("playerImg");
      img.src = `https://pesdb.net/assets/img/card/b${player.Konami_ID}.png`;
      img.onerror = function () { this.src = 'images/silhouette.png'; };

      const { sevenPmYesterday, sevenPmToday, sixPmToday } = getDraftWindowTimes();

      const { data: bids, error: bErr } = await supabase
        .from("Player_Transfer_Bids")
        .select("*")
        .eq("direct_bid_id", player.Konami_ID)
        .eq("is_direct", true)
        .or("is_first_draft_bid.eq.true,is_draft_join.eq.true")
        .gte("bid_time", sevenPmYesterday.toISOString())
        .lt("bid_time", sevenPmToday.toISOString())
        .order("bid_time", { ascending: true });


      if (bErr || !bids || !bids.length) {
        document.getElementById("historyBody").innerHTML =
          `<tr><td colspan="5">No bids in this window.</td></tr>`;
        return;
      }

      const highest = bids.reduce((max, b) =>
        b.bid_amount > max.bid_amount ? b : max, bids[0]);

      currentHighestBid = highest.bid_amount;
      currentLeadingClub = highest.bidder_club_id;

      document.getElementById("currentHighest").textContent =
        `Current Highest Bid: ₿ ${Number(currentHighestBid).toLocaleString("en-GB")}`;
      document.getElementById("leadingClub").textContent =
        `Leading Club: ${currentLeadingClub}`;
      document.getElementById("timeRemaining").textContent =
        randomFinishTime ? `Ends around: ${randomFinishTime.toLocaleTimeString("en-GB")}` : "End time not set";

      credits = await getDraftCredits(buyerShortName, sevenPmYesterday, sixPmToday);
      document.getElementById("creditsInfo").textContent =
        `Draft Credits: ${credits}`;

      renderHistory(bids, sixPmToday);

      const nowLocal = new Date();
      canBid = await canClubBidOnPlayer(
        buyerShortName,
        player.Konami_ID,
        nowLocal,
        sixPmToday
      );

      updateBidControlsState();
    }

    function renderHistory(bids, sixPmToday) {
      const tbody = document.getElementById("historyBody");
      tbody.innerHTML = "";

      for (const bid of bids) {
        const created = new Date(bid.bid_time);
        const isFirst = bid.is_first_draft_bid;
        const isJoin = bid.is_draft_join;
        const consumed = bid.draft_join_consumed;

        let type = "-";
        let notes = "";

        if (isFirst) {
          type = "First Bid";
          if (created < sixPmToday) notes = "Earned 2 credits";
        } else if (isJoin) {
          type = "Join Bid";
          if (consumed) notes = "Consumed 1 credit";
        } else {
          type = "Bid";
        }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${created.toLocaleTimeString("en-GB")}</td>
          <td>${bid.bidder_club_id}</td>
          <td>₿ ${Number(bid.bid_amount).toLocaleString("en-GB")}</td>
          <td>${type}</td>
          <td>${notes}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    async function getDraftCredits(clubShortName, windowStart, sixPmToday) {
      if (!clubShortName) return 0;

      const { data: firsts } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", clubShortName)
        .eq("is_first_draft_bid", true)
        .gte("created_at", windowStart.toISOString())
        .lt("created_at", sixPmToday.toISOString());

      const { data: joins } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id, draft_join_consumed")
        .eq("bidder_club_id", clubShortName)
        .eq("is_draft_join", true)
        .eq("draft_join_consumed", true)
        .gte("created_at", windowStart.toISOString())
        .lt("created_at", sixPmToday.toISOString());

      const firstCount = firsts ? firsts.length : 0;
      const uniqueJoins = joins
        ? new Set(joins.map(j => j.direct_bid_id)).size
        : 0;

      return (firstCount * 2) - uniqueJoins;
    }

    async function canClubBidOnPlayer(clubShortName, konamiId, nowLocal, sixPmToday) {
      if (!draftEnabled || !clubShortName || !randomFinishTime) return false;
      if (nowLocal >= randomFinishTime) return false;

      const { sevenPmYesterday } = getDraftWindowTimes();

      if (nowLocal >= sixPmToday) {
        const { data: pre6Bids } = await supabase
          .from("Player_Transfer_Bids")
          .select("id")
          .eq("bidder_club_id", clubShortName)
          .eq("is_direct", true)
          .gte("created_at", sevenPmYesterday.toISOString())
          .lt("created_at", sixPmToday.toISOString());

        if (!pre6Bids || !pre6Bids.length) {
          document.getElementById("bidStatus").textContent =
            "You did not bid before 18:00, so you cannot bid in the conclusion hour.";
          return false;
        }
      }

      const { data: existingBids } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id")
        .eq("direct_bid_id", konamiId)
        .eq("is_direct", true)
        .order("created_at", { ascending: true });

      if (!existingBids || !existingBids.length) return false;

      const firstBidder = existingBids[0].bidder_club_id;
      const isFirstBidder = firstBidder === clubShortName;

      if (isFirstBidder) return true;

      const { data: priorJoins } = await supabase
        .from("Player_Transfer_Bids")
        .select("id")
        .eq("direct_bid_id", konamiId)
        .eq("bidder_club_id", clubShortName)
        .eq("is_draft_join", true);

      if (priorJoins && priorJoins.length) return true;

      const creditsNow = await getDraftCredits(clubShortName, sevenPmYesterday, sixPmToday);
      if (creditsNow <= 0) {
        document.getElementById("bidStatus").textContent =
          "You need more draft credits to join this auction.";
        return false;
      }

      return true;
    }

    function setupBidControls() {
      const amountInput = document.getElementById("bidAmount");
      const quickBtn = document.getElementById("quickBidBtn");
      const incBtns = document.querySelectorAll(".inc-btn");
      const submitBtn = document.getElementById("submitBidBtn");

      amountInput.addEventListener("input", () => {
        let raw = amountInput.value.replace(/,/g, "");
        raw = raw.replace(/\D/g, "");
        const num = Number(raw || 0);
        amountInput.value = num ? num.toLocaleString("en-GB") : "";
      });

      quickBtn.onclick = () => {
        let base = currentHighestBid || 0;
        if (!base) {
          // fallback to market value if needed
          base = currentHighestBid;
        }
        const next = base + 1000000; // default +1m quick step
        document.getElementById("bidAmount").value =
          next.toLocaleString("en-GB");
      };

      incBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          let raw = amountInput.value.replace(/,/g, "");
          let current = Number(raw || 0);
          const delta = Number(btn.getAttribute("data-delta"));
          if (!current) current = currentHighestBid || 0;
          const next = current + delta;
          amountInput.value = next.toLocaleString("en-GB");
        });
      });

      submitBtn.onclick = submitBid;
    }

    function updateBidControlsState() {
      const submitBtn = document.getElementById("submitBidBtn");
      if (!canBid) {
        submitBtn.classList.add("disabled");
        submitBtn.disabled = true;
      } else {
        submitBtn.classList.remove("disabled");
        submitBtn.disabled = false;
      }
    }

    async function submitBid() {
      if (!canBid || !buyerShortName || !playerId) return;

      const amountRaw = document.getElementById("bidAmount").value;
      const amount = Number(amountRaw.replace(/,/g, ""));
      if (!amount || amount <= currentHighestBid) {
        document.getElementById("bidStatus").textContent =
          "Bid must be higher than current highest.";
        return;
      }

      const nowLocal = new Date();
      if (randomFinishTime && nowLocal >= randomFinishTime) {
        document.getElementById("bidStatus").textContent =
          "Auction has already ended.";
        updateBidControlsState();
        return;
      }

      const { sevenPmYesterday, sixPmToday } = getDraftWindowTimes();

      const { data: existingBids } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id")
        .eq("direct_bid_id", playerId)
        .eq("is_direct", true)
        .order("created_at", { ascending: true });

      if (!existingBids || !existingBids.length) {
        document.getElementById("bidStatus").textContent =
          "No existing draft auction found for this player.";
        return;
      }

      const firstBidder = existingBids[0].bidder_club_id;
      const isFirstBidder = firstBidder === buyerShortName;

      let isFirstDraftBid = false;
      let isDraftJoin = false;
      let draftJoinConsumed = false;

      if (isFirstBidder) {
        isFirstDraftBid = true;
      } else {
        isDraftJoin = true;

        const { data: priorJoins } = await supabase
          .from("Player_Transfer_Bids")
          .select("id")
          .eq("direct_bid_id", playerId)
          .eq("bidder_club_id", buyerShortName)
          .eq("is_draft_join", true);

        if (!priorJoins || !priorJoins.length) {
          const creditsNow = await getDraftCredits(buyerShortName, sevenPmYesterday, sixPmToday);
          if (creditsNow <= 0) {
            document.getElementById("bidStatus").textContent =
              "You do not have enough draft credits to join this auction.";
            return;
          }
          draftJoinConsumed = true;
        }
      }

      const { error } = await supabase
        .from("Player_Transfer_Bids")
        .insert({
          listing_id: null,
          bidder_club_id: buyerShortName,
          seller_club_id: null,
          bid_amount: amount,
          is_direct: true,
          direct_bid_id: playerId,
          is_first_draft_bid: isFirstDraftBid,
          is_draft_join: isDraftJoin,
          draft_join_consumed: draftJoinConsumed
        });

      if (error) {
        document.getElementById("bidStatus").textContent =
          "Error submitting bid. Please try again.";
        return;
      }

      document.getElementById("bidStatus").textContent =
        "Bid submitted.";
      await loadPlayerAndBids();
    }
  </script>
</body>
</html>
