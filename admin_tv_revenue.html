<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>TV revenue — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">TV revenue</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="sb-tv-revenue">
        <h2>TV revenue</h2>
        <p class="note">
          Selects big league fixtures per GPSL month per division (top-8 clashes, promotion/relegation battles, dry spells, etc.).
          Each selected match pays from a single pot: <strong>80% home</strong> / <strong>20% away</strong> of ₿ per TV match.
          Run <code>competition_tv_revenue.sql</code> after <code>government_subsidies.sql</code>.
        </p>
        <div class="row gov-subsidy-row">
          <div>
            <label>₿ per TV match (pool)</label>
            <input type="number" id="tvPerMatch" min="0" step="50000" style="width:120px;">
          </div>
          <div>
            <label>Matches per month / division</label>
            <input type="number" id="tvPerMonth" min="1" max="20" step="1" style="width:80px;">
          </div>
          <div>
            <label>Club min per season</label>
            <input type="number" id="tvClubMin" min="0" max="38" step="1" style="width:80px;">
          </div>
          <div>
            <label>Club max per season</label>
            <input type="number" id="tvClubMax" min="1" max="38" step="1" style="width:80px;">
          </div>
        </div>
        <div class="row gov-subsidy-row" style="margin-top:8px;">
          <div>
            <label>Division</label>
            <select id="tvSelectDivision">
              <option value="superleague">SuperLeague</option>
              <option value="championship_a">Championship A</option>
              <option value="championship_b">Championship B</option>
            </select>
          </div>
          <div>
            <label>GPSL month</label>
            <select id="tvSelectMonth">
              <option value="august">August</option>
              <option value="september">September</option>
              <option value="october">October</option>
              <option value="november">November</option>
              <option value="december">December</option>
              <option value="january">January</option>
              <option value="february">February</option>
              <option value="march">March</option>
              <option value="april">April</option>
              <option value="may">May</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top:12px;">
          <button type="button" id="saveTvSettingsBtn" class="button">Save TV settings</button>
          <button type="button" id="selectTvMonthBtn" class="button">Select TV for month</button>
          <button type="button" id="selectTvSeasonBtn" class="button">Select TV for season</button>
          <button type="button" id="backfillTvBtn" class="button">Backfill TV payouts (80/20 split)</button>
        </div>
        <div id="tvRevenueStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_tv_revenue.js"></script>
</body>
</html>
