<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding-top: 80px;
    }

    input {
      padding: 10px;
      width: 240px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
    }

    button {
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    a {
      color: #ff9900;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Login</h1>

  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button id="loginBtn">Login</button>
  <br><br>

  <a id="resetBtn">Forgot your password?</a>
  <p style="margin-top:28px;font-size:14px;color:#999;">
    New to GPSL? Join via the invite link in Discord<br>
    (<a href="join_gpsl.html">Discord join page</a> — server members only).
  </p>

  <!-- SUPABASE CLIENT -->
  <script type="module">
    import { supabase, waitForAuthSession } from "./supabase_client.js";

    window.supabase = supabase;

    /* LOGIN */
    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Enter email and password.");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        alert(error.message);
        return;
      }

      const session = await waitForAuthSession();
      if (!session?.user) {
        alert(
          "Login succeeded but the session could not be saved. On iPhone: Settings → Safari → turn off “Prevent Cross-Site Tracking” for this site, or allow cookies, then try again."
        );
        return;
      }

      try {
        await supabase.rpc("record_owner_site_login");
      } catch (_) {
        /* Patch not applied yet — ignore */
      }

      let dest = "dashboard.html";
      try {
        const { data: self } = await supabase.rpc("owner_registry_get_self");
        if (self?.is_archived) {
          dest = "member_home.html?archived=1";
        } else if (self && !self.has_club && self.needs_club_auction) {
          dest = "awaiting_club.html";
        } else if (self && !self.has_club && self.is_member) {
          dest = "member_home.html";
        } else if (
          self &&
          !self.has_club &&
          !self.is_member &&
          self.status == null
        ) {
          dest = "member_home.html";
        }
      } catch (_) {
        /* RPC missing — fall back to dashboard */
      }

      window.location.assign(dest);
    };

    /* PASSWORD RESET */
    document.getElementById("resetBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();

      if (!email) {
        alert("Enter your email first.");
        return;
      }

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "https://gpsuperleague.github.io/GPSL/reset_password.html"

    });


      if (error) {
        alert(error.message);
        return;
      }

      alert("Password reset email sent.");
    };
  </script>

</body>
</html>
