<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Archive owner — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .card .note { color:#999; font-size:13px; line-height:1.45; margin:0 0 12px; }
    button.button.secondary { background:#444; color:#ddd; }
    button.button.secondary:hover { background:#555; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Archive owner (left GPSL)</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="ow-archive">
        <h2>Archive owner (left GPSL)</h2>
        <p class="note">
          Same detach as a break, but marks the owner <b>archived</b> (left or removed).
          History is retained. Unarchive before linking them to a club again.
        </p>
        <div class="row">
          <div><input id="archiveOwnerEmail" placeholder="Owner email"></div>
          <div><input id="archiveOwnerNote" placeholder="Optional note"></div>
        </div>
        <button id="archiveOwnerBtn" class="button secondary">Archive owner</button>
        <div id="archiveOwnerStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_owners.js"></script>
</body>
</html>
