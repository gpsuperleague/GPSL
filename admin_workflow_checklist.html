<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Admin checklist — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .wf-note { color:#999; font-size:13px; line-height:1.45; margin:0 0 14px; max-width:900px; }
    .wf-summary {
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      margin-bottom:16px; font-size:13px;
    }
    .wf-summary .pill {
      padding:6px 10px; background:#1a1a1a; border:1px solid #333; border-radius:4px;
    }
    .wf-summary .pill strong { color:#e8d9b0; }
    .wf-toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .wf-section { margin:0 0 22px; }
    .wf-section h2 {
      margin:0 0 10px; font-size:16px; color:#ff9900;
      border-bottom:1px solid #333; padding-bottom:6px;
    }
    .wf-group-label {
      margin:12px 0 6px; font-size:12px; color:#888; text-transform:uppercase;
      letter-spacing:0.04em;
    }
    .wf-list { list-style:none; margin:0; padding:0; }
    .wf-item {
      display:flex; align-items:flex-start; gap:10px;
      padding:8px 10px; border-radius:4px; border:1px solid transparent;
    }
    .wf-item:hover { background:#181818; border-color:#2a2a2a; }
    .wf-item.done { opacity:0.72; }
    .wf-item.done .wf-label { text-decoration:line-through; color:#888; }
    .wf-item input[type="checkbox"] {
      margin-top:3px; width:16px; height:16px; flex-shrink:0; accent-color:#c4a35a;
    }
    .wf-body { flex:1; min-width:0; }
    .wf-label { font-size:14px; color:#ddd; }
    .wf-meta { margin-top:4px; font-size:12px; }
    .wf-meta a { color:#8cf; text-decoration:none; }
    .wf-meta a:hover { text-decoration:underline; }
    .wf-progress-bar {
      height:8px; background:#222; border-radius:4px; overflow:hidden;
      flex:1; min-width:120px; max-width:280px;
    }
    .wf-progress-bar > span {
      display:block; height:100%; background:#c4a35a; width:0%;
      transition:width 0.2s ease;
    }
    .status-line { margin-top:8px; font-size:13px; color:#aaa; }
    .status-line.error { color:#f88; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Admin checklist</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card">
        <p class="wf-note">
          Manual ticks for Admin menu tasks (excludes <b>Testing</b> and <b>Owners</b>).
          Progress is stored per current season — run
          <code>supabase/sql/patches/admin_workflow_checklist.sql</code> in Supabase so ticks are shared.
          Until then, ticks stay in this browser only.
        </p>
        <div class="wf-summary">
          <span class="pill" id="wfSeasonLabel">Season: …</span>
          <span class="pill"><strong id="wfDoneCount">0</strong> / <span id="wfTotalCount">0</span> done</span>
          <div class="wf-progress-bar" title="Progress"><span id="wfProgressFill"></span></div>
        </div>
        <div class="wf-toolbar">
          <button type="button" id="wfExpandAll" class="button secondary">Expand all</button>
          <button type="button" id="wfCollapseAll" class="button secondary">Collapse all</button>
          <button type="button" id="wfHideDone" class="button secondary">Hide completed</button>
        </div>
        <div id="wfRoot"></div>
        <div id="wfStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_workflow_checklist.js?v=20260718-eos-checklist"></script>
</body>
</html>
