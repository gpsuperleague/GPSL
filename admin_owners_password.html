<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Set password — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .card .note { color:#999; font-size:13px; line-height:1.45; margin:0 0 12px; }
    button.button.secondary { background:#444; color:#ddd; }
    button.button.secondary:hover { background:#555; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Set password (admin)</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="ow-set-password">
        <h2>Set password (admin)</h2>
        <p class="note">
          Sets the login password immediately — for testing or when reset email is not enough.
          Supabase may reject weak passwords (use at least 8 characters with letters and numbers).
          Deploy the <code>set-owner-password</code> edge function in Supabase.
        </p>
        <div class="row">
          <div><input id="setPasswordEmail" type="email" placeholder="Owner email"></div>
          <div>
            <input
              id="setPasswordValue"
              type="password"
              autocomplete="new-password"
              placeholder="New password (min 8 chars)"
            >
          </div>
        </div>
        <button id="setPasswordBtn" class="button">Set password</button>
        <div id="setPasswordStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_owners.js"></script>
</body>
</html>
