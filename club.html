<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://omyyogfumrjoaweuawjn.supabase.co',
  'YOUR_PUBLIC_ANON_KEY'
)

// Read ?id=12 from URL
const params = new URLSearchParams(window.location.search)
const clubId = params.get("id")

async function loadClub() {
  const { data: club, error } = await supabase
    .from("Clubs")
    .select("*")
    .eq("id", clubId)
    .single()

  if (error) {
    console.error(error)
    return
  }

  // Set page title
  document.getElementById("clubName").textContent = club.name
}

async function loadPlayers() {
  const { data, error } = await supabase
    .from("Players")
    .select("*")
    .eq("club_id", clubId)

  if (error) {
    console.error(error)
    return
  }

  const head = document.getElementById("tableHead")
  const body = document.getElementById("tableBody")

  if (!data.length) {
    head.innerHTML = "<tr><th>No players found</th></tr>"
    return
  }

  const cols = Object.keys(data[0])

  head.innerHTML = `
    <tr>${cols.map(c => `<th>${c.replace(/_/g, " ")}</th>`).join("")}</tr>
  `

  body.innerHTML = data.map(player => `
    <tr>
      ${cols.map(c => `<td>${player[c]}</td>`).join("")}
    </tr>
  `).join("")
}

loadClub()
loadPlayers()
</script>
