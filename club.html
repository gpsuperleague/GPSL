<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Club Squad</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #nav {
      padding: 15px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      text-align: center;
      margin-bottom: 20px;
    }

    a.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
    }

    a.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    .club-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .club-header img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    h2.section-title {
      margin-left: 20px;
      color: #ff9900;
      margin-top: 40px;
    }

    .panel {
      background: #1a1a1a;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      table-layout: fixed;
    }

    table.gpsl-table th,
    table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
    }

    table.gpsl-table th:nth-child(1),
    table.gpsl-table td:nth-child(1) { width: 28%; }

    table.gpsl-table th:nth-child(2),
    table.gpsl-table td:nth-child(2) { width: 10%; }

    table.gpsl-table th:nth-child(3),
    table.gpsl-table td:nth-child(3) { width: 12%; }

    table.gpsl-table th:nth-child(4),
    table.gpsl-table td:nth-child(4) { width: 10%; }

    table.gpsl-table th:nth-child(5),
    table.gpsl-table td:nth-child(5) { width: 20%; }

    table.gpsl-table th:nth-child(6),
    table.gpsl-table td:nth-child(6) { width: 20%; }
  </style>
</head>

<body>

  <div id="nav"></div>

  <div id="clubHeader" class="club-header"></div>

  <div id="squadContainer"></div>

  <!-- SUPABASE MODULE -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'https://omyyogfumrjoaweuawjn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4'
    );

    const params = new URLSearchParams(window.location.search);
    const fullClubName = params.get("club");

    let clubShortName = null;

    async function loadClub() {
      const { data: club, error } = await supabase
        .from("Clubs")
        .select("*")
        .eq("Club", fullClubName)
        .single();

      if (error) {
        console.error("Club load error:", error);
        document.getElementById("clubHeader").innerHTML = "<h1>Club not found</h1>";
        return;
      }

      clubShortName = club.ShortName;

      document.getElementById("clubHeader").innerHTML = `
        <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
        <div>
          <h1>${club.Club}</h1>
          <div><strong>Stadium:</strong> ${club.Stadium}</div>
          <div><strong>Capacity:</strong> ${club.Capacity.toLocaleString()}</div>
          <div><strong>Nation:</strong> ${club.Nation}</div>
        </div>
      `;
    }

    const POSITION_GROUPS = {
      "Goalkeepers": ["GK"],
      "Defenders": ["LB", "CB", "RB"],
      "Midfielders": ["DMF", "LMF", "CMF", "RMF", "AMF"],
      "Attackers": ["SS", "LW", "CF", "RW"]
    };

    async function loadPlayers() {
      if (!clubShortName) return;

      const { data, error } = await supabase
        .from("Players")
        .select("Name, Nation, Position, Rating, market_value, Playstyle")
        .eq("Contracted_Team", clubShortName);

      if (error) {
        console.error("Players load error:", error);
        return;
      }

      const container = document.getElementById("squadContainer");
      container.innerHTML = "";

      for (const [groupName, positions] of Object.entries(POSITION_GROUPS)) {

        const groupPlayers = data
          .filter(p => positions.includes(p.Position))
          .sort((a, b) => {
            const posA = positions.indexOf(a.Position);
            const posB = positions.indexOf(b.Position);
            if (posA !== posB) return posA - posB;
            return b.market_value - a.market_value;
          });

        if (!groupPlayers.length) continue;

        container.innerHTML += `
          <h2 class="section-title">${groupName}</h2>
          <div class="panel">
            <table class="gpsl-table">
              <thead>
                <tr>
                  <th>Player</th>
                  <th>Nat</th>
                  <th>Pos</th>
                  <th>Rating</th>
                  <th>Value</th>
                  <th>Playstyle</th>
                </tr>
              </thead>
              <tbody>
                ${groupPlayers.map(p => `
                  <tr>
                    <td>${p.Name}</td>
                    <td>${p.Nation}</td>
                    <td>${p.Position}</td>
                    <td>${p.Rating}</td>
                    <td>₿ ${Number(p.market_value).toLocaleString("en-GB")}</td>
                    <td>${p.Playstyle || "-"}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }
    }

    (async () => {
      await loadClub();
      await loadPlayers();
    })();
  </script>

  <!-- FIREBASE (still present for now) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase.js"></script>

  <!-- FIXED NAV + AUTH -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {

    let currentUser = null;

    function logout() {
      try {
        if (window.auth) {
          auth.signOut().then(() => window.location = "login.html");
        } else {
          window.location = "login.html";
        }
      } catch (err) {
        console.error("Logout failed:", err);
        window.location = "login.html";
      }
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      if (!nav) {
        console.error("NAV element missing");
        return;
      }

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      const adminEmails = ["rotavator66@outlook.com"];
      if (currentUser && adminEmails.includes(currentUser.email)) {
        nav.innerHTML += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }
    }

    function safeInit() {
      console.log("Initialising club page...");
      buildNav();
    }

    try {
      if (window.auth) {
        window.auth.onAuthStateChanged(user => {
          currentUser = user;

          if (!user) {
            window.location = "login.html";
            return;
          }

          safeInit();
        });
      } else {
        console.warn("Firebase auth not found — continuing anonymously");
        safeInit();
      }
    } catch (err) {
      console.error("Auth init failed:", err);
      safeInit();
    }

  });
  </script>

</body>
</html>
