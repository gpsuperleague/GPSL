<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Club Squad</title>

  <!-- Use dashboard styling -->
  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #nav {
      padding: 15px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      text-align: center;
      margin-bottom: 20px;
    }

    a.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
    }

    a.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    .club-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .club-header img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    h2 {
      margin-left: 20px;
      color: #ff9900;
    }

    .panel {
      background: #1a1a1a;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
    }

    table.gpsl-table th,
    table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      text-align: left;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div id="nav"></div>

  <!-- CLUB HEADER -->
  <div id="clubHeader" class="club-header"></div>

  <h2>Squad List</h2>

  <div class="panel">
    <table class="gpsl-table">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    import { loadClubsMap, shortNameFromFull } from "./clubs_lookup.js";

    const supabase = createClient(
      'https://omyyogfumrjoaweuawjn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4'
    );

    await loadClubsMap();

    const params = new URLSearchParams(window.location.search);
    const fullClubName = params.get("club");
    const short = shortNameFromFull(fullClubName);

    /* LOAD CLUB INFO */
    async function loadClub() {
      const { data: club, error } = await supabase
        .from("Clubs")
        .select("*")
        .eq("ShortName", short)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      document.getElementById("clubHeader").innerHTML = `
        <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
        <div>
          <h1>${club.Club}</h1>
          <div><strong>Stadium:</strong> ${club.Stadium}</div>
          <div><strong>Capacity:</strong> ${club.Capacity.toLocaleString()}</div>
          <div><strong>Nation:</strong> ${club.Nation}</div>
        </div>
      `;
    }

    /* LOAD SQUAD */
    async function loadPlayers() {
      const { data, error } = await supabase
        .from("Players")
        .select("Name, Nationality, Position, Rating, Value, Status")
        .eq("Contracted_Team", short)
        .order("Rating", { ascending: false });

      const head = document.getElementById("tableHead");
      const body = document.getElementById("tableBody");

      if (error) {
        console.error(error);
        head.innerHTML = "<tr><th>Error loading players</th></tr>";
        return;
      }

      if (!data.length) {
        head.innerHTML = "<tr><th>No players found</th></tr>";
        return;
      }

      head.innerHTML = `
        <tr>
          <th>Player</th>
          <th>Nat</th>
          <th>Pos</th>
          <th>Rating</th>
          <th>Value</th>
          <th>Status</th>
        </tr>
      `;

      body.innerHTML = data.map(p => `
        <tr>
          <td>${p.Name}</td>
          <td>${p.Nationality}</td>
          <td>${p.Position}</td>
          <td>${p.Rating}</td>
          <td>₿ ${p.Value.toLocaleString()}</td>
          <td>${p.Status || "-"}</td>
        </tr>
      `).join("");
    }

    loadClub();
    loadPlayers();
  </script>

  <!-- AUTH -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase.js"></script>

  <script>
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <button onclick="logout()" class="button">Logout</button>
      `;
    });

    function logout() {
      auth.signOut().then(() => window.location = "login.html");
    }
  </script>

</body>
</html>
