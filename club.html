<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Club Squad</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .modal-footer .button,
    .modal-footer .cancel-btn,
    .modal-footer .submit-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    .modal-footer .button:hover,
    .modal-footer .cancel-btn:hover,
    .modal-footer .submit-btn:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    .club-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .club-header img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .club-header-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      line-height: 1.45;
    }

    .club-header-meta h1 {
      margin: 0 0 6px;
    }

    h2.section-title {
      margin-left: 20px;
      color: #ff9900;
      margin-top: 40px;
    }

    .panel {
      background: #1a1a1a;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      table-layout: fixed;
    }

    table.gpsl-table th,
    table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
    }

    tr.club-row-suspended {
      background: rgba(160, 55, 35, 0.22) !important;
    }
    tr.club-row-injured {
      background: rgba(40, 90, 120, 0.22) !important;
    }
    tr.club-row-recovery {
      background: rgba(60, 100, 40, 0.18) !important;
    }
    .suspension-badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 10px;
      font-weight: 600;
      color: #ffd0a8;
      background: #5a2018;
      border: 1px solid #a04830;
      border-radius: 4px;
      padding: 1px 6px;
      vertical-align: middle;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .injury-badge {
      display: inline-block;
      margin-left: 6px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
      padding: 1px 6px;
      vertical-align: middle;
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .injury-badge-out {
      color: #9ed4f0;
      background: #1a3a4a;
      border: 1px solid #3a6a8a;
    }
    .injury-badge-recovery {
      color: #c8e89a;
      background: #2a3a1a;
      border: 1px solid #5a7a3a;
    }

    .club-thumb {
      height: 70px;
      width: auto;
      border-radius: 6px;
      object-fit: contain;
    }

    table.gpsl-table th:nth-child(1),
    table.gpsl-table td:nth-child(1) { width: 9%; }

    table.gpsl-table th:nth-child(2),
    table.gpsl-table td:nth-child(2) { width: 22%; }

    table.gpsl-table th:nth-child(3),
    table.gpsl-table td:nth-child(3) { width: 8%; }

    table.gpsl-table th:nth-child(4),
    table.gpsl-table td:nth-child(4) { width: 8%; }

    table.gpsl-table th:nth-child(5),
    table.gpsl-table td:nth-child(5) { width: 9%; }

    table.gpsl-table th:nth-child(6),
    table.gpsl-table td:nth-child(6) { width: 15%; }

    table.gpsl-table th:nth-child(7),
    table.gpsl-table td:nth-child(7) { width: 12%; }

    table.gpsl-table th:nth-child(8),
    table.gpsl-table td:nth-child(8) {
      width: 18%;
      text-align: center;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.35;
      vertical-align: middle;
    }

    table.gpsl-table td:nth-child(7) {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.3;
    }

    .player-link {
      color: #fff;
      text-decoration: none;
    }

    .player-link:hover {
      text-decoration: underline;
      color: #ffcc66;
    }

    .offer-btn {
      background: #ff9900;
      color: #111;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    .offer-btn:hover {
      background: #ffaa22;
      transform: scale(1.03);
    }

    .offer-review-msg {
      display: inline-block;
      max-width: 100%;
      color: #ff9900;
      font-size: 11px;
      font-weight: bold;
      line-height: 1.35;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    table.gpsl-table td:nth-child(8) .offer-btn {
      white-space: nowrap;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.7);
    }

    .modal-content {
      background: #1a1a1a;
      margin: 5% auto;
      padding: 20px;
      border: 1px solid #333;
      width: 650px;
      border-radius: 8px;
      color: #ddd;
      display: flex;
      gap: 20px;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #fff;
    }

    .modal-left {
      width: 40%;
      text-align: center;
    }

    .modal-right {
      width: 60%;
    }

    .modal-player-card {
      background: #111;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #333;
      position: relative;
    }

    .modal-player-img {
      width: 100%;
      border-radius: 8px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .modal-player-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .modal-player-meta {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 2px;
    }

    .modal label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .modal input[type="text"] {
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #111;
      color: #ddd;
      font-size: 14px;
    }

    #offerSquadWarning {
      color: #e6c200;
      font-size: 13px;
      margin: 10px 0;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .formatted-amount {
      margin-top: 4px;
      font-size: 12px;
      color: #ccc;
    }

    .increment-row {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .inc-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #ddd;
      cursor: pointer;
    }

    .inc-btn:hover {
      background: #333;
    }

    .modal-footer {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-footer-left {
      flex: 1;
    }

    .modal-footer-right {
      display: flex;
      gap: 10px;
    }

    .quick-bid-btn {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      border: 1px solid #2f7a2f;
      background: #2f7a2f;
      color: #fff;
      cursor: pointer;
    }

    .quick-bid-btn:hover {
      background: #369a36;
    }

    .cancel-btn {
      background: #555;
      color: #eee;
    }

    .cancel-btn:hover {
      background: #666;
    }

    .submit-btn {
      background: #ff9900;
      color: #111;
    }

    .submit-btn:hover {
      background: #ffaa22;
    }

    .window-closed-note {
      margin: 0 20px 20px 20px;
      color: #ff6666;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="nav"></div>

  <div id="clubHeader" class="club-header"></div>

  <div id="windowNote" class="window-closed-note"></div>

  <div id="squadContainer"></div>

  <!-- Offer Modal -->
  <div id="offerModal" class="modal">
    <div class="modal-content">
      <div class="modal-left">
        <div class="modal-player-card">
          <span id="closeOfferModal" class="close">&times;</span>
          <img id="offerPlayerImg" class="modal-player-img" src="" alt="Player card">
          <div class="modal-player-name" id="offerPlayerName"></div>
          <div class="modal-player-meta" id="offerPlayerPos"></div>
          <div class="modal-player-meta" id="offerPlayerRating"></div>
          <div class="modal-player-meta" id="offerPlayerAge"></div>
          <div class="modal-player-meta" id="offerPlayerPlaystyle"></div>
          <div class="modal-player-meta" id="offerPlayerValue"></div>
        </div>
      </div>

      <div class="modal-right">
        <h3>Submit Direct Offer</h3>

        <label for="offerAmount">Bid Amount (₿):</label>
        <input type="text" id="offerAmount">
        <div id="offerAmountFormatted" class="formatted-amount"></div>
        <div id="offerSquadWarning" role="status" aria-live="polite"></div>

        <div class="increment-row">
          <button class="inc-btn" data-delta="-500000">-500k</button>
          <button class="inc-btn" data-delta="-1000000">-1m</button>
          <button class="inc-btn" data-delta="-5000000">-5m</button>
          <button class="inc-btn" data-delta="500000">+500k</button>
          <button class="inc-btn" data-delta="1000000">+1m</button>
          <button class="inc-btn" data-delta="5000000">+5m</button>
        </div>

        <div class="modal-footer">
          <div class="modal-footer-left">
            <button id="quickBidBtn" class="quick-bid-btn">Quick Bid (Market Value)</button>
          </div>
          <div class="modal-footer-right">
            <button id="cancelOfferBtn" class="button cancel-btn">Cancel</button>
            <button id="submitOfferBtn" class="button submit-btn">Submit Offer for Review</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SUPABASE MODULE -->
  <script type="module">
    import { initGlobal, supabase } from "./global.js";
    import {
      loadTransferStatusState,
      resolvePlayerTransferStatus,
      formatTransferStatusMessageHtml,
      TRANSFER_STATUS,
    } from "./player_transfer_status.js";
    import {
      loadActiveSuspensions,
      suspensionsByPlayerId,
      formatSuspensionBadgeHtml,
      loadClubActiveInjuries,
      injuriesByPlayerId,
      formatInjuryBadgeHtml,
    } from "./player_discipline.js";
    import { SAME_SEASON_TRANSFER_MESSAGE } from "./player_season_transfer.js";
    import {
      confirmSquadRulesBeforeBid,
      squadRulesBidWarningLines,
    } from "./squad_rules.js";
    import {
      playerThumbLinkHtml,
      playerNameLinkHtml,
      pesdbPlayerCardUrl,
    } from "./player_links.js";

    let transferWindowOpen = false;
    let buyerShortName = null;
    let buyerClubNation = null;
    let currentOfferPlayer = null;
    let currentOfferKonamiId = null;
    let currentOfferSellerClub = null;
    let currentPlayerMarketValue = null;
    let transferStatusState = null;
    /** @type {Map<string, any[]>} */
    let clubSuspensionsByPlayer = new Map();
    /** @type {Map<string, any[]>} */
    let clubInjuriesByPlayer = new Map();

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location = "login.html";
        return;
      }

      await initGlobal();

      await loadTransferWindowStatus();
      await loadBuyerClubShortName(user.id);
      await loadClub();
      transferStatusState = await loadTransferStatusState(supabase);
      await loadPlayers();
      setupModalHandlers();
    });

    async function loadTransferWindowStatus() {
      const { data, error } = await supabase
        .from("global_settings_public")
        .select("transfer_window_open")
        .eq("id", 1)
        .single();

      if (!error && data) {
        transferWindowOpen = data.transfer_window_open === true;
      } else {
        transferWindowOpen = false;
      }

      const note = document.getElementById("windowNote");
      if (!transferWindowOpen) {
        note.textContent = "Transfer window is currently CLOSED. Direct offers are disabled.";
      } else {
        note.textContent = "";
      }
    }

    async function loadBuyerClubShortName(authId) {
      const { data, error } = await supabase
        .from("Clubs")
        .select("ShortName, Nation")
        .eq("owner_id", authId)
        .single();

      if (error || !data) {
        console.error("Could not resolve buyer club from owner_id", error);
        buyerShortName = null;
        buyerClubNation = null;
        return;
      }

      buyerShortName = data.ShortName;
      buyerClubNation = data.Nation ?? null;
    }

    const params = new URLSearchParams(window.location.search);
    const fullClubName = params.get("club");

    let clubShortName = null;

    async function loadClub() {
      const { data: club, error } = await supabase
        .from("Clubs")
        .select("*")
        .eq("Club", fullClubName)
        .single();

      if (error || !club) {
        document.getElementById("clubHeader").innerHTML = "<h1>Club not found</h1>";
        return;
      }

      clubShortName = club.ShortName;

      const managerLine = await loadClubManagerLine(club.ShortName);

      document.getElementById("clubHeader").innerHTML = `
        <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
        <div class="club-header-meta">
          <h1>${club.Club}</h1>
          <div><strong>Stadium:</strong> ${club.Stadium}</div>
          <div><strong>Capacity:</strong> ${club.Capacity.toLocaleString()}</div>
          <div><strong>Nation:</strong> ${club.Nation}</div>
          <div><strong>Owner:</strong> ${club.owner ? club.owner : "<em>Unowned</em>"}</div>
          ${managerLine}
        </div>
      `;
    }

    async function loadClubManagerLine(clubShort) {
      const { data, error } = await supabase
        .from("manager_club_status_public")
        .select("manager_id, manager_name, manager_rating")
        .eq("club_short_name", clubShort)
        .maybeSingle();

      if (error) {
        console.warn("Manager status unavailable:", error.message);
        return "<div><strong>Manager:</strong> <em>—</em></div>";
      }

      if (!data?.manager_id || !data.manager_name) {
        return "<div><strong>Manager:</strong> <em>No manager employed</em></div>";
      }

      const href = `manager_draftauction_manager.html?manager=${encodeURIComponent(data.manager_id)}`;
      const rating =
        data.manager_rating != null ? ` (rating ${data.manager_rating})` : "";

      return `<div><strong>Manager:</strong> <a class="player-link" href="${href}">${data.manager_name}</a>${rating}</div>`;
    }

    const POSITION_GROUPS = {
      "Goalkeepers": ["GK"],
      "Defenders": ["LB", "CB", "RB"],
      "Midfielders": ["DMF", "LMF", "CMF", "RMF", "AMF"],
      "Attackers": ["SS", "LW", "CF", "RW"]
    };

    function clubOfferCellHtml(p) {
      const status = resolvePlayerTransferStatus({
        konamiId: p.Konami_ID,
        contractedTeam: p.Contracted_Team,
        viewerClubShort: buyerShortName,
        pageClubShort: clubShortName,
        state: transferStatusState,
        seasonSigned: p.Season_Signed,
      });

      if (
        status.code === TRANSFER_STATUS.LISTED ||
        status.code === TRANSFER_STATUS.DIRECT_OFFER_SELLER ||
        status.code === TRANSFER_STATUS.OFFER_PENDING ||
        status.code === TRANSFER_STATUS.SELLER_REVIEW ||
        status.code === TRANSFER_STATUS.SIGNED_THIS_SEASON
      ) {
        return formatTransferStatusMessageHtml(status, "offer-review-msg");
      }

      if (
        transferWindowOpen &&
        buyerShortName &&
        buyerShortName !== p.Contracted_Team
      ) {
        return `<button 
                          class="offer-btn" 
                          data-konami-id="${p.Konami_ID}" 
                          data-name="${p.Name}"
                          data-seller="${p.Contracted_Team}"
                        >
                          Make Offer
                        </button>`;
      }

      return "";
    }

    async function loadPlayers() {
      if (!clubShortName) return;

      const [{ data, error }, suspensionList, injuryList] = await Promise.all([
        supabase
          .from("Players")
          .select("Name, Nation, Position, Rating, Age, market_value, Playstyle, Konami_ID, Contracted_Team, Season_Signed")
          .eq("Contracted_Team", clubShortName),
        loadActiveSuspensions(supabase, { club: clubShortName }),
        loadClubActiveInjuries(supabase, clubShortName),
      ]);

      if (error) {
        console.error("Players load error:", error);
        return;
      }

      clubSuspensionsByPlayer = suspensionsByPlayerId(suspensionList);
      clubInjuriesByPlayer = injuriesByPlayerId(injuryList);

      const container = document.getElementById("squadContainer");
      container.innerHTML = "";

      for (const [groupName, positions] of Object.entries(POSITION_GROUPS)) {

        const groupPlayers = data
          .filter(p => positions.includes(p.Position))
          .sort((a, b) => {
            const posA = positions.indexOf(a.Position);
            const posB = positions.indexOf(b.Position);
            if (posA !== posB) return posA - posB;
            return b.market_value - a.market_value;
          });

        if (!groupPlayers.length) continue;

               container.innerHTML += `
          <h2 class="section-title">${groupName}</h2>
          <div class="panel">
            <table class="gpsl-table">
              <thead>
                <tr>
                  <th></th>
                  <th>Player</th>
                  <th>Nat</th>
                  <th>Pos</th>
                  <th>Rating</th>
                  <th>Value</th>
                  <th>Playstyle</th>
                  <th>Offer</th>
                </tr>
              </thead>
              <tbody>
                ${groupPlayers.map(p => {
                  const pid = String(p.Konami_ID);
                  const suspRows = clubSuspensionsByPlayer.get(pid) || [];
                  const injuryRows = clubInjuriesByPlayer.get(pid) || [];
                  const suspBadge = formatSuspensionBadgeHtml(suspRows);
                  const injuryBadge = formatInjuryBadgeHtml(injuryRows);
                  const injuredOut = injuryRows.some(
                    (i) => (Number(i.matches_out_remaining) || 0) > 0 || i.phase === "out"
                  );
                  const rowClass = suspRows.length
                    ? ' class="club-row-suspended"'
                    : injuredOut
                      ? ' class="club-row-injured"'
                      : injuryRows.length
                        ? ' class="club-row-recovery"'
                        : "";
                  return `
                  <tr${rowClass}>
                    <td>${playerThumbLinkHtml(p.Konami_ID, {
                      className: "club-thumb",
                      alt: p.Name,
                    })}</td>
                    <td>${playerNameLinkHtml(p.Konami_ID, p.Name)}${injuryBadge}${suspBadge}</td>
                    <td>${p.Nation}</td>
                    <td>${p.Position}</td>
                    <td>${p.Rating}</td>
                    <td>₿ ${Number(p.market_value).toLocaleString("en-GB")}</td>
                    <td>${p.Playstyle || "-"}</td>
                    <td>${clubOfferCellHtml(p)}</td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
      }
    }

    /* ---------------------------------------------------------
       MODAL HANDLERS + FORMATTING LOGIC
    --------------------------------------------------------- */
    function setupModalHandlers() {
      const modal = document.getElementById("offerModal");
      const closeBtn = document.getElementById("closeOfferModal");
      const cancelBtn = document.getElementById("cancelOfferBtn");
      const amountInput = document.getElementById("offerAmount");
      const amountFormatted = document.getElementById("offerAmountFormatted");
      const quickBidBtn = document.getElementById("quickBidBtn");
      const incButtons = document.querySelectorAll(".inc-btn");

      amountInput.addEventListener("input", () => {
        let raw = amountInput.value.replace(/,/g, "");
        raw = raw.replace(/\D/g, "");
        let num = Number(raw);

        if (currentPlayerMarketValue && num < currentPlayerMarketValue) {
          num = currentPlayerMarketValue;
        }

        amountInput.value = num ? num.toLocaleString("en-GB") : "";
        amountFormatted.textContent = num
          ? "Formatted: ₿ " + num.toLocaleString("en-GB")
          : "";
      });

      const resetModalState = () => {
        modal.style.display = "none";
        amountInput.value = "";
        amountFormatted.textContent = "";
        currentOfferKonamiId = null;
        currentOfferSellerClub = null;
        currentPlayerMarketValue = null;
        currentOfferPlayer = null;
        const squadWarn = document.getElementById("offerSquadWarning");
        if (squadWarn) squadWarn.textContent = "";
      };

      closeBtn.onclick = resetModalState;
      cancelBtn.onclick = resetModalState;

      window.onclick = (event) => {
        if (event.target === modal) {
          resetModalState();
        }
      };

      document.addEventListener("click", async (e) => {
        if (e.target.classList && e.target.classList.contains("offer-btn")) {
          if (!transferWindowOpen) return;
          if (!buyerShortName) {
            alert("Your club could not be resolved. Contact admin.");
            return;
          }

          const name = e.target.getAttribute("data-name");
          const konamiId = e.target.getAttribute("data-konami-id");
          const seller = e.target.getAttribute("data-seller");

          currentOfferKonamiId = konamiId;
          currentOfferSellerClub = seller;

          await populateModalPlayerDetails(konamiId, name);

          modal.style.display = "block";
        }
      });

      incButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          let raw = amountInput.value.replace(/,/g, "");
          let current = Number(raw || 0);
          let delta = Number(btn.getAttribute("data-delta"));
          let next = current + delta;

          if (currentPlayerMarketValue && next < currentPlayerMarketValue) {
            next = currentPlayerMarketValue;
          }

          amountInput.value = next.toLocaleString("en-GB");
          amountFormatted.textContent =
            "Formatted: ₿ " + next.toLocaleString("en-GB");
        });
      });

      quickBidBtn.onclick = () => {
        if (currentPlayerMarketValue != null) {
          amountInput.value = currentPlayerMarketValue.toLocaleString("en-GB");
          amountFormatted.textContent =
            "Formatted: ₿ " + currentPlayerMarketValue.toLocaleString("en-GB");
        }
      };

      document.getElementById("submitOfferBtn").onclick = submitOffer;
    }

    /* ---------------------------------------------------------
       POPULATE MODAL WITH PLAYER DETAILS
    --------------------------------------------------------- */
    async function populateModalPlayerDetails(konamiId, fallbackName) {
      const { data, error } = await supabase
        .from("Players")
        .select("Name, Nation, Position, Rating, Age, Playstyle, market_value, Konami_ID")
        .eq("Konami_ID", konamiId)
        .single();

      const player = !error && data ? data : null;
      currentOfferPlayer = player;

      const name = player ? player.Name : fallbackName;
      const pos = player ? player.Position : "-";
      const rating = player ? player.Rating : "-";
      const age = player ? player.Age : "-";
      const playstyle = player ? (player.Playstyle || "-") : "-";
      const value = player ? Number(player.market_value || 0) : 0;
      const imgId = player ? player.Konami_ID : konamiId;

      currentPlayerMarketValue = value || 0;

      document.getElementById("offerPlayerName").textContent = name;
      document.getElementById("offerPlayerPos").textContent = `Position: ${pos}`;
      document.getElementById("offerPlayerRating").textContent = `Rating: ${rating}`;
      document.getElementById("offerPlayerAge").textContent = `Age: ${age}`;
      document.getElementById("offerPlayerPlaystyle").textContent = `Playstyle: ${playstyle}`;
      document.getElementById("offerPlayerValue").textContent =
        `Market Value: ₿ ${Number(value).toLocaleString("en-GB")}`;

      document.getElementById("offerPlayerImg").src = pesdbPlayerCardUrl(imgId);
      document.getElementById("offerPlayerImg").onerror = function () {
        this.src = 'images/silhouette.png';
      };

      const amountInput = document.getElementById("offerAmount");
      amountInput.value = value.toLocaleString("en-GB");
      document.getElementById("offerAmountFormatted").textContent =
        "Formatted: ₿ " + value.toLocaleString("en-GB");

      const squadWarnEl = document.getElementById("offerSquadWarning");
      if (squadWarnEl) squadWarnEl.textContent = "";
      if (buyerShortName && player) {
        const lines = await squadRulesBidWarningLines(
          supabase,
          buyerShortName,
          buyerClubNation,
          player
        );
        if (squadWarnEl && lines.length) {
          squadWarnEl.textContent = lines.map((l) => `⚠ ${l}`).join("\n\n");
        }
      }
    }

    /* ---------------------------------------------------------
       SUBMIT OFFER
    --------------------------------------------------------- */
    async function submitOffer() {
      if (!currentOfferKonamiId || !currentOfferSellerClub) {
        alert("No player selected for offer.");
        return;
      }

      if (!buyerShortName) {
        alert("Your club could not be resolved. Contact admin.");
        return;
      }

      if (!transferWindowOpen) {
        alert("Transfer window is closed. Offers are disabled.");
        return;
      }

      const amountRaw = document.getElementById("offerAmount").value;
      const amount = Number(amountRaw.replace(/,/g, ""));

      if (!amount || amount <= 0) {
        alert("Enter a valid bid amount.");
        return;
      }

      if (currentPlayerMarketValue != null && amount < currentPlayerMarketValue) {
        alert(
          "Minimum bid is the player's market value: ₿ " +
          currentPlayerMarketValue.toLocaleString("en-GB")
        );
        return;
      }

      const { data: offerPlayer } = await supabase
        .from("Players")
        .select("Season_Signed, Nation, Age")
        .eq("Konami_ID", currentOfferKonamiId)
        .maybeSingle();

      const offerStatus = resolvePlayerTransferStatus({
        konamiId: currentOfferKonamiId,
        contractedTeam: currentOfferSellerClub,
        viewerClubShort: buyerShortName,
        pageClubShort: currentOfferSellerClub,
        state: transferStatusState,
        seasonSigned: offerPlayer?.Season_Signed,
      });

      if (offerStatus.code === TRANSFER_STATUS.SIGNED_THIS_SEASON) {
        alert(SAME_SEASON_TRANSFER_MESSAGE);
        return;
      }
      if (
        offerStatus.code === TRANSFER_STATUS.OFFER_PENDING ||
        offerStatus.code === TRANSFER_STATUS.DIRECT_OFFER_SELLER
      ) {
        alert("An offer is already under review for this player.");
        return;
      }

      const bidPlayer =
        currentOfferPlayer ||
        (offerPlayer
          ? {
              Nation: offerPlayer.Nation,
              Age: offerPlayer.Age,
            }
          : null);

      if (
        !(await confirmSquadRulesBeforeBid(
          supabase,
          buyerShortName,
          buyerClubNation,
          bidPlayer
        ))
      ) {
        return;
      }

      const playerId = String(currentOfferKonamiId).trim();
      const { error } = await supabase
        .from("Player_Transfer_Bids")
        .insert({
          listing_id: null,
          player_id: playerId,
          bidder_club_id: buyerShortName,
          seller_club_id: currentOfferSellerClub,
          bid_amount: amount,
          bid_time: new Date().toISOString(),
          is_direct: true,
          direct_bid_id: playerId,
          status: "active",
        });

      if (error) {
        console.error("Error submitting offer:", error);
        const msg = String(error.message || "");
        alert(
          msg.includes("current season")
            ? SAME_SEASON_TRANSFER_MESSAGE
            : msg.includes("already under review")
              ? "An offer is already under review for this player."
              : "Error submitting offer. Please try again."
        );
        return;
      }

      alert("Offer submitted to the club's review panel.");
      document.getElementById("offerModal").style.display = "none";
      document.getElementById("offerAmount").value = "";
      document.getElementById("offerAmountFormatted").textContent = "";
      currentOfferKonamiId = null;
      currentOfferSellerClub = null;
      currentPlayerMarketValue = null;
      transferStatusState = await loadTransferStatusState(supabase);
      await loadPlayers();
    }
  </script>
