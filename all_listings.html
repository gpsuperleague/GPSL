  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );

    window.supabase = supabase;

    let draftEnabled = false;

    async function loadGlobalSettings() {
      const { data } = await supabase
        .from("global_settings_public")
        .select("draft_auction_enabled")
        .eq("id", 1)
        .single();

      draftEnabled = data?.draft_auction_enabled === true;
    }

    function buildNav(user) {
      const nav = document.getElementById("nav");

      const buttons = [
        { page: "index", label: "Home", href: "index.html" },
        { page: "gpdb", label: "Player Database", href: "GPDB.html" },
        { page: "clubs", label: "Clubs", href: "clubs.html" },
        { page: "dashboard", label: "Dashboard", href: "dashboard.html" },
        { page: "listings", label: "Transfer List", href: "all_listings.html" }
      ];

      let html = "";

      for (const btn of buttons) {
        if (btn.page !== CURRENT_PAGE) {
          html += `<a href="${btn.href}" class="button">${btn.label}</a>`;
        }
      }

      if (user.email === "rotavator66@outlook.com" && CURRENT_PAGE !== "admin") {
        html += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }

      if (draftEnabled && CURRENT_PAGE !== "draftauction") {
        html += `<a href="draftauction.html" class="button">Draft Auction</a>`;
      }

      html += `<button id="logoutBtn" class="button">Logout</button>`;

      nav.innerHTML = html;

      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadGlobalSettings();
      buildNav(user);
    });
  </script>
