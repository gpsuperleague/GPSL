<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Listings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>All Transfer Listings</h1>

  <div id="filters">
    <label>
      <input type="checkbox" id="filter-active">
      Active
    </label>
    <label>
      <input type="checkbox" id="filter-closed">
      Closed
    </label>
  </div>

  <table id="listings-table">
    <thead>
      <tr>
        <th>Player</th>
        <th>Position</th>
        <th>Playstyle</th>
        <th>Rating</th>
        <th>Selling Club</th>
        <th>Reserve</th>
        <th>Market Value</th>
        <th>Status</th>
        <th>Time Left</th>
        <th>Highest Bid</th>
        <th>Highest Bidding Club</th>
      </tr>
    </thead>
    <tbody id="listings-body"></tbody>
  </table>

  <!-- Bid Modal -->
  <div id="bid-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="bid-modal-close">&times;</span>
      <h2 id="bid-player-name"></h2>
      <p><strong>Position:</strong> <span id="bid-player-position"></span></p>
      <p><strong>Playstyle:</strong> <span id="bid-player-playstyle"></span></p>
      <p><strong>Rating:</strong> <span id="bid-player-rating"></span></p>
      <p><strong>Selling Club:</strong> <span id="bid-selling-club"></span></p>
      <p><strong>Reserve Price:</strong> <span id="bid-reserve-price"></span></p>
      <p><strong>Market Value:</strong> <span id="bid-market-value"></span></p>
      <p><strong>Status:</strong> <span id="bid-status"></span></p>
      <p><strong>Time Remaining:</strong> <span id="bid-time-remaining"></span></p>
      <p><strong>Highest Bid:</strong> <span id="bid-highest-bid"></span></p>
      <p><strong>Highest Bidding Club:</strong> <span id="bid-highest-club"></span></p>

      <div id="bid-input-section">
        <label for="bid-amount">Your Bid (must be ≥ market value and > current highest):</label>
        <input type="number" id="bid-amount" step="0.01" min="0">
        <button id="place-bid-btn">Place Bid</button>
        <p id="bid-error" style="color:red;"></p>
      </div>
    </div>
  </div>

  <script src="all_listings.js"></script>
</body>
</html>
