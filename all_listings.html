<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Transfer Market</title>

  <!-- ============================================
       STYLE: Global Transfer Market Theme
       ============================================ -->
  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
    }

    /* ------------------------------
       Page Title
       ------------------------------ */
    h1 {
      background:#222;
      color:#ff9900;
      padding:10px 16px;
      border-radius:6px;
      width: fit-content;
      margin:20px auto;
      font-size:26px;
      font-weight:bold;
    }

    /* ------------------------------
       Buttons
       ------------------------------ */
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    /* ------------------------------
       Navigation Bar
       ------------------------------ */
    #nav {
      text-align: center;
      margin-bottom: 20px;
    }

    /* ------------------------------
       Filters Bar
       ------------------------------ */
    .filters-bar {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto 10px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .filters-left label {
      margin-right: 10px;
      cursor: pointer;
    }

    .filters-right {
      color: #ff9900;
      font-weight: bold;
    }

    /* ------------------------------
       Listings Table
       ------------------------------ */
    table.gpsl-table {
      width: 90%;
      max-width: 1100px;
      margin: 10px auto 20px auto;
      border-collapse: collapse;
      font-size: 14px;
      background:#1a1a1a;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table.gpsl-table td {
      padding: 8px;
      border-bottom: 1px solid #333;
    }

    table.gpsl-table tr:nth-child(even) {
      background: #181818;
    }

    table.gpsl-table tr:hover {
      background:#262626;
      cursor:pointer;
    }

    /* ============================================
       MODAL: Bid Window
       ============================================ */
    #bid-modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.7);
    }

    #bid-modal-content {
      background-color: #1a1a1a;
      margin: 60px auto;
      padding: 20px;
      border: 1px solid #333;
      width: 90%;
      max-width: 600px;
      border-radius: 8px;
      color:#ddd;
    }

    #bid-modal-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    #bid-modal-header h2 {
      margin:0;
      color:#ff9900;
    }

    #bid-modal-close {
      color:#ddd;
      font-size:24px;
      cursor:pointer;
    }

    #bid-modal-close:hover {
      color:#ff9900;
    }

    .bid-row {
      display:flex;
      justify-content:space-between;
      margin:4px 0;
      font-size:14px;
    }

    .bid-row label {
      color:#ff9900;
      margin-right:6px;
    }

    #bid-input-section {
      margin-top:15px;
      padding-top:10px;
      border-top:1px solid #333;
    }

    #bid-amount {
      width:120px;
      padding:4px;
      border-radius:4px;
      border:1px solid #444;
      background:#111;
      color:#ddd;
    }

    #bid-error {
      color:#ff5555;
      margin-top:8px;
      min-height:18px;
      font-size:13px;
    }
  </style>
</head>

<body>

  <!-- ============================================
       PAGE TITLE
       ============================================ -->
  <h1>Global Transfer Market</h1>

  <!-- ============================================
       NAVIGATION BAR (populated after auth)
       ============================================ -->
  <div id="nav"></div>

  <!-- ============================================
       FILTERS BAR
       ============================================ -->
  <div class="filters-bar">
    <div class="filters-left">
      <label>
        <input type="checkbox" id="filter-active" checked>
        Active
      </label>
      <label>
        <input type="checkbox" id="filter-closed" checked>
        Closed / Seller Review
      </label>
    </div>
    <div class="filters-right">
      Click a row to view & bid
    </div>
  </div>

  <!-- ============================================
       LISTINGS TABLE
       ============================================ -->
  <table class="gpsl-table">
    <thead>
      <tr>
        <th>Selling Club</th>
        <th>Player</th>
        <th>Pos</th>
        <th>Style</th>
        <th>Rating</th>
        <th>Value</th>
        <th>Reserve</th>
        <th>Status</th>
        <th>Time Remaining</th>
        <th>Highest Bid</th>
        <th>Highest Club</th>
      </tr>
    </thead>
    <tbody id="listings-body"></tbody>
  </table>

  <!-- ============================================
       BID MODAL
       ============================================ -->
  <div id="bid-modal">
    <div id="bid-modal-content">

      <div id="bid-modal-header">
        <h2 id="bid-player-name">Player</h2>
        <span id="bid-modal-close">&times;</span>
      </div>

      <!-- Player Info Rows -->
      <div class="bid-row"><label>Position:</label><span id="bid-player-position"></span></div>
      <div class="bid-row"><label>Playstyle:</label><span id="bid-player-playstyle"></span></div>
      <div class="bid-row"><label>Rating:</label><span id="bid-player-rating"></span></div>
      <div class="bid-row"><label>Selling Club:</label><span id="bid-selling-club"></span></div>
      <div class="bid-row"><label>Market Value:</label><span id="bid-market-value"></span></div>
      <div class="bid-row"><label>Reserve Price:</label><span id="bid-reserve-price"></span></div>
      <div class="bid-row"><label>Status:</label><span id="bid-status"></span></div>
      <div class="bid-row"><label>Time Remaining:</label><span id="bid-time-remaining"></span></div>
      <div class="bid-row"><label>Highest Bid:</label><span id="bid-highest-bid"></span></div>
      <div class="bid-row"><label>Highest Club:</label><span id="bid-highest-club"></span></div>

      <!-- Bid Input -->
      <div id="bid-input-section">
        <div class="bid-row">
          <label>Your Bid (₿):</label>
          <input type="number" id="bid-amount" step="0.01" min="0">
        </div>

        <div style="margin-top:10px;">
          <button id="place-bid-btn" class="button">Place Bid</button>
        </div>

        <div id="bid-error"></div>
      </div>

    </div>
  </div>

  <!-- ============================================
       FIREBASE INITIALISATION
       ============================================ -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase.js"></script>

  <!-- ============================================
       ALL LISTINGS LOGIC (external module)
       ============================================ -->

  <!-- ============================================
       AUTH + NAVIGATION LOGIC
       ============================================ -->
  <script>
    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <button onclick="logout()" class="button">Logout</button>
      `;
    });
  </script>

</body>
</html>
