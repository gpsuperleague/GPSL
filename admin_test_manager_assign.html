<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Assign manager — GPSL Admin Testing</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .form-grid { display: grid; gap: 12px; max-width: 520px; }
    .form-grid label { display: block; font-size: 13px; color: #bbb; }
    .form-grid select, .form-grid input[type="number"] {
      width: 100%; max-width: 520px; padding: 8px; margin-top: 4px;
      background: #111; border: 1px solid #444; color: #ddd; border-radius: 4px;
    }
    .form-grid .check-row { margin-top: 8px; font-size: 13px; }
    .mgr-meta { font-size: 12px; color: #888; margin-top: 4px; }
    .club-meta { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Assign manager to club</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <p class="note">
        <a href="admin.html" style="color:#ff9900;">← Admin hub</a>
        · Testing only — signs a manager directly, bypassing draft auction and transfer market.
      </p>

      <div class="card">
        <h2>Assignment</h2>
        <div class="form-grid">
          <label>
            Manager
            <select id="managerSelect">
              <option value="">Loading managers…</option>
            </select>
            <div id="managerMeta" class="mgr-meta"></div>
          </label>
          <label>
            Club
            <select id="clubSelect">
              <option value="">Loading clubs…</option>
            </select>
            <div id="clubMeta" class="club-meta"></div>
          </label>
          <label>
            Contract seasons
            <input type="number" id="seasonsInput" min="1" max="5" value="2">
          </label>
          <label class="check-row">
            <input type="checkbox" id="releaseClubMgr" checked>
            Release current manager at selected club (if any)
          </label>
          <label class="check-row">
            <input type="checkbox" id="releaseMgrContract">
            Release selected manager from their current club (if elsewhere)
          </label>
          <label class="check-row">
            <input type="checkbox" id="waiveFee" checked>
            Waive signing fee (no ledger debit)
          </label>
        </div>
        <button type="button" class="button" id="assignBtn" style="margin-top:16px;">Assign manager</button>
        <div id="assignStatus" class="status-line"></div>
      </div>

      <div class="card">
        <h2>SQL</h2>
        <p class="note">Run once: <code>supabase/sql/patches/admin_testing_tools.sql</code></p>
      </div>
    </div>
  </div>
  <script type="module" src="admin_test_manager_assign.js"></script>
</body>
</html>
