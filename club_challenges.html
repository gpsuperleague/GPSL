<script>window.CURRENT_PAGE = "club_challenges";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Challenges — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:1100px; margin:20px auto 40px; }
    h1 { color:#ff9900; margin:0 0 8px; }
    .meta { color:#aaa; font-size:13px; margin-bottom:16px; line-height:1.45; }
    .panel {
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      padding:18px 20px; margin-bottom:20px;
    }
    .panel h2 { color:#ff9900; font-size:16px; margin:0 0 12px; }
    .panel h3 {
      color:#ccc; font-size:14px; margin:18px 0 10px;
      padding-bottom:6px; border-bottom:1px solid #333;
    }
    .panel h3:first-of-type { margin-top:0; }
    .challenge-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:12px;
    }
    .challenge-card {
      background:#222; border:1px solid #333; border-radius:6px; padding:14px;
    }
    .challenge-card h3 { margin:0 0 8px; font-size:15px; color:#ffcc66; border:none; padding:0; }
    .challenge-progress {
      font-size:22px; font-weight:700; color:#eee; margin:0 0 6px;
    }
    .challenge-meta { font-size:12px; color:#888; line-height:1.4; }
    .challenge-status-awarded { color:#8d8; }
    .challenge-status-expired { color:#a88; }
    .challenge-card.is-expired { opacity:0.72; border-color:#444; }
    .awards-list { margin:0; padding:0; list-style:none; }
    .awards-list li {
      padding:8px 10px; background:#222; border:1px solid #333;
      border-radius:6px; margin-bottom:8px; font-size:13px;
    }
    .window-tag {
      display:inline-block; font-size:10px; text-transform:uppercase;
      letter-spacing:0.05em; padding:2px 6px; border-radius:4px;
      background:#333; color:#bbb; margin-right:6px;
    }
    .window-tag.start { background:#2a3d2a; color:#9fdf9f; }
    .window-tag.mid { background:#2a353d; color:#9fd4ff; }
    .phase-empty { color:#888; font-size:13px; margin:0; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Challenges</h1>
    <p class="meta">
      Track your club’s progress against season targets and see prizes you’ve already earned.
      League-wide targets and big prizes are on
      <a href="challenges.html">Season challenges</a>.
    </p>

    <div class="panel">
      <h2>Your progress</h2>
      <h3>Start of season</h3>
      <div id="progressStart" class="challenge-grid">
        <p class="phase-empty">Loading…</p>
      </div>
      <h3>Mid-season</h3>
      <div id="progressMid" class="challenge-grid">
        <p class="phase-empty">Loading…</p>
      </div>
    </div>

    <div class="panel">
      <h2>Awards this season</h2>
      <ul id="challengeAwardsList" class="awards-list"></ul>
    </div>
  </div>
  <script type="module" src="club_challenges.js?v=20260718-expired-months"></script>
</body>
</html>
