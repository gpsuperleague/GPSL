<script>window.CURRENT_PAGE = "season_calendar";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Season Calendar — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:1180px; margin:20px auto 48px; }
    h1 { color:#ff9900; margin:0 0 8px; }
    .meta { color:#aaa; margin-bottom:12px; font-size:14px; line-height:1.45; }
    #seasonCalendarError {
      color:#f88; background:#2a1515; border:1px solid #633;
      border-radius:6px; padding:10px 14px; margin-bottom:14px; font-size:13px;
      display:none;
    }
    .sc-intro {
      color:#bbb; font-size:14px; line-height:1.5; margin:0 0 16px; max-width:52rem;
    }
    .sc-loading, .sc-footnote { color:#888; font-size:13px; }
    .sc-footnote { margin-top:18px; line-height:1.45; }

    /* 4×3 calendar grid */
    .sc-grid {
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:14px;
    }
    @media (max-width: 980px) {
      .sc-grid { grid-template-columns:repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .sc-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 480px) {
      .sc-grid { grid-template-columns:1fr; }
    }

    .sc-month {
      display:flex;
      flex-direction:column;
      min-height:220px;
      background:#f7f4ef;
      border:2px solid #1a1a1a;
      border-radius:2px;
      overflow:hidden;
      color:#1a1a1a;
      box-shadow:0 2px 0 rgba(0,0,0,.35);
    }
    .sc-month--current {
      border-color:#ff9900;
      box-shadow:0 0 0 2px rgba(255,153,0,.45), 0 2px 0 rgba(0,0,0,.35);
    }
    .sc-month--pre .sc-month-banner {
      letter-spacing:.04em;
    }

    .sc-month-banner {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 8px;
      text-align:center;
      border-bottom:2px solid #1a1a1a;
      position:relative;
    }
    .sc-month-banner h2 {
      margin:0;
      font-size:16px;
      font-weight:bold;
      color:#111;
      letter-spacing:.02em;
    }
    .sc-now-badge, .sc-pre-badge {
      position:absolute;
      right:6px;
      top:50%;
      transform:translateY(-50%);
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.05em;
      padding:2px 6px;
      border-radius:3px;
      font-weight:bold;
      background:rgba(0,0,0,.18);
      color:#111;
    }
    .sc-month--current .sc-now-badge {
      background:#111;
      color:#ff9900;
    }

    /* GPSL-themed month header colours */
    .sc-month[data-month="june"] .sc-month-banner { background:#c9a84c; }
    .sc-month[data-month="july"] .sc-month-banner { background:#e0b85a; }
    .sc-month[data-month="august"] .sc-month-banner { background:#ff9900; }
    .sc-month[data-month="september"] .sc-month-banner { background:#6d9f7a; }
    .sc-month[data-month="october"] .sc-month-banner { background:#c98652; }
    .sc-month[data-month="november"] .sc-month-banner { background:#5a7db5; color:#fff; }
    .sc-month[data-month="november"] .sc-month-banner h2,
    .sc-month[data-month="november"] .sc-pre-badge,
    .sc-month[data-month="november"] .sc-now-badge { color:#fff; }
    .sc-month[data-month="december"] .sc-month-banner { background:#9b87b8; }
    .sc-month[data-month="january"] .sc-month-banner { background:#7ec8e3; }
    .sc-month[data-month="february"] .sc-month-banner { background:#6ecf8a; }
    .sc-month[data-month="march"] .sc-month-banner { background:#ff8f45; }
    .sc-month[data-month="april"] .sc-month-banner { background:#4fc3f7; }
    .sc-month[data-month="may"] .sc-month-banner { background:#c9a84c; }

    .sc-month-body {
      flex:1;
      padding:10px 12px 12px;
      background:#faf8f4;
    }
    .sc-bullets {
      list-style:disc;
      margin:0;
      padding:0 0 0 18px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .sc-bullet {
      font-size:12.5px;
      line-height:1.35;
      color:#222;
    }
    .sc-bullet-btn {
      display:inline;
      margin:0;
      padding:0;
      border:0;
      background:none;
      font:inherit;
      color:#1a1a1a;
      cursor:pointer;
      text-align:left;
      text-decoration:underline;
      text-decoration-color:rgba(0,0,0,.25);
      text-underline-offset:2px;
    }
    .sc-bullet-btn:hover,
    .sc-bullet.is-open .sc-bullet-btn {
      color:#b36b00;
      text-decoration-color:#ff9900;
    }
    .sc-bullet--live .sc-bullet-btn {
      color:#1a5c32;
      font-weight:bold;
    }
    .sc-bullet--mine .sc-bullet-btn {
      color:#8a4b00;
      font-weight:bold;
    }
    .sc-bullet--international .sc-bullet-btn {
      color:#0d4f6b;
      font-weight:bold;
    }
    .sc-bullet--international.sc-bullet--mine .sc-bullet-btn {
      color:#8a4b00;
    }
    .sc-bullet--world-cup .sc-bullet-btn {
      color:#5a3d00;
    }
    .sc-bullet-detail {
      display:none;
      margin:6px 0 4px -6px;
      padding:8px 10px 10px;
      background:#fff;
      border:1px solid #d8d0c4;
      border-left:3px solid #ff9900;
      border-radius:4px;
      font-size:12px;
      line-height:1.45;
      color:#333;
    }
    .sc-bullet.is-open .sc-bullet-detail { display:block; }
    .sc-bullet-detail > p { margin:0 0 8px; }
    .sc-detail-lead {
      margin:0 0 8px !important;
      color:#666;
      font-size:11px;
    }
    .sc-fix-list {
      list-style:none !important;
      margin:0 0 10px !important;
      padding:0 !important;
      display:flex;
      flex-direction:column;
      gap:0;
      border:1px solid #e6e0d6;
      border-radius:4px;
      overflow:hidden;
      background:#faf8f4;
    }
    .sc-fix-list > li {
      list-style:none !important;
      margin:0 !important;
      padding:0 !important;
    }
    .sc-fix-list > li + li { border-top:1px solid #eee8de; }
    .sc-fix-list a {
      display:grid;
      grid-template-columns:72px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 9px;
      text-decoration:none;
      color:#222;
      background:transparent;
    }
    .sc-fix-list a:hover { background:#fff4e0; color:#111; }
    .sc-fix-comp {
      font-size:10px;
      font-weight:bold;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:#888;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sc-fix-match {
      display:flex;
      flex-wrap:nowrap;
      align-items:baseline;
      gap:5px;
      min-width:0;
      font-size:12px;
      font-weight:bold;
    }
    .sc-fix-club { color:#1a1a1a; }
    .sc-fix-vs {
      color:#999;
      font-weight:normal;
      font-size:11px;
    }
    .sc-fix-score {
      font-size:11px;
      color:#666;
      font-weight:bold;
      white-space:nowrap;
    }
    .sc-fix-when {
      font-size:11px;
      color:#2a7a3a;
      font-weight:bold;
      white-space:nowrap;
    }
    .sc-bullet-links {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .sc-bullet-links a {
      display:inline-block;
      padding:4px 9px;
      font-size:11px;
      font-weight:bold;
      background:#ff9900;
      color:#111;
      border-radius:3px;
      text-decoration:none;
    }
    .sc-bullet-links a.secondary {
      background:#333;
      color:#eee;
    }
    .sc-bullet-links a:hover { filter:brightness(1.08); }

    .sc-empty-bullets {
      margin:0;
      color:#777;
      font-size:12px;
      font-style:italic;
    }

    .sc-hint {
      margin:0 0 14px;
      font-size:12px;
      color:#888;
    }
    .sc-build {
      color:#555;
      font-size:11px;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Season Calendar</h1>
    <p id="seasonCalendarMeta" class="meta">Loading…</p>
    <div id="seasonCalendarError"></div>
    <p class="sc-intro">
      Pre-season is June &amp; July, then August–May. Click a bullet in any month for details and links
      (league fixtures for that month, cups, drafts, transfers, and more).
    </p>
    <p class="sc-hint">Tip: your club fixtures appear as highlighted bullets when you own a club.</p>
    <div id="seasonCalendarRoot"></div>
  </div>
  <script type="module" src="season_calendar.js?v=20260710-intl"></script>
</body>
</html>
