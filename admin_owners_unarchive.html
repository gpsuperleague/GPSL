<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Unarchive owner — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .card .note { color:#999; font-size:13px; line-height:1.45; margin:0 0 12px; }
    button.button.secondary { background:#444; color:#ddd; }
    button.button.secondary:hover { background:#555; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Unarchive owner (return to GPSL)</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="ow-unarchive">
        <h2>Unarchive owner</h2>
        <p class="note">Moves an archived owner onto the waiting list as a returning member (unarchive).</p>
        <div class="row">
          <div><input id="unarchiveOwnerEmail" placeholder="Owner email"></div>
        </div>
        <button id="unarchiveOwnerBtn" class="button">Unarchive</button>
        <div id="unarchiveOwnerStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_owners.js"></script>
</body>
</html>
