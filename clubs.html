<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clubs</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #ff9900;
      margin-top: 20px;
    }

    .club-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .club-card {
      text-align: center;
      cursor: pointer;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      transition: 0.2s;
    }

    .club-card:hover {
      transform: scale(1.05);
      border-color: #ff9900;
    }

    .club-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1>Clubs</h1>

  <div id="clubs" class="club-grid"></div>

  <script type="module" src="clubs.js"></script>

</body>
</html>
