<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://omyyogfumrjoaweuawjn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4'
)

async function loadClubs() {
  const { data, error } = await supabase
    .from("Clubs")
    .select("*")
    .order("name", { ascending: true })

  if (error) {
    console.error(error)
    return
  }

  const container = document.getElementById("clubs")

  data.forEach(club => {
    const div = document.createElement("div")
    div.className = "club-card"
    div.onclick = () => {
      window.location.href = `club.html?id=${club.id}`
    }

    div.innerHTML = `
      <img src="badges/${club.short_name}.png" alt="${club.name} badge">
      <div>${club.name}</div>
    `

    container.appendChild(div)
  })
}

loadClubs()
</script>
