<!DOCTYPE html>
<html>
<head>
  <title>Clubs</title>
  <style>
    .club-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .club-card {
      text-align: center;
      cursor: pointer;
    }
    .club-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }
  </style>
</head>

<body>

<nav style="margin-bottom:20px;">
  <a href="index.html">Home</a> |
  <a href="GPDB.html">GPDB</a>
</nav>

<h1>Clubs</h1>

<div id="clubs" class="club-grid"></div>

<!-- ✅ SCRIPT GOES HERE — at the bottom, before </body> -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://omyyogfumrjoaweuawjn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4'
)

async function loadClubs() {
  const { data, error } = await supabase
    .from("Clubs")
    .select("*")
    .order("Club", { ascending: true })

  if (error) {
    console.error(error)
    return
  }

  const container = document.getElementById("clubs")
  if (!container) {
    console.error("Element #clubs not found")
    return
  }

  data.forEach(club => {
    const div = document.createElement("div")
    div.className = "club-card"
    div.onclick = () => {
      window.location.href = `club.html?club=${encodeURIComponent(club.Club)}`
    }

    div.innerHTML = `
      <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
      <div>${club.Club}</div>
    `

    container.appendChild(div)
  })
}

loadClubs()
</script>

</body>
</html>
