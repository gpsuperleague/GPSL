<script>
  const CURRENT_PAGE = "clubs";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clubs</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #ff9900;
      margin-top: 20px;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    .club-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .club-card {
      text-align: center;
      cursor: pointer;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      transition: 0.2s;
    }

    .club-card:hover {
      transform: scale(1.05);
      border-color: #ff9900;
    }

    .club-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1>Clubs</h1>

  <div id="clubs" class="club-grid"></div>

  <!-- SUPABASE CLIENT + UPDATED NAV -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://omyyogfumrjoaweuawjn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4'
    );

    window.supabase = supabase;

    let draftEnabled = false;

    async function loadGlobalSettings() {
      const { data } = await supabase
        .from("global_settings_public")
        .select("draft_auction_enabled")
        .eq("id", 1)
        .single();

      draftEnabled = data?.draft_auction_enabled === true;
    }

    async function buildNav(user) {
      const nav = document.getElementById("nav");

      const buttons = [
        { page: "index", label: "Home", href: "index.html" },
        { page: "gpdb", label: "Player Database", href: "GPDB.html" },
        { page: "clubs", label: "Clubs", href: "clubs.html" },
        { page: "listings", label: "Transfer Market", href: "all_listings.html" },
        { page: "dashboard", label: "Dashboard", href: "dashboard.html" }
      ];

      let html = "";

      for (const btn of buttons) {
        if (btn.page !== CURRENT_PAGE) {
          html += `<a href="${btn.href}" class="button">${btn.label}</a>`;
        }
      }

      if (user.email === "rotavator66@outlook.com" && CURRENT_PAGE !== "admin") {
        html += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }

      if (draftEnabled && CURRENT_PAGE !== "draftauction") {
        html += `<a href="draftauction.html" class="button">Draft Auction</a>`;
      }

      html += `<button id="logoutBtn" class="button">Logout</button>`;

      nav.innerHTML = html;

      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    /* AUTH + NAVIGATION */
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadGlobalSettings();
      await buildNav(user);

      loadClubs();
    });

    /* LOAD CLUBS */
    async function loadClubs() {
      const { data, error } = await supabase
        .from("Clubs")
        .select("*")
        .neq("ShortName", "FOREIGN")
        .order("Club", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById("clubs");

      data.forEach(club => {
        const div = document.createElement("div");
        div.className = "club-card";

        div.onclick = () => {
          window.location.href = `club.html?club=${encodeURIComponent(club.Club)}`;
        };

        div.innerHTML = `
          <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
          <div>${club.Club}</div>
        `;

        container.appendChild(div);
      });
    }
  </script>

</body>
</html>
