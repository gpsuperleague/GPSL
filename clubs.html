</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clubs</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #ff9900;
      margin-top: 20px;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    .club-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .club-card {
      text-align: center;
      cursor: pointer;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      transition: 0.2s;
    }

    .club-card:hover {
      transform: scale(1.05);
      border-color: #ff9900;
    }

    .club-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1>Clubs</h1>

  <div id="clubs" class="club-grid"></div>

  <script type="module">
    import { initGlobal } from "./global.js";

    document.addEventListener("DOMContentLoaded", async () => {
      await initGlobal();
      loadClubs();
    });

    async function loadClubs() {
      const supabase = window.supabase;
      const { data, error } = await supabase
        .from("Clubs")
        .select("*")
        .neq("ShortName", "FOREIGN")
        .order("Club", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      const container = document.getElementById("clubs");

      data.forEach(club => {
        const div = document.createElement("div");
        div.className = "club-card";

        div.onclick = () => {
          window.location.href = `club.html?club=${encodeURIComponent(club.Club)}`;
        };

        div.innerHTML = `
          <img src="images/club_badges/${club.ShortName}.png" alt="${club.Club} badge">
          <div>${club.Club}</div>
        `;

        container.appendChild(div);
      });
    }
  </script>

</body>
</html>
