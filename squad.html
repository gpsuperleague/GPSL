<script>
  const CURRENT_PAGE = "squad";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Squad</title>

  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="squad.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: left;
      color: #ff9900;
      margin: 0;
      font-size: 26px;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    #headerContainer.squad-header {
      justify-content: flex-start !important;
    }

    .gpsl-table th {
      text-align: center !important;
      color: #ff9900;
      font-weight: bold;
    }

    .squad-section-title {
      background: #1a1a1a;
      color: #ff9900;
      font-weight: bold;
      padding: 10px;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
  </style>
</head>

<body class="squad-page">

  <!-- NAV -->
  <div id="nav" style="margin-bottom:20px;"></div>

  <!-- HEADER -->
  <div id="headerContainer" class="squad-header">
    <img id="clubBadgeHeader" src="" alt="Club Badge" class="squad-header-badge">
    <div class="squad-header-titles">
      <h1 id="dashboardTitle">Squad</h1>
      <div id="userEmail"></div>
    </div>
    <p id="foreignInterestBadge" class="foreign-interest-badge" aria-live="polite"></p>
  </div>

  <!-- MAIN CONTENT -->
  <div style="padding:20px;">

    <!-- ⭐ TRANSFER WINDOW CLOSED MESSAGE -->
    <div id="windowClosedMessage"
         style="display:none; background:#330000; color:#ff6666; padding:10px; margin-bottom:15px; border:1px solid #660000; border-radius:6px;">
      Transfer window is currently CLOSED. Direct listings are disabled.
    </div>

    <div id="squadCompliancePanel" class="squad-compliance-wrap"></div>

    <div class="panel">
      <h2 class="section-header">Squad</h2>

      <table class="gpsl-table">
        <thead>
          <tr>
            <th></th>
            <th>Player</th>
            <th>Nation</th>
            <th>Position</th>
            <th>Rating</th>
            <th>Apps</th>
            <th>G</th>
            <th>A</th>
            <th>Avg</th>
            <th>Playstyle</th>
            <th>Market Value</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="squad-body"></tbody>
      </table>
    </div>

  </div>

  <!-- LIST PLAYER MODAL -->
  <div id="list-player-modal-backdrop">
    <div id="list-player-modal">
      <h3>List Player</h3>

      <div id="modalPlayerName"></div>
      <div id="modalPlayerInfo"></div>

      <div class="modal-row">
        <label>Market Value</label>
        <div id="modalMarketValue">₿ 0</div>
      </div>

      <div class="modal-row">
        <label>Max Allowed Reserve</label>
        <div id="modalMaxReserve">₿ 0</div>
      </div>

      <div class="modal-row">
        <label for="reserveInput">Reserve Price</label>
        <input type="text" id="reserveInput" inputmode="numeric">
        <div id="reserveError"></div>

        <div style="margin-top:10px;">
          <button class="dec-btn" id="dec-500k-list">-500k</button>
          <button class="dec-btn" id="dec-1m-list">-1m</button>
          <button class="dec-btn" id="dec-5m-list">-5m</button>

          <button class="inc-btn" id="inc-500k-list">+500k</button>
          <button class="inc-btn" id="inc-1m-list">+1m</button>
          <button class="inc-btn" id="inc-5m-list">+5m</button>
        </div>

        <div style="margin-top:10px;">
          <button id="useMarketValueBtn" class="button">Use Market Value</button>
          <button id="useMaxReserveBtn" class="button">Use Max Allowed Reserve</button>
        </div>
      </div>

      <div id="modalWarning">
        Listing a player is irreversible once confirmed.
      </div>

      <div class="modal-buttons">
        <button class="button" id="cancelListBtn">Cancel</button>
        <button class="button" id="confirmListBtn">Confirm Listing</button>
      </div>

    </div>
  </div>

  <!-- LOAD SQUAD LOGIC (nav via initGlobal in squad.js) -->
  <script type="module" src="squad.js"></script>

</body>
</html>
