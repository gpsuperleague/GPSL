<script>
  const CURRENT_PAGE = "squad";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Squad</title>

  <!-- GLOBAL DASHBOARD STYLES -->
  <link rel="stylesheet" href="dashboard.css">

  <!-- SQUAD PAGE DARK THEME -->
  <link rel="stylesheet" href="squad.css">

  <!-- REMOVE INLINE BODY BACKGROUND OVERRIDE -->
  <style>
    h1 {
      margin: 0;
      font-size: 26px;
      color: #ff9900;
    }
    .section-header {
      color: #ff9900;
      margin-bottom: 10px;
      font-size: 24px;
    }
  </style>
</head>

<body class="squad-page">

  <!-- NAV -->
  <div id="nav"></div>

  <!-- INIT NAV -->
  <script type="module">
    import { supabase } from "./supabase_client.js";
    import { buildNav } from "./global_ui.js";
    import { loadGlobalSettings } from "./global.js";

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();
      await loadGlobalSettings();
      buildNav(user);
    });
  </script>

  <!-- PAGE CONTAINER -->
  <div class="page-container">

    <!-- HEADER -->
    <div id="headerContainer">
      <div id="headerLeft">
        <img id="clubBadgeHeader" src="" alt="Club Badge">
        <div>
          <h1 id="dashboardTitle">SQUAD</h1>
          <div id="userEmail"></div>
        </div>
      </div>

      <div id="headerRight">
        <div id="draftCountdown"></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">

      <!-- LEFT COLUMN -->
      <div id="leftColumn">

        <div class="panel">
          <h2 class="section-header">Squad</h2>

          <table class="gpsl-table">
            <thead>
              <tr>
                <th>Img</th>
                <th>Player</th>
                <th>Nat</th>
                <th>Pos</th>
                <th>Rating</th>
                <th>Playstyle</th>
                <th>Value</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="squad-body"></tbody>
          </table>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div id="rightColumn"></div>

    </div>

  </div>

  <!-- LIST PLAYER MODAL -->
  <div id="list-player-modal-backdrop">
    <div id="list-player-modal">
      <h3>List Player</h3>

      <div id="modalPlayerName"></div>
      <div id="modalPlayerInfo"></div>

      <div class="modal-row">
        <label>Market Value</label>
        <div id="modalMarketValue">₿ 0</div>
      </div>

      <div class="modal-row">
        <label>Max Allowed Reserve</label>
        <div id="modalMaxReserve">₿ 0</div>
      </div>

      <div class="modal-row">
        <label for="reserveInput">Reserve Price</label>
        <input type="text" id="reserveInput" inputmode="numeric">
        <div id="reserveError"></div>

        <div style="margin-top:10px;">
          <button class="dec-btn" id="dec-500k-list">-500k</button>
          <button class="dec-btn" id="dec-1m-list">-1m</button>
          <button class="dec-btn" id="dec-5m-list">-5m</button>

          <button class="inc-btn" id="inc-500k-list">+500k</button>
          <button class="inc-btn" id="inc-1m-list">+1m</button>
          <button class="inc-btn" id="inc-5m-list">+5m</button>
        </div>

        <div style="margin-top:10px;">
          <button id="useMarketValueBtn" class="button">Use Market Value</button>
          <button id="useMaxReserveBtn" class="button">Use Max Allowed Reserve</button>
        </div>
      </div>

      <div id="modalWarning">
        Listing a player is irreversible once confirmed.
      </div>

      <div class="modal-buttons">
        <button class="button" id="cancelListBtn">Cancel</button>
        <button class="button" id="confirmListBtn">Confirm Listing</button>
      </div>

    </div>
  </div>

  <!-- GLOBAL SCRIPTS -->
  <script type="module" src="supabase_client.js"></script>
  <script type="module" src="global.js"></script>
  <script type="module" src="global_ui.js"></script>
  <script type="module" src="clubs_lookup.js"></script>
  <script type="module" src="squad.js"></script>

</body>
</html>
