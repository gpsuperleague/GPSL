<script>window.CURRENT_PAGE = "inbox";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inbox — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:720px; margin:20px auto 40px; }
    h1 { color:#ff9900; margin-bottom:8px; }
    .meta { color:#aaa; margin-bottom:20px; font-size:14px; line-height:1.5; }
    .meta a { color:#ff9900; }
    .panel {
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      padding:20px; margin-bottom:24px;
    }
    .button {
      padding:10px 18px; background:#ff9900; color:#111; border:none;
      border-radius:6px; font-weight:bold; cursor:pointer; margin-right:8px;
    }
    .button.secondary { background:#444; color:#ddd; }
    .button.danger { background:#992222; color:#fff; }
    .button:disabled { opacity:0.5; cursor:not-allowed; }
    #inboxStatus { min-height:1.2em; color:#ffcc00; margin-top:12px; }
    .inbox-item {
      border:1px solid #333; border-radius:6px; padding:14px; margin-bottom:12px;
      background:#222;
    }
    .inbox-item.unread { border-color:#ff9900; }
    .inbox-item h3 { margin:0 0 6px; color:#ff9900; font-size:15px; }
    .inbox-item p { margin:0 0 10px; color:#ccc; font-size:13px; white-space:pre-wrap; }
    .inbox-item time { font-size:11px; color:#666; }
    .inbox-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .empty { color:#888; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Inbox</h1>
    <p id="pageMeta" class="meta">Loading…</p>

    <div class="panel">
      <div id="inboxList"></div>
      <div id="inboxStatus"></div>
    </div>
  </div>
  <script type="module" src="inbox.js"></script>
</body>
</html>
