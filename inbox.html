<script>window.CURRENT_PAGE = "inbox";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inbox — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:720px; margin:20px auto 40px; }
    h1 { color:#ff9900; margin-bottom:8px; }
    .meta { color:#aaa; margin-bottom:20px; font-size:14px; line-height:1.5; }
    .meta a { color:#ff9900; }
    .panel {
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      padding:20px; margin-bottom:24px;
    }
    .inbox-toolbar {
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid #333;
    }
    .inbox-toolbar label {
      display:flex; align-items:center; gap:6px; font-size:13px; color:#aaa;
      margin-left:auto;
    }
    .inbox-filters {
      display:flex; flex-wrap:wrap; gap:6px; align-items:center;
      margin-bottom:16px;
    }
    .inbox-filters .filter-label {
      font-size:12px; color:#888; margin-right:2px;
    }
    .inbox-filter-btn {
      padding:6px 12px; background:#2a2a2a; color:#ccc; border:1px solid #444;
      border-radius:999px; font-size:12px; font-weight:600; cursor:pointer;
    }
    .inbox-filter-btn:hover { border-color:#666; color:#fff; }
    .inbox-filter-btn.active {
      background:#ff9900; color:#111; border-color:#ff9900;
    }
    .button {
      padding:10px 18px; background:#ff9900; color:#111; border:none;
      border-radius:6px; font-weight:bold; cursor:pointer; margin-right:0;
    }
    .button.secondary { background:#444; color:#ddd; }
    .button.danger { background:#992222; color:#fff; }
    .button:disabled { opacity:0.5; cursor:not-allowed; }
    #inboxStatus { min-height:1.2em; color:#ffcc00; margin-top:12px; }
    .inbox-item {
      border:1px solid #333; border-radius:6px; padding:14px; margin-bottom:12px;
      background:#222; display:flex; gap:12px; align-items:flex-start;
    }
    .inbox-item.unread { border-color:#ff9900; }
    .inbox-item.archived { opacity:0.72; border-color:#2a2a2a; }
    .inbox-item.favourite { box-shadow: inset 3px 0 0 #ffcc00; }
    .inbox-item-check {
      margin-top:4px; accent-color:#ff9900; width:16px; height:16px; flex-shrink:0;
    }
    .inbox-item-body { flex:1; min-width:0; }
    .inbox-item-head {
      display:flex; align-items:flex-start; justify-content:space-between; gap:8px;
      margin-bottom:6px;
    }
    .inbox-item h3 { margin:0; color:#ff9900; font-size:15px; flex:1; }
    .inbox-fav-btn {
      background:none; border:none; color:#666; font-size:20px; line-height:1;
      cursor:pointer; padding:0 2px; flex-shrink:0;
    }
    .inbox-fav-btn.on { color:#ffcc00; }
    .inbox-fav-btn:hover { color:#ff9900; }
    .inbox-item p { margin:0 0 10px; color:#ccc; font-size:13px; white-space:pre-wrap; }
    .inbox-item time { font-size:11px; color:#666; }
    .inbox-archived-tag { font-size:11px; color:#888; margin-left:8px; }
    .inbox-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .empty { color:#888; }
    #archivedToolbar { display:none; gap:8px; width:100%; margin-top:4px; }
    #archivedToolbar.visible { display:flex; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Inbox</h1>
    <p id="pageMeta" class="meta">Loading…</p>

    <div class="panel">
      <div id="inboxToolbar" class="inbox-toolbar" hidden>
        <button type="button" id="markAllReadBtn" class="button secondary">Mark all as read</button>
        <button type="button" id="selectAllReadyBtn" class="button secondary" disabled>Select All</button>
        <button type="button" id="archiveSelectedBtn" class="button secondary" disabled>Archive selected</button>
        <label>
          <input type="checkbox" id="showArchivedCb">
          View archived
        </label>
        <div id="archivedToolbar">
          <button type="button" id="restoreSelectedBtn" class="button secondary" disabled>Restore selected</button>
          <button type="button" id="restoreAllBtn" class="button secondary">Restore all to inbox</button>
        </div>
      </div>
      <div id="inboxFilters" class="inbox-filters" hidden></div>
      <div id="inboxList"></div>
      <div id="inboxStatus"></div>
    </div>
  </div>
  <script type="module" src="inbox.js?v=5-fines-filter"></script>
</body>
</html>
