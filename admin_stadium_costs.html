<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Stadium costs — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Stadium costs</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="sb-stadium-costs">
        <h2>Stadium costs</h2>
        <p class="note">
          Expansion cost per seat tiers (by <b>current</b> capacity). Owners: seats × tier rate. Day-7 cancel penalty goes to Rapid Build Co.
          Attendance settings remain on <a href="admin_stadium_settings.html">Stadium settings</a>.
        </p>
        <div class="row">
          <div>
            <label>Below tier mid (&lt;30k default)</label>
            <input type="number" id="stadiumCostTier1" min="1" step="100" style="width:120px;">
          </div>
          <div>
            <label>Tier mid → high</label>
            <input type="number" id="stadiumCostTier2" min="1" step="100" style="width:120px;">
          </div>
          <div>
            <label>Above tier high</label>
            <input type="number" id="stadiumCostTier3" min="1" step="100" style="width:120px;">
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <div>
            <label>Tier mid capacity</label>
            <input type="number" id="stadiumTierMid" min="1" step="1000" style="width:120px;">
          </div>
          <div>
            <label>Tier high capacity</label>
            <input type="number" id="stadiumTierHigh" min="1" step="1000" style="width:120px;">
          </div>
          <div>
            <label>Day-7 cancel penalty</label>
            <input type="number" id="stadiumCancelPenalty" min="0" step="100000" style="width:140px;">
          </div>
        </div>
        <button type="button" id="saveStadiumCostBtn" class="button">Save stadium costs</button>
        <div id="stadiumCostStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_stadium_costs.js"></script>
</body>
</html>
