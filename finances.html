<script>window.CURRENT_PAGE = "finances";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Club Finances — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:1000px; margin:20px auto 40px; }
    h1 { color:#ff9900; margin:0; }
    h2 { color:#ff9900; font-size:18px; margin:0 0 12px; }
    .meta { color:#aaa; margin-bottom:20px; }
    .header-row {
      display:flex; align-items:center; gap:20px; margin-bottom:24px; flex-wrap:wrap;
    }
    #clubBadgeHeader { width:80px; height:80px; object-fit:contain; }
    .panel {
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      padding:20px; margin-bottom:24px;
    }
    .balance-grid {
      display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap:16px; margin-bottom:8px;
    }
    .stat-box {
      background:#222; border-radius:6px; padding:14px; text-align:center;
    }
    .stat-box .label { color:#aaa; font-size:12px; margin-bottom:6px; }
    .stat-box .value { color:#ff9900; font-size:22px; font-weight:bold; }
    table.fin-table { width:100%; border-collapse:collapse; font-size:13px; }
    table.fin-table th, table.fin-table td {
      border:1px solid #333; padding:8px; text-align:left;
    }
    table.fin-table th { background:#222; color:#ff9900; }
    table.fin-table td.money { text-align:right; white-space:nowrap; }
    .empty { color:#888; font-size:13px; }
    .archive-ul { margin:0; padding-left:20px; color:#ccc; }
    .footer-note { color:#888; font-size:12px; }
    a { color:#ff9900; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <div class="header-row">
      <img id="clubBadgeHeader" src="" alt="">
      <div>
        <h1 id="pageTitle">Club Finances</h1>
        <div id="userEmail" class="meta"></div>
        <p id="pageMeta" class="meta" style="margin:0;"></p>
      </div>
    </div>

    <div class="panel">
      <h2>Balance</h2>
      <div class="balance-grid">
        <div class="stat-box">
          <div class="label">Current balance</div>
          <div class="value" id="balanceAmount">—</div>
        </div>
        <div class="stat-box">
          <div class="label">Gate income (this season)</div>
          <div class="value" id="gateSeasonTotal">—</div>
        </div>
      </div>
      <p class="footer-note">
        Transfers use the same balance via
        <a href="transfer_center.html">Transfer Centre</a>.
        Gate receipts credit on confirmed home league results.
        <a href="stadium.html">Stadium</a> shows the estimate formula.
      </p>
    </div>

    <div class="panel">
      <h2>Gate & competition ledger</h2>
      <div id="ledgerTable"></div>
    </div>

    <div class="panel">
      <h2>5-year record (gate multiplier)</h2>
      <div id="archiveList"></div>
    </div>
  </div>
  <script type="module" src="finances.js"></script>
</body>
</html>
