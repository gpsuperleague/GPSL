<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Cup prize money — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Cup prize money</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card">
        <p class="note">Round fee is paid to <b>both</b> clubs when a tie is confirmed. Set amounts per cup + stage (run <code>competition_cup_prizes_fix.sql</code>).</p>
        <div class="row">
          <div>
            <label>Cup</label>
            <select id="compCupSelect">
              <option value="super8">Super8</option>
              <option value="plate">Plate</option>
              <option value="shield">Shield</option>
              <option value="spoon">Spoon</option>
              <option value="league_cup">League Cup</option>
            </select>
          </div>
        </div>
        <h2 class="admin-subheading" style="margin-top:14px;">Prize amounts</h2>
        <div class="row">
          <select id="compPrizeStage">
            <option value="final">Final</option>
            <option value="sf">Semi-final</option>
            <option value="qf">Quarter-final</option>
            <option value="r2">Round 2</option>
            <option value="r1">Round 1</option>
            <option value="appearance">Appearance (optional extra)</option>
          </select>
          <input type="number" id="compPrizeAmount" placeholder="Amount" style="max-width:140px;">
          <button id="compSavePrizeBtn" class="button">Save prize</button>
        </div>
        <div id="compCupPrizeList" class="note" style="margin-top:10px;"></div>
        <div id="compPrizeStatus" class="status-line"></div>
      </div>
      <div class="card">
        <h2>Cup prize override</h2>
        <p class="note">Award the <b>round</b> prize to one club (walkover / opponent unavailable). Uses configured amount for that fixture's round.</p>
        <div class="row">
          <div>
            <label>Fixture ID</label>
            <input type="number" id="compOverrideFixtureId" placeholder="e.g. 1204" style="width:120px;">
          </div>
          <div>
            <label>Club ShortName</label>
            <input type="text" id="compOverrideClub" placeholder="e.g. HUR" style="width:100px;">
          </div>
          <div>
            <label>Stage (optional)</label>
            <select id="compOverrideStage">
              <option value="">Auto (from fixture round)</option>
              <option value="final">Final</option>
              <option value="sf">Semi-final</option>
              <option value="qf">Quarter-final</option>
              <option value="r2">Round 2</option>
              <option value="r1">Round 1</option>
              <option value="appearance">Appearance</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top:8px;">
          <input type="text" id="compOverrideNote" placeholder="Note (optional)" style="flex:1;max-width:320px;">
          <button id="compAwardCupPrizeBtn" class="button">Award round prize</button>
        </div>
        <div id="compOverrideStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_cup_prizes.js"></script>
</body>
</html>
