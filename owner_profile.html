<script>window.CURRENT_PAGE = "owner_profile";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner profile — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:980px; margin:30px auto 50px; }
    h1 { color:#ff9900; margin:0 0 4px; }
    .sub { color:#999; margin:0 0 18px; }
    .panel { background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:20px; margin-bottom:18px; }
    .panel h2 { color:#ffcc66; margin:0 0 12px; font-size:17px; }
    .head-row { display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }
    .owner-badge {
      width:96px; height:96px; border-radius:10px; object-fit:cover;
      background:#222; border:1px solid #444;
    }
    .owner-badge-fallback {
      width:96px; height:96px; border-radius:10px; display:flex; align-items:center;
      justify-content:center; background:#222; border:1px solid #444; color:#ff9900;
      font-size:28px; font-weight:700;
    }
    .owner-badge[hidden],
    .owner-badge-fallback[hidden] {
      display: none !important;
    }
    .totals { display:flex; flex-wrap:wrap; gap:12px; margin-top:10px; }
    .totals span { background:#222; border:1px solid #444; border-radius:6px; padding:8px 12px; font-size:13px; }
    .totals b { color:#ff9900; }
    .gpsl-table { width:100%; border-collapse:collapse; font-size:13px; }
    .gpsl-table th { text-align:left; padding:7px 8px; background:#222; color:#ff9900; white-space:nowrap; }
    .gpsl-table td { padding:7px 8px; border-bottom:1px solid #2a2a2a; }
    .gpsl-table .num { text-align:right; font-variant-numeric:tabular-nums; }
    .empty { color:#777; font-style:italic; }
    .gpsl-link { color:#6cf; text-decoration:none; }
    .gpsl-link:hover { text-decoration:underline; }
    #profileError { color:#f88; display:none; margin-bottom:12px; }
    .highlight { background:#222; border:1px solid #3a3a3a; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
    .highlight b { color:#ffcc66; }
    .badge-edit { margin-top:12px; font-size:13px; color:#aaa; }
    .badge-edit input[type="file"] { margin-top:6px; color:#ccc; }
    .note { font-size:12px; color:#888; margin-top:6px; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <p><a href="owner_rankings.html" class="gpsl-link">← Owner rankings</a></p>
    <div id="profileError"></div>
    <div class="head-row">
      <img id="ownerBadge" class="owner-badge" alt="" hidden>
      <div id="ownerBadgeFallback" class="owner-badge-fallback" hidden>?</div>
      <div>
        <h1 id="ownerTitle">Owner</h1>
        <p class="sub" id="ownerMeta"></p>
        <div class="totals" id="totalsRow"></div>
        <div id="badgeEdit" class="badge-edit" hidden>
          <div>Your in-match / profile badge (image only — no email shown publicly)</div>
          <input type="file" id="badgeFile" accept="image/png,image/jpeg,image/webp">
          <button type="button" class="button" id="badgeSaveBtn" style="margin-top:8px">Upload badge</button>
          <button type="button" class="button secondary" id="badgeClearBtn" style="margin-top:8px">Remove badge</button>
          <div id="badgeStatus" class="note"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Transfer market</h2>
      <div id="transfersPanel"><span class="empty">Loading…</span></div>
    </div>

    <div class="panel">
      <h2>Season by season</h2>
      <div id="seasonsPanel"><span class="empty">Loading…</span></div>
    </div>

    <div class="panel">
      <h2>Trophies</h2>
      <div id="trophiesPanel"><span class="empty">Loading…</span></div>
    </div>

    <div class="panel">
      <h2>Awards at their clubs</h2>
      <p class="note" style="margin-top:-8px">Player / club awards won while this owner was in charge.</p>
      <div id="awardsPanel"><span class="empty">Loading…</span></div>
    </div>
  </div>
  <script type="module" src="owner_profile.js"></script>
</body>
</html>
