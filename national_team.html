<script>window.CURRENT_PAGE = "national_team";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>National Team — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="squad.css">
  <link rel="stylesheet" href="international.css">
  <style>
    body.squad-page { padding-bottom: 40px; }
    .nat-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 0 20px 16px;
      flex-wrap: wrap;
    }
    .nat-meta { color: #aaa; font-size: 14px; margin-top: 4px; }
    .nat-squad-summary {
      margin: 0 20px 16px;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .nat-squad-summary.warn { border-color: #884; color: #fcc; }
    .nat-toolbar {
      margin: 0 20px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .nat-toolbar a.button {
      display: inline-block;
      padding: 10px 16px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      font-size: 13px;
    }
    .nat-toolbar a.button:hover { background: #ffaa22; }
    #squadWrap { margin: 0 20px; }
    .squad-release-btn {
      padding: 4px 10px;
      font-size: 11px;
      background: #552222;
      color: #fff;
      border: 1px solid #773;
      border-radius: 4px;
      cursor: pointer;
    }
    .squad-release-btn:hover { background: #773333; }
    .empty-squad {
      color: #888;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body class="squad-page">
  <div id="nav"></div>

  <div id="headerContainer" class="squad-header">
    <span id="natFlag" class="nat-flag nat-flag-lg" aria-hidden="true">🏳️</span>
    <div class="squad-header-titles">
      <h1 id="natTitle">National Team</h1>
      <div id="natMeta" class="nat-meta"></div>
    </div>
  </div>

  <div id="squadSummary" class="nat-squad-summary"></div>

  <div class="nat-toolbar">
    <a class="button" href="GPDB.html" id="gpdbCallUpLink">Call up in GPDB</a>
    <a class="button" href="world_cup.html">World Cup</a>
    <a class="button" href="nation_select.html">Nation selection</a>
  </div>

  <div id="squadWrap" class="panel">
    <table class="gpsl-table" id="nationalSquadTable">
      <thead>
        <tr>
          <th></th>
          <th>Player</th>
          <th>Club</th>
          <th>Pos</th>
          <th>Rating</th>
          <th>Caps</th>
          <th>G</th>
          <th>A</th>
          <th>POTM</th>
          <th>Avg</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="squad-body"></tbody>
    </table>
    <p id="emptySquad" class="empty-squad" hidden>No players called up yet. Use GPDB → My nation filter → Call up.</p>
  </div>

  <script type="module" src="national_team.js"></script>
</body>
</html>
