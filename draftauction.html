</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Draft Auction</title>
  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background:#111;
      color:#ddd;
      font-family:Arial,sans-serif;
      margin:0;
    }

    #nav {
      padding:15px;
      background:#1a1a1a;
      border-bottom:1px solid #333;
      text-align:center;
    }

    a.button, button.button {
      display:inline-block;
      padding:10px 20px;
      background:#ff9900;
      color:#111;
      text-decoration:none;
      font-weight:bold;
      border-radius:6px;
      margin:5px;
      transition:0.2s;
      cursor:pointer;
      border:none;
    }

    a.button:hover, button.button:hover {
      background:#ffaa22;
      transform:scale(1.05);
    }

    h1 {
      margin:20px;
      color:#ff9900;
    }

    .status-note {
      font-size:13px;
      color:#ccc;
      margin:0 20px 10px 20px;
    }

    .info-box {
      background:#1a1a1a;
      border:1px solid #333;
      padding:15px;
      margin:20px;
      border-radius:8px;
      font-size:13px;
      line-height:1.5;
    }

    .info-box b {
      color:#ff9900;
      font-size:14px;
    }

    .panel {
      background:#1a1a1a;
      margin:20px;
      padding:20px;
      border-radius:8px;
      border:1px solid #333;
    }

    table.gpsl-table {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    table.gpsl-table th,
    table.gpsl-table td {
      border:1px solid #333;
      padding:8px;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
    }

    table.gpsl-table th {
      background:#222;
      color:#ff9900;
    }

    .player-link {
      color:#fff;
      text-decoration:none;
    }

    .player-link:hover {
      text-decoration:underline;
      color:#ffcc66;
    }

    .bid-btn {
      padding:4px 8px;
      font-size:11px;
      border-radius:4px;
      border:none;
      cursor:pointer;
    }

    .bid-btn.enabled {
      background:#2f7a2f;
      color:#fff;
    }

    .bid-btn.enabled:hover {
      background:#369a36;
    }

    .bid-btn.disabled {
      background:#444;
      color:#999;
      cursor:not-allowed;
    }

    .draft-thumb {
      height:50px;
      width:auto;
      object-fit:contain;
      background:#000;
      border-radius:3px;
      border:1px solid #333;
      padding:1px;
      display:block;
      margin:0 auto;
    }
  </style>
</head>

<body>

  <div id="nav"></div>

  <h1>Draft Auction</h1>

  <p id="draftStatus" class="status-note"></p>
  <p id="creditPanel" class="status-note"></p>

  <div class="info-box">
    <b>Draft Rules</b><br>
    • Earn credits by being the first to bid on a free agent in GPDB<br>
    • Joining an existing draft auction costs <b>1 credit</b><br>
    • No bids by 6pm → no bids after 6pm<br>
    • No free agent bids after 6pm
  </div>

  <div class="panel">
    <table class="gpsl-table">
      <thead>
        <tr>
          <th></th>
          <th>Player</th>
          <th>Pos</th>
          <th>Rating</th>
          <th>Market Value</th>
          <th>Highest Bid</th>
          <th>Leading Club</th>
          <th>Bid</th>
        </tr>
      </thead>
      <tbody id="draftTableBody"></tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );

    window.supabase = supabase;

    let buyerShortName = null;
    let draftEnabled = false;
    let draftAuctionStartTime = null;
    let randomFinishTime = null;

    /* ============================================================
       UK TIME HELPERS
       ============================================================ */

    function parseUTC(iso) {
      const d = new Date(iso);
      return new Date(
        d.getUTCFullYear(),
        d.getUTCMonth(),
        d.getUTCDate(),
        d.getUTCHours(),
        d.getUTCMinutes(),
        d.getUTCSeconds()
      );
    }

    function nowInUK() {
      return parseUTC(new Date().toISOString());
    }
    /* ============================================================
       LOAD GLOBAL SETTINGS (NEW SYSTEM)
       ============================================================ */

    async function loadGlobalSettings() {
      const { data, error } = await supabase
        .from("global_settings")
        .select("draft_auction_enabled, draft_auction_start_time, draft_random_finish_time")
        .eq("id", 1)
        .single();

      const statusEl = document.getElementById("draftStatus");

      if (error || !data) {
        draftEnabled = false;
        draftAuctionStartTime = null;
        randomFinishTime = null;
        statusEl.textContent = "Draft auction is currently disabled.";
        return;
      }

      draftEnabled = data.draft_auction_enabled === true;

      draftAuctionStartTime = data.draft_auction_start_time
        ? parseUTC(data.draft_auction_start_time)
        : null;

      randomFinishTime = data.draft_random_finish_time
        ? parseUTC(data.draft_random_finish_time)
        : null;

      const nowUK = nowInUK();

      if (!draftEnabled) {
        statusEl.textContent = "Draft auction is currently disabled.";
      } else if (draftAuctionStartTime && nowUK < draftAuctionStartTime) {
        statusEl.textContent = "Draft auction has not started yet.";
      } else if (randomFinishTime && nowUK >= randomFinishTime) {
        statusEl.textContent = "Draft auction has ended. Results are final.";
      } else {
        statusEl.textContent =
          "Draft auction is active. It will end at a random time between 18:50 and 19:00 UK.";
      }
    }

    /* ============================================================
       NAVIGATION
       ============================================================ */

    async function buildNav(user) {
      const nav = document.getElementById("nav");

      let html = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <button id="logoutBtn" class="button">Logout</button>
      `;

      if (user.email === "rotavator66@outlook.com") {
        html += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }

      if (draftEnabled) {
        html += `<a href="draftauction.html" class="button">Draft Auction</a>`;
      }

      nav.innerHTML = html;

      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    /* ============================================================
       LOAD OWNER CLUB SHORTNAME
       ============================================================ */

    async function loadBuyerClubShortName(authId) {
      const { data, error } = await supabase
        .from("Clubs")
        .select("ShortName")
        .eq("owner_id", authId)
        .single();

      buyerShortName = error || !data ? null : data.ShortName;
    }

    /* ============================================================
       LOAD DRAFT CREDITS (NEW SYSTEM)
       ============================================================ */

    async function loadDraftCreditsForOwner() {
      try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        const { data: club } = await supabase
          .from("Clubs")
          .select("ShortName")
          .eq("owner_id", user.id)
          .single();

        if (!club) return;

        const short = club.ShortName;

        const { data: settings } = await supabase
          .from("global_settings")
          .select("draft_auction_enabled")
          .eq("id", 1)
          .single();

        if (!settings?.draft_auction_enabled) {
          document.getElementById("creditPanel").textContent = "";
          return;
        }

        // Count first bids (earn credits)
        const { data: firsts } = await supabase
          .from("Player_Transfer_Bids")
          .select("direct_bid_id")
          .eq("bidder_club_id", short)
          .eq("is_first_draft_bid", true);

        // Count consumed joins (cost credits)
        const { data: joins } = await supabase
          .from("Player_Transfer_Bids")
          .select("direct_bid_id")
          .eq("bidder_club_id", short)
          .eq("is_draft_join", true)
          .eq("draft_join_consumed", true);

        const earned = firsts ? firsts.length * 2 : 0;
        const used = joins ? new Set(joins.map(j => j.direct_bid_id)).size : 0;
        const credits = earned - used;

        document.getElementById("creditPanel").innerHTML = `
          <b>Draft Credits:</b> ${credits}<br>
          <span style="font-size:11px;color:#aaa;">
            Earned: ${earned} | Used: ${used}
          </span>
        `;
      } catch (err) {
        console.error("Error loading draft credits:", err);
      }
    }

    /* ============================================================
       MAIN PAGE INIT
       ============================================================ */

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadGlobalSettings();
      await buildNav(user);
      await loadBuyerClubShortName(user.id);
      await loadDraftCreditsForOwner();
      await loadDraftListings();
    });

    /* ============================================================
       LOAD DRAFT LISTINGS (NEW SYSTEM)
       ============================================================ */

    async function loadDraftListings() {
      const tbody = document.getElementById("draftTableBody");
      tbody.innerHTML = "";

      const nowUK = nowInUK();

      if (!draftEnabled || !draftAuctionStartTime || !randomFinishTime) {
        tbody.innerHTML = `<tr><td colspan="8">Draft auction is not active.</td></tr>`;
        return;
      }

      if (nowUK < draftAuctionStartTime) {
        tbody.innerHTML = `<tr><td colspan="8">Draft auction has not started yet.</td></tr>`;
        return;
      }

      const { data: listings, error: listingsErr } = await supabase
        .from("Player_Transfer_Listings")
        .select("id, player_id, reserve_price, status")
        .eq("listing_type", "draft")
        .eq("status", "active");

      if (listingsErr || !listings || !listings.length) {
        tbody.innerHTML = `<tr><td colspan="8">No active draft auctions.</td></tr>`;
        return;
      }

      const playerIds = [...new Set(
        listings.map(l => Number(l.player_id)).filter(v => !Number.isNaN(v))
      )];

      const { data: players, error: playersErr } = await supabase
        .from("Players")
        .select("Konami_ID, Name, Position, Rating, market_value")
        .in("Konami_ID", playerIds);

      if (playersErr || !players || !players.length) {
        tbody.innerHTML = `<tr><td colspan="8">Error loading players.</td></tr>`;
        return;
      }

      const playerMap = new Map(players.map(p => [String(p.Konami_ID), p]));

      const { data: bids } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id, bidder_club_id, bid_amount")
        .in("direct_bid_id", playerIds)
        .eq("is_direct", true);

      const bidsByPlayer = new Map();
      if (bids) {
        for (const b of bids) {
          const key = String(b.direct_bid_id);
          if (!bidsByPlayer.has(key)) bidsByPlayer.set(key, []);
          bidsByPlayer.get(key).push(b);
        }
      }

      const clubShortNames = bids ? [...new Set(bids.map(b => b.bidder_club_id))] : [];

      const { data: clubs } = await supabase
        .from("Clubs")
        .select("ShortName, Club")
        .in("ShortName", clubShortNames);

      const clubMap = new Map((clubs || []).map(c => [c.ShortName, c.Club]));
      /* ============================================================
         BUILD TABLE ROWS
         ============================================================ */

      for (const listing of listings) {
        const player = playerMap.get(String(listing.player_id));
        if (!player) continue;

        const playerBids = bidsByPlayer.get(String(player.Konami_ID)) || [];

        let highestAmount = null;
        let leadingClubShort = null;

        if (playerBids.length) {
          const highest = playerBids.reduce(
            (max, b) => (b.bid_amount > max.bid_amount ? b : max),
            playerBids[0]
          );
          highestAmount = highest.bid_amount;
          leadingClubShort = highest.bidder_club_id;
        }

        const leadingClubFull = leadingClubShort
          ? (clubMap.get(leadingClubShort) || leadingClubShort)
          : "None";

        const canBid = await canClubBidOnPlayer(player.Konami_ID);

        const auctionEnded = nowUK >= randomFinishTime;

        const btnClass = (!auctionEnded && canBid) ? "enabled" : "disabled";
        const btnLabel = auctionEnded ? "Ended" : (canBid ? "Bid" : "Locked");

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <img
              class="draft-thumb"
              src="https://pesdb.net/assets/img/card/b${player.Konami_ID}.png"
              alt="${player.Name}"
              onerror="this.src='https://i.imgur.com/3s8XQ7Y.png';"
            />
          </td>
          <td>
            <a class="player-link" href="draftauction_player.html?player=${player.Konami_ID}">
              ${player.Name}
            </a>
          </td>
          <td>${player.Position}</td>
          <td>${player.Rating}</td>
          <td>₿ ${Number(player.market_value).toLocaleString("en-GB")}</td>
          <td>${highestAmount !== null ? `₿ ${Number(highestAmount).toLocaleString("en-GB")}` : "None"}</td>
          <td>${leadingClubFull}</td>
          <td>
            <button
              class="bid-btn ${btnClass}"
              data-konami-id="${player.Konami_ID}"
              ${(!auctionEnded && canBid) ? "" : "disabled"}
            >
              ${btnLabel}
            </button>
          </td>
        `;

        tbody.appendChild(row);
      }

      if (!tbody.children.length) {
        tbody.innerHTML = `<tr><td colspan="8">No active draft auctions.</td></tr>`;
      }

      document.addEventListener("click", (e) => {
        const target = e.target;
        if (
          target.classList &&
          target.classList.contains("bid-btn") &&
          target.classList.contains("enabled")
        ) {
          const konamiId = target.getAttribute("data-konami-id");
          window.location = `draftauction_player.html?player=${konamiId}`;
        }
      });
    }

    /* ============================================================
       BIDDING ELIGIBILITY (NEW SYSTEM)
       ============================================================ */

    async function canClubBidOnPlayer(konamiId) {
      const nowUK = nowInUK();

      if (!draftEnabled) return false;
      if (!buyerShortName) return false;
      if (!draftAuctionStartTime || !randomFinishTime) return false;

      // Draft not started yet
      if (nowUK < draftAuctionStartTime) return false;

      // Draft ended
      if (nowUK >= randomFinishTime) return false;

      // Check if this club has already bid on this player
      const { data: existing } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id, is_first_draft_bid, is_draft_join, draft_join_consumed, bid_time")
        .eq("direct_bid_id", konamiId)
        .eq("bidder_club_id", buyerShortName)
        .eq("is_direct", true);

      // If already bid → always allowed to continue bidding until random finish
      if (existing && existing.length) return true;

      // If no existing bids → this club would be the FIRST bidder
      const { data: allBids } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id")
        .eq("direct_bid_id", konamiId)
        .eq("is_direct", true);

      const isFirstBid = !allBids || allBids.length === 0;

      if (isFirstBid) {
        // First bidder always allowed (earns credits)
        return true;
      }

      // Otherwise → joining an existing auction costs 1 credit
      const credits = await getCredits(buyerShortName);
      return credits > 0;
    }

    /* ============================================================
       GET CREDITS (NEW SYSTEM)
       ============================================================ */

    async function getCredits(short) {
      const { data: firsts } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", short)
        .eq("is_first_draft_bid", true);

      const { data: joins } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", short)
        .eq("is_draft_join", true)
        .eq("draft_join_consumed", true);

      const earned = firsts ? firsts.length * 2 : 0;
      const used = joins ? new Set(joins.map(j => j.direct_bid_id)).size : 0;

      return earned - used;
    }

  </script>

</body>
</html>
