<script>
  const CURRENT_PAGE = "draftauction";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Draft Auction</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body {
      background:#111;
      color:#ddd;
      font-family:Arial,sans-serif;
      margin:0;
    }
    #nav {
      padding:15px;
      background:#1a1a1a;
      border-bottom:1px solid #333;
      text-align:center;
    }
    a.button, button.button {
      display:inline-block;
      padding:10px 20px;
      background:#ff9900;
      color:#111;
      text-decoration:none;
      font-weight:bold;
      border-radius:6px;
      margin:5px;
      transition:0.2s;
      cursor:pointer;
      border:none;
    }
    a.button:hover, button.button:hover {
      background:#ffaa22;
      transform:scale(1.05);
    }
    h1 {
      margin:20px;
      color:#ff9900;
    }
    .status-note {
      font-size:12px;
      color:#ccc;
      margin:0 20px 10px 20px;
    }
    .panel {
      background:#1a1a1a;
      margin:20px;
      padding:20px;
      border-radius:8px;
      border:1px solid #333;
    }
    table.gpsl-table {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }
    table.gpsl-table th,
    table.gpsl-table td {
      border:1px solid #333;
      padding:8px;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:center;
    }
    table.gpsl-table th {
      background:#222;
      color:#ff9900;
    }
    .player-link {
      color:#fff;
      text-decoration:none;
    }
    .player-link:hover {
      text-decoration:underline;
      color:#ffcc66;
    }
    .bid-btn {
      padding:4px 8px;
      font-size:11px;
      border-radius:4px;
      border:none;
      cursor:pointer;
    }
    .bid-btn.enabled {
      background:#2f7a2f;
      color:#fff;
    }
    .bid-btn.enabled:hover {
      background:#369a36;
    }
    .bid-btn.disabled {
      background:#444;
      color:#999;
      cursor:not-allowed;
    }
    .draft-thumb {
      height:50px;
      width:auto;
      object-fit:contain;
      background:#000;
      border-radius:3px;
      border:1px solid #333;
      padding:1px;
      display:block;
      margin:0 auto;
    }
  </style>
</head>
<body>
  <div id="nav"></div>

  <h1>Draft Auction</h1>
  <p id="draftStatus" class="status-note"></p>
  <p id="creditPanel" class="status-note"></p>

  <div class="panel">
    <table class="gpsl-table">
     <thead>
      <tr>
        <th></th>
        <th>Player</th>
        <th>Pos</th>
        <th>Rating</th>
        <th>Market Value</th>
        <th>Highest Bid</th>
        <th>Leading Club</th>
        <th>Time</th>
        <th>Bid</th>
      </tr>
     </thead>
      <tbody id="draftTableBody"></tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );

    window.supabase = supabase;

    let buyerShortName = null;
    let draftEnabled = false;
    let randomFinishTime = null;
    let draftAuctionStartTime = null; // official start time (UTC parsed safely)

    /* ============================================================
       SAFE UTC PARSER + UK TIME HELPERS
       ============================================================ */

    function parseUTC(iso) {
      const d = new Date(iso);
      return new Date(
        d.getUTCFullYear(),
        d.getUTCMonth(),
        d.getUTCDate(),
        d.getUTCHours(),
        d.getUTCMinutes(),
        d.getUTCSeconds()
      );
    }

    function nowInUK() {
      // same trick as admin.html: compare in UTC-safe space
      return parseUTC(new Date().toISOString());
    }

    /* ============================================================
       SHARED CREDIT FUNCTIONS (GPDB VERSION)
       ============================================================ */

    function getDraftWindowTimes() {
      const nowLocal = new Date();
      const today = new Date(nowLocal.getFullYear(), nowLocal.getMonth(), nowLocal.getDate());
      const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);

      const sevenPmYesterday = new Date(yesterday);
      sevenPmYesterday.setHours(19, 0, 0, 0);

      const sixPmToday = new Date(today);
      sixPmToday.setHours(18, 0, 0, 0);

      const sevenPmToday = new Date(today);
      sevenPmToday.setHours(19, 0, 0, 0);

      return { sevenPmYesterday, sixPmToday, sevenPmToday };
    }

    async function getDraftCreditsForGPDB(clubShortName) {
      const { sevenPmYesterday, sixPmToday } = getDraftWindowTimes();

      const { data: firsts } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", clubShortName)
        .eq("is_first_draft_bid", true)
        .gte("bid_time", sevenPmYesterday.toISOString())
        .lt("bid_time", sixPmToday.toISOString());

      const { data: joins } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", clubShortName)
        .eq("is_draft_join", true)
        .eq("draft_join_consumed", true)
        .gte("bid_time", sevenPmYesterday.toISOString())
        .lt("bid_time", sixPmToday.toISOString());

      const firstCount = firsts ? firsts.length : 0;
      const joinCount = joins ? new Set(joins.map(j => j.direct_bid_id)).size : 0;

      return (firstCount * 2) - joinCount;
    }

    async function loadDraftCreditsForOwner() {
      try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        const { data: club } = await supabase
          .from("Clubs")
          .select("ShortName")
          .eq("owner_id", user.id)
          .single();
        if (!club) return;

        const buyerShortName = club.ShortName;

        const { data: settings } = await supabase
          .from("global_settings")
          .select("draft_auction_enabled")
          .eq("id", 1)
          .single();

        if (!settings?.draft_auction_enabled) {
          document.getElementById("creditPanel").textContent = "";
          return;
        }

        const { sevenPmYesterday, sixPmToday } = getDraftWindowTimes();

        const credits = await getDraftCreditsForGPDB(buyerShortName);

        const { data: firsts } = await supabase
          .from("Player_Transfer_Bids")
          .select("direct_bid_id")
          .eq("bidder_club_id", buyerShortName)
          .eq("is_first_draft_bid", true)
          .gte("bid_time", sevenPmYesterday.toISOString())
          .lt("bid_time", sixPmToday.toISOString());

        const { data: joins } = await supabase
          .from("Player_Transfer_Bids")
          .select("direct_bid_id")
          .eq("bidder_club_id", buyerShortName)
          .eq("is_draft_join", true)
          .eq("draft_join_consumed", true)
          .gte("bid_time", sevenPmYesterday.toISOString())
          .lt("bid_time", sixPmToday.toISOString());

        const earned = firsts ? firsts.length * 2 : 0;
        const used = joins ? new Set(joins.map(j => j.direct_bid_id)).size : 0;

        document.getElementById("creditPanel").innerHTML = `
          <b>Draft Credits:</b> ${credits}<br>
          <span style="font-size:11px;color:#aaa;">
            Earned: ${earned} | Used: ${used}
          </span>
        `;
      } catch (err) {
        console.error("Error loading draft credits:", err);
      }
    }

    /* ============================================================
       MAIN PAGE LOGIC
       ============================================================ */

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location = "login.html";
        return;
      }

      await loadGlobalSettings();
      await buildNav(user);
      await loadBuyerClubShortName(user.id);

      // unified credit panel
      await loadDraftCreditsForOwner();

      await loadDraftAuctions();
      setInterval(updateCountdowns, 10000);
    });

    async function loadGlobalSettings() {
      const { data, error } = await supabase
        .from("global_settings")
        .select("draft_auction_enabled, draft_random_finish_time, draft_auction_start_time")
        .eq("id", 1)
        .single();

      const statusEl = document.getElementById("draftStatus");

      if (error || !data) {
        draftEnabled = false;
        draftAuctionStartTime = null;
        randomFinishTime = null;
        statusEl.textContent = "Draft auction is currently disabled.";
        return;
      }

      draftEnabled = data.draft_auction_enabled === true;

      // parse official times as UTC-safe
      draftAuctionStartTime = data.draft_auction_start_time
        ? parseUTC(data.draft_auction_start_time)
        : null;

      randomFinishTime = data.draft_random_finish_time
        ? parseUTC(data.draft_random_finish_time)
        : null;

      const nowUK = nowInUK();

      if (!draftEnabled) {
        statusEl.textContent = "Draft auction is currently disabled.";
      } else if (draftAuctionStartTime && nowUK < draftAuctionStartTime) {
        statusEl.textContent = "Draft auction has not started yet.";
      } else if (randomFinishTime && nowUK >= randomFinishTime) {
        statusEl.textContent = "Draft auction has ended. Results are final.";
      } else {
        statusEl.textContent =
          "Draft auction is active. Auctions end at a random time between 18:50 and 19:00.";
      }
    }

    async function buildNav(user) {
      const nav = document.getElementById("nav");
      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer Market</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <button id="logoutBtn" class="button">Logout</button>
      `;

      if (user.email === "rotavator66@outlook.com") {
        nav.innerHTML += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }

      if (draftEnabled) {
        nav.innerHTML += `<a href="draftauction.html" class="button">Draft Auction</a>`;
      }

      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        window.location = "login.html";
      };
    }

    async function loadBuyerClubShortName(authId) {
      const { data, error } = await supabase
        .from("Clubs")
        .select("ShortName")
        .eq("owner_id", authId)
        .single();

      if (error || !data) {
        buyerShortName = null;
        return;
      }
      buyerShortName = data.ShortName;
    }

    /* ============================================================
       EXISTING AUCTION LOGIC (BST-SAFE START/END CHECKS)
       ============================================================ */

    async function loadDraftAuctions() {
      const tbody = document.getElementById("draftTableBody");
      tbody.innerHTML = "";

      if (!draftEnabled || !randomFinishTime) {
        tbody.innerHTML = `<tr><td colspan="9">Draft auction is not active.</td></tr>`;
        return;
      }

      const { data: listings, error: listingsErr } = await supabase
        .from("Player_Transfer_Listings")
        .select("id, player_id, reserve_price, status")
        .eq("listing_type", "draft")
        .eq("status", "active");

      if (listingsErr || !listings || !listings.length) {
        tbody.innerHTML = `<tr><td colspan="9">No active draft auctions.</td></tr>`;
        return;
      }

      const playerIds = [...new Set(
        listings
          .map(l => Number(String(l.player_id).trim()))
          .filter(v => !Number.isNaN(v))
      )];

      const { data: players, error: playersErr } = await supabase
        .from("Players")
        .select("Konami_ID, Name, Position, Rating, market_value")
        .in("Konami_ID", playerIds);

      if (playersErr || !players || !players.length) {
        tbody.innerHTML = `<tr><td colspan="9">Error loading players for draft auctions.</td></tr>`;
        return;
      }

      const playerMap = new Map(players.map(p => [String(p.Konami_ID), p]));

      const listingIds = listings.map(l => l.id);
      const { data: bids, error: bidsErr } = await supabase
        .from("Player_Transfer_Bids")
        .select("listing_id, direct_bid_id, bidder_club_id, bid_amount, bid_time")
        .in("listing_id", listingIds);

      if (bidsErr || !bids || !bids.length) {
        tbody.innerHTML = `<tr><td colspan="9">No bids found for draft auctions.</td></tr>`;
        return;
      }

      const clubShortNames = [...new Set(bids.map(b => b.bidder_club_id))];

      const { data: clubs, error: clubsErr } = await supabase
        .from("Clubs")
        .select("ShortName, Club")
        .in("ShortName", clubShortNames);

      const clubMap = new Map(
        (clubs || []).map(c => [c.ShortName, c.Club])
      );

      const nowUK = nowInUK();
      const { sevenPmYesterday, sixPmToday } = getDraftWindowTimes();

      for (const listing of listings) {
        const player = playerMap.get(String(listing.player_id));
        if (!player) continue;

        const listingBids = bids.filter(b => b.listing_id === listing.id);
        if (!listingBids.length) continue;

        const highest = listingBids.reduce(
          (max, b) => (b.bid_amount > max.bid_amount ? b : max),
          listingBids[0]
        );

        const leadingClubShort = highest.bidder_club_id;
        const leadingClubFull = clubMap.get(leadingClubShort) || leadingClubShort;
        const highestAmount = highest.bid_amount;

        const canBid = await canClubBidOnPlayer(
          buyerShortName,
          player.Konami_ID,
          nowUK,
          sixPmToday
        );

        const auctionEnded = randomFinishTime && nowUK >= randomFinishTime;

        const bidBtnClass = !auctionEnded && canBid ? "enabled" : "disabled";
        const bidBtnLabel = auctionEnded ? "Ended" : (canBid ? "Bid" : "Locked");

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>
            <img
              class="draft-thumb"
              src="https://pesdb.net/assets/img/card/b${player.Konami_ID}.png"
              alt="${player.Name}"
              onerror="this.src='https://i.imgur.com/3s8XQ7Y.png';"
            />
          </td>
          <td>
            <a class="player-link" href="draftauction_player.html?player=${player.Konami_ID}">
              ${player.Name}
            </a>
          </td>
          <td>${player.Position}</td>
          <td>${player.Rating}</td>
          <td>₿ ${Number(player.market_value).toLocaleString("en-GB")}</td>
          <td>₿ ${Number(highestAmount).toLocaleString("en-GB")}</td>
          <td>${leadingClubFull}</td>
          <td class="time-cell">
            ${formatTimeRemaining(nowUK)}
          </td>
          <td>
            <button
              class="bid-btn ${bidBtnClass}"
              data-konami-id="${player.Konami_ID}"
              ${!auctionEnded && canBid ? "" : "disabled"}
            >
              ${bidBtnLabel}
            </button>
          </td>
        `;
        tbody.appendChild(row);
      }

      if (!tbody.children.length) {
        tbody.innerHTML = `<tr><td colspan="9">No active draft auctions.</td></tr>`;
      }

      document.addEventListener("click", (e) => {
        const target = e.target;
        if (
          target.classList &&
          target.classList.contains("bid-btn") &&
          target.classList.contains("enabled")
        ) {
          const konamiId = target.getAttribute("data-konami-id");
          window.location = `draftauction_player.html?player=${konamiId}`;
        }
      });
    }

    async function canClubBidOnPlayer(clubShortName, konamiId, nowUK, sixPmToday) {
      if (!draftEnabled || !clubShortName || !randomFinishTime) return false;

      // block all bids before official start time
      if (draftAuctionStartTime && nowUK < draftAuctionStartTime) return false;

      if (nowUK >= randomFinishTime) return false;

      const { sevenPmYesterday, sixPmToday: sixPm } = getDraftWindowTimes();

      // must have at least one draft bid before 6pm to bid after 6pm
      if (nowUK >= sixPmToday) {
        const { data: pre6Bids } = await supabase
          .from("Player_Transfer_Bids")
          .select("bid_id")
          .eq("bidder_club_id", clubShortName)
          .eq("is_direct", true)
          .gte("bid_time", sevenPmYesterday.toISOString())
          .lt("bid_time", sixPmToday.toISOString());

        if (!pre6Bids || !pre6Bids.length) return false;
      }

      const { data: existingBids } = await supabase
        .from("Player_Transfer_Bids")
        .select("bidder_club_id, bid_time")
        .eq("direct_bid_id", konamiId)
        .eq("is_direct", true)
        .gte("bid_time", sevenPmYesterday.toISOString())
        .lt("bid_time", getDraftWindowTimes().sevenPmToday.toISOString());

      if (!existingBids || !existingBids.length) return false;

      const firstBidder = existingBids[0].bidder_club_id;
      const isFirstBidder = firstBidder === clubShortName;

      if (isFirstBidder) return true;

      // joining auction: check if they already joined this player
      const { data: priorJoins } = await supabase
        .from("Player_Transfer_Bids")
        .select("bid_id")
        .eq("direct_bid_id", konamiId)
        .eq("bidder_club_id", clubShortName)
        .eq("is_draft_join", true);

      if (priorJoins && priorJoins.length) {
        return true; // already paid credit for this thread
      }

      const credits = await getDraftCredits(clubShortName, sevenPmYesterday, sixPm);
      return credits > 0;
    }

    async function getDraftCredits(clubShortName, windowStart, sixPmToday) {
      const { data: firsts } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id")
        .eq("bidder_club_id", clubShortName)
        .eq("is_first_draft_bid", true)
        .gte("bid_time", windowStart.toISOString())
        .lt("bid_time", sixPmToday.toISOString());

      const { data: joins } = await supabase
        .from("Player_Transfer_Bids")
        .select("direct_bid_id, draft_join_consumed")
        .eq("bidder_club_id", clubShortName)
        .eq("is_draft_join", true)
        .eq("draft_join_consumed", true)
        .gte("bid_time", windowStart.toISOString())
        .lt("bid_time", sixPmToday.toISOString());

      const firstCount = firsts ? firsts.length : 0;
      const uniqueJoins = joins
        ? new Set(joins.map(j => j.direct_bid_id)).size
        : 0;

      return (firstCount * 2) - uniqueJoins;
    }

    function formatTimeRemaining(nowUK) {
      if (!randomFinishTime) return "-";
      const diffMs = randomFinishTime - nowUK;
      if (diffMs <= 0) return "Ended";

      const totalSecs = Math.floor(diffMs / 1000);
      const hours = Math.floor(totalSecs / 3600);
      const mins = Math.floor((totalSecs % 3600) / 60);
      const secs = totalSecs % 60;

      return `${hours}h ${mins}m ${secs}s`;
    }

    function updateCountdowns() {
      if (!randomFinishTime) return;
      const nowUK = nowInUK();
      const cells = document.querySelectorAll(".time-cell");
      cells.forEach(cell => {
        cell.textContent = formatTimeRemaining(nowUK);
      });

      if (nowUK >= randomFinishTime) {
        const statusEl = document.getElementById("draftStatus");
        statusEl.textContent = "Draft auction has ended. Results are final.";

        document.querySelectorAll(".bid-btn.enabled").forEach(btn => {
          btn.classList.remove("enabled");
          btn.classList.add("disabled");
          btn.textContent = "Ended";
          btn.disabled = true;
        });
      }
    }
  </script>
</body>
</html>
