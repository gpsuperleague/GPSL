<!DOCTYPE html>
<html>
<head>

  <!-- CURRENT PAGE MUST BE DEFINED BEFORE ANY MODULE SCRIPTS -->
  <script>
    window.CURRENT_PAGE = "dashboard";
  </script>

  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #nav {
      padding: 15px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      color: var(--club-accent, #ff9900);
    }

    .page-container {
      width: 95%;
      max-width: 1400px;
      margin: 20px auto 40px auto;
    }

    /* HEADER */
    #headerContainer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    #headerLeft {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #clubBadgeHeader {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    #headerRight {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* COUNTDOWN BOX */
    #draftCountdownContainer {
      background: var(--club-panel, #1a1a1a);
      border: 1px solid var(--club-border, #333);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 170px;
      text-align: center;
      color: var(--club-accent, #ff9900);
      font-weight: bold;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #draftLocalStart {
      font-size: 12px;
      color: #ccc;
      margin-top: 4px;
      white-space: pre-line;
      line-height: 1.4;
    }

  </style>

  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="club_dashboard_theme.css">
</head>

<body class="page-dashboard">

  <div id="nav"></div>

  <div class="page-container">

    <!-- HEADER -->
    <div id="headerContainer">

      <div id="headerLeft">
        <img id="clubBadgeHeader" src="" alt="Club Badge">
        <div>
          <h1 id="dashboardTitle">GPSL Dashboard</h1>
          <div id="userEmail"></div>
        </div>
      </div>

      <!-- COUNTDOWN -->
      <div id="headerRight">
        <div id="draftCountdownContainer">
          <span id="draftCountdown"></span>
          <div id="draftLocalStart"></div>
        </div>
      </div>

    </div>

    <p id="dashboardLayoutWarn" class="dashboard-layout-warn" hidden></p>

    <div class="dashboard-toolbar">
      <button type="button" id="dashboardEditBtn" class="dashboard-toolbar-btn" aria-pressed="false">
        Arrange tiles
      </button>
      <span id="dashboardEditHint" class="dashboard-edit-hint" hidden>
        Drag tiles to reorder. Click × to remove. Add more from any page with “Add to Dashboard”.
      </span>
    </div>

    <div id="dashboardGrid" class="tile-grid dashboard-grid"></div>

    <div id="dashboardEmpty" class="dashboard-empty" hidden>
      <p>Your dashboard is empty.</p>
      <p class="dashboard-empty-hint">
        Open any GPSL page and use <strong>Add to Dashboard</strong> to pin shortcuts here.
      </p>
    </div>

  </div>

  <!-- MODULES (global via dashboard.js only — avoids double init) -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>
