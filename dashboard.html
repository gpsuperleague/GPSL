<!DOCTYPE html>
<html>
<head>

  <!-- CURRENT PAGE MUST BE DEFINED BEFORE ANY MODULE SCRIPTS -->
  <script>
    window.CURRENT_PAGE = "dashboard";
  </script>

  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #nav {
      padding: 15px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      color: #ff9900;
    }

    .page-container {
      width: 95%;
      max-width: 1400px;
      margin: 20px auto 40px auto;
    }

    /* HEADER */
    #headerContainer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    #headerLeft {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #clubBadgeHeader {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    #headerRight {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* COUNTDOWN BOX */
    #draftCountdownContainer {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 170px;
      text-align: center;
      color: #ff9900;
      font-weight: bold;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #draftLocalStart {
      font-size: 12px;
      color: #ccc;
      margin-top: 4px;
    }

    /* INBOX PANEL */
    #inboxPanel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 150px;
      text-align: center;
      color: #ff9900;
      font-weight: bold;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    #inboxPanel .inbox-icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    #inboxPanel .inbox-count {
      font-size: 12px;
      color: #ccc;
      margin-top: 4px;
    }

    #inboxPanel.has-unread {
      box-shadow: 0 0 8px rgba(255, 153, 0, 0.7);
    }

    /* TILE GRID */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      margin-top: 20px;
    }

    .tile {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #ff9900;
    }

    .tile:hover {
      background: #222;
      transform: scale(1.03);
      border-color: #ff9900;
    }
  </style>

  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <div id="nav"></div>

  <div class="page-container">

    <!-- HEADER -->
    <div id="headerContainer">

      <div id="headerLeft">
        <img id="clubBadgeHeader" src="" alt="Club Badge">
        <div>
          <h1 id="dashboardTitle">GPSL Dashboard</h1>
          <div id="userEmail"></div>
        </div>
      </div>

      <!-- INBOX PANEL -->
      <div id="inboxPanel">
        <div class="inbox-icon">📥</div>
        <div>Inbox</div>
        <div class="inbox-count">
          <span id="inboxUnreadCount">0</span> unread
        </div>
      </div>

      <!-- COUNTDOWN -->
      <div id="headerRight">
        <div id="draftCountdownContainer">
          <span id="draftCountdown"></span>
          <div id="draftLocalStart"></div>
        </div>
      </div>

    </div>

    <!-- TILE GRID -->
    <div class="tile-grid">

      <div class="tile tile-club" onclick="location.href='club_details.html'">
        Club Details
      </div>

      <div class="tile tile-stadium" onclick="location.href='stadium.html'">
        Stadium
      </div>

      <div class="tile tile-finances" onclick="location.href='finances.html'">
        Club Finances
      </div>

      <div class="tile tile-squad" onclick="location.href='squad.html'">
        Squad
      </div>

      <div class="tile tile-transfer" onclick="location.href='transfer_center.html'">
        Transfer Centre
      </div>

      <div class="tile tile-matchday" onclick="location.href='matchday.html'">
        Match Day
      </div>

      <div class="tile tile-fixtures" onclick="location.href='fixtures.html'">
        Fixtures
      </div>

      <div class="tile tile-history" onclick="location.href='history.html'">
        Club History
      </div>

      <div class="tile tile-progress" onclick="location.href='progress.html'">
        Competition Progress
      </div>

      <div class="tile tile-special-auction" id="specialAuctionTile" style="display:none;" onclick="location.href='special_auction.html'">
        Special Auction
      </div>

    </div>

  </div>

  <!-- MODULES -->
  <script type="module" src="global.js"></script>
  <script type="module" src="clubs_lookup.js"></script>
  <script type="module" src="dashboard.js"></script>

</body>
</html>
