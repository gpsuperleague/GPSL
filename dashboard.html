<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <!-- Button styling to match index.html -->
  <style>
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    /* Optional: make the club area look tidy */
    #clubArea {
      width: 25%;
      min-width: 250px;
      max-width: 400px;
      height: 80vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>GPSL Dashboard</h1>

  <p id="welcome"></p>

  <!-- Dynamic navigation will be inserted here -->
  <div id="nav"></div>

  <hr>

  <h2>Your Club Area</h2>
  <div id="clubArea">
    <!-- Club-specific content will go here -->
  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = supabase.createClient("YOUR_SUPABASE_URL", "YOUR_SUPABASE_KEY");
  </script>

  <script>
    // -------------------------------
    // AUTH + NAVIGATION
    // -------------------------------
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("welcome").innerText =
        "Logged in as: " + user.email;

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      // Load the user's assigned club
      loadClubArea(user.uid);
    });

    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    // -------------------------------
    // LOAD USER'S CLUB FROM FIRESTORE
    // -------------------------------
    function loadClubArea(uid) {
      db.collection("users").doc(uid).get().then(doc => {
        if (!doc.exists) {
          document.getElementById("clubArea").innerHTML =
            "<p>No club assigned. Contact admin.</p>";
          return;
        }

        const clubShort = doc.data().club; // e.g. "URD"
        loadClubDetails(clubShort);
      });
    }

    // -------------------------------
    // LOAD CLUB BADGE + PLAYERS
    // -------------------------------
    function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      fetchClubPlayers(shortName).then(players => {
        document.getElementById("clubArea").innerHTML = `
          <div style="text-align:center;">
            <img src="${badgePath}" style="width:120px; height:auto;">
            <h3>${shortName}</h3>
          </div>

          <div style="max-height:300px; overflow-y:auto; border:1px solid #444; padding:10px;">
            ${players.map(p => `
              <div>${p.Name} — £${p.MarketValue}</div>
            `).join("")}
          </div>
        `;
      });
    }

    // -------------------------------
    // FETCH PLAYERS FROM SUPABASE
    // -------------------------------
    async function fetchClubPlayers(shortName) {
      const { data } = await supabase
        .from("Players")
        .select("*")
        .eq("ClubShort", shortName)
        .order("Name", { ascending: true });

      return data || [];
    }
  </script>

</body>
</html>
