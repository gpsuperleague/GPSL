<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <!-- Button styling to match index.html -->
  <style>
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    /* Club area styling */
    #clubArea {
      width: 25%;
      min-width: 250px;
      max-width: 400px;
      height: 80vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>GPSL Dashboard</h1>

  <p id="welcome"></p>

  <!-- Dynamic navigation will be inserted here -->
  <div id="nav"></div>

  <hr>

  <h2>Your Club Area</h2>
  <div id="clubArea">
    <!-- Club-specific content will go here -->
  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

  <!-- Supabase (ESM module) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Make Supabase available globally
    window.supabaseClient = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );
  </script>

  <!-- Dashboard logic -->
  <script>
    // -------------------------------
    // AUTH + NAVIGATION
    // -------------------------------
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("welcome").innerText =
        "Logged in as: " + user.email;

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      console.log("User UID:", user.uid);

      // Load the user's assigned club
      loadClubArea(user.uid);
    });

    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    // -------------------------------
    // LOAD USER'S CLUB FROM FIRESTORE
    // -------------------------------
    function loadClubArea(uid) {
      db.collection("users").doc(uid).get().then(doc => {
        console.log("Firestore user doc:", doc.data());

        if (!doc.exists) {
          document.getElementById("clubArea").innerHTML =
            "<p>No club assigned. Contact admin.</p>";
          return;
        }

        const clubShort = doc.data().club;
        console.log("Assigned club:", clubShort);

        loadClubDetails(clubShort);
      });
    }

    // -------------------------------
    // LOAD CLUB BADGE + PLAYERS
    // -------------------------------
    function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      fetchClubPlayers(shortName).then(players => {
        console.log("Players loaded:", players);

        document.getElementById("clubArea").innerHTML = `
          <div style="text-align:center;">
            <img src="${badgePath}" style="width:120px; height:auto;">
            <h3>${shortName}</h3>
          </div>

          <div style="max-height:300px; overflow-y:auto; border:1px solid #444; padding:10px;">
            ${players.map(p => `
              <div>${p.Name} — £${p.MarketValue}</div>
            `).join("")}
          </div>
        `;
      });
    }

    // -------------------------------
    // FETCH PLAYERS FROM SUPABASE
    // -------------------------------
    async function fetchClubPlayers(shortName) {
      const { data, error } = await window.supabaseClient
        .from("Players")
        .select("*")
        .eq("clubShort", shortName)
        .order("Name", { ascending: true });

      if (error) console.error("Supabase error:", error);

      return data || [];
    }
  </script>

</body>
</html>
