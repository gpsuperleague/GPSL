<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table.gpsl-table td {
      padding: 8px;
      border-bottom: 1px solid #333;
    }

    table.gpsl-table tr:nth-child(even) {
      background: #181818;
    }

    .section-header {
      margin-top: 40px;
      background:#222;
      color:#ff9900;
      padding:8px 14px;
      border-radius:6px;
      font-size:20px;
      font-weight:bold;
      display:inline-block;
    }
  </style>
</head>

<body>

  <!-- TOP NAVIGATION -->
  <div id="nav" style="padding: 15px; background:#1a1a1a; border-bottom:1px solid #333;"></div>

  <!-- HEADER -->
  <div id="headerContainer">
    <div id="headerLeft">
      <img id="clubBadgeHeader" src="" alt="Club Badge">
      <div>
        <h1 id="dashboardTitle">GPSL Dashboard</h1>
        <div id="userEmail"></div>
      </div>
    </div>

    <div id="headerRight">
      <h2 class="panelTitle">Club Details</h2>
      <div id="clubDetailsPanel">

        <div class="detailRow">
          <label>Club Name:</label>
          <span id="clubNameField"></span>
        </div>

        <div class="detailRow">
          <label>Owner:</label>
          <input id="ownerInput" type="text">
          <button id="editOwnerBtn">Edit</button>
        </div>

        <button id="saveOwnerBtn" class="button">Save Owner</button>

        <div class="detailRow">
          <label>Stadium:</label>
          <span id="stadiumField"></span>
        </div>

        <div class="detailRow">
          <label>Capacity:</label>
          <span id="capacityField"></span>
        </div>

      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <div id="leftColumn">
      <h2 class="section-header">Squad</h2>
      <div id="squadContainer"></div>

      <h2 class="section-header">Your Listed Players</h2>
      <div id="listedContainer"></div>
    </div>

    <div id="rightColumn"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase.js"></script>

  <!-- Supabase -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    window.supabaseClient = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );
  </script>

  <!-- JS -->
  <script>
    function formatBTC(num) {
      if (!num || isNaN(num)) return "₿ 0";
      return "₿ " + Number(num).toLocaleString("en-GB");
    }

    function lockOwnerField() {
      ownerInput.classList.remove("owner-editing");
      ownerInput.classList.add("owner-locked");
      ownerInput.setAttribute("readonly", true);
      document.getElementById("saveOwnerBtn").style.display = "none";
    }

    function unlockOwnerField() {
      ownerInput.classList.remove("owner-locked");
      ownerInput.classList.add("owner-editing");
      ownerInput.removeAttribute("readonly");
      document.getElementById("saveOwnerBtn").style.display = "inline-block";
    }

    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("userEmail").textContent = `User: ${user.email}`;

      document.getElementById("nav").innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer-List</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      loadClub(user.uid);
    });

    function logout() {
      auth.signOut().then(() => window.location = "login.html");
    }

    async function loadClub(uid) {
      const userDoc = await db.collection("users").doc(uid).get();
      if (!userDoc.exists) return;

      const shortName = userDoc.data().club;
      loadClubDetails(shortName);
    }

    async function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      const { data: club } = await window.supabaseClient
        .from("Clubs")
        .select("Club, owner, Stadium, Capacity, ShortName")
        .eq("ShortName", shortName)
        .single();

      if (!club) return;

      const fullName = club.Club;

      document.getElementById("clubBadgeHeader").src = badgePath;
      document.getElementById("dashboardTitle").textContent = `${fullName} Dashboard`;

      document.getElementById("clubNameField").textContent = fullName;

      ownerInput.value = club.owner || "";
      ownerInput.style.width = (ownerInput.value.length + 2) + "ch";

      if (ownerInput.value.trim() !== "") {
        lockOwnerField();
        editOwnerBtn.style.display = "inline-block";
        saveOwnerBtn.style.display = "none";
      } else {
        unlockOwnerField();
        editOwnerBtn.style.display = "none";
        saveOwnerBtn.style.display = "inline-block";
      }

      editOwnerBtn.onclick = () => {
        unlockOwnerField();
        editOwnerBtn.style.display = "none";
      };

      saveOwnerBtn.onclick = async () => {
        const newOwner = ownerInput.value.trim();
        if (!newOwner) return alert("Owner cannot be empty");

        await window.supabaseClient
          .from("Clubs")
          .update({ owner: newOwner })
          .eq("ShortName", shortName)

        lockOwnerField();
        editOwnerBtn.style.display = "inline-block";
        saveOwnerBtn.style.display = "none";

        alert("Owner updated");
      };

      ownerInput.addEventListener("input", () => {
        ownerInput.style.width = (ownerInput.value.length + 2) + "ch";
      });

      stadiumField.textContent = club.Stadium || "—";
      capacityField.textContent = club.Capacity || "—";

      loadSquad(fullName);
      loadListings(fullName);
    }

    async function loadSquad(fullName) {
      const { data: players } = await window.supabaseClient
        .from("Players")
        .select("*")
        .eq("Contracted_Team", fullName);

      if (!players) return;

      let html = `
        <table class="gpsl-table">
          <thead>
            <tr>
              <th>Name</th><th>Pos</th><th>Nation</th><th>Age</th>
              <th>Rating</th><th>Style</th><th>Value</th><th>List</th>
            </tr>
          </thead>
          <tbody>
      `;

      players.forEach(p => {
        html += `
          <tr>
            <td>${p.Name}</td>
            <td>${p.Position}</td>
            <td>${p.Nation}</td>
            <td>${p.Age}</td>
            <td>${p.Rating}</td>
            <td>${p.Playstyle}</td>
            <td>${formatBTC(p.market_value)}</td>
            <td><input type="checkbox" class="listPlayer" data-id="${p.Konami_ID}" data-name="${p.Name}" data-mv="${p.market_value}"></td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      squadContainer.innerHTML = html;
    }

    async function loadListings(fullName) {
      const { data: listings } = await window.supabaseClient
        .from("Player_Transfer_Listings")
        .select("*")
        .eq("seller_club_id", fullName);

      if (!listings) return;

      let html = `
        <table class="gpsl-table">
          <thead>
            <tr>
              <th>Name</th><th>Pos</th><th>Rating</th>
              <th>Reserve</th><th>Time Left</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (const l of listings) {
        const { data: player } = await window.supabaseClient
          .from("Players")
          .select("Name, Position, Rating")
          .eq("Konami_ID", l.player_id)
          .single();

        if (!player) continue;

        html += `
          <tr>
            <td>${player.Name}</td>
            <td>${player.Position}</td>
            <td>${player.Rating}</td>
            <td>${formatBTC(l.reserve_price)}</td>
            <td>${timeRemaining(l.end_time)}</td>
            <td>Active</td>
          </tr>
        `;
      }

      html += "</tbody></table>";
      listedContainer.innerHTML = html;
    }

    function timeRemaining(expiry) {
      const end = new Date(expiry).getTime();
      const now = Date.now();
      const diff = end - now;

      if (diff <= 0) return "Expired";

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

      return `${hours}h ${mins}m`;
    }
  </script>

</body>
</html>
