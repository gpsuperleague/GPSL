<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table.gpsl-table td {
      padding: 8px;
      border-bottom: 1px solid #333;
    }

    table.gpsl-table tr:nth-child(even) {
      background: #181818;
    }

    .section-header {
      margin-top: 40px;
      background:#222;
      color:#ff9900;
      padding:8px 14px;
      border-radius:6px;
      font-size:20px;
      font-weight:bold;
      display:inline-block;
    }

    /* INLINE OWNER ROW */
    .owner-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .owner-row input {
      flex: 1;
    }

    .small-btn {
      padding: 6px 10px;
      font-size: 12px;
      background: #ff9900;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .small-btn:hover {
      background: #ffaa22;
    }
  </style>
</head>

<body>

  <!-- TOP NAVIGATION -->
  <div id="nav" style="padding: 15px; background:#1a1a1a; border-bottom:1px solid #333;"></div>

  <!-- HEADER -->
  <div id="headerContainer">
    <div id="headerLeft">
      <img id="clubBadgeHeader" src="" alt="Club Badge">
      <div>
        <h1 id="dashboardTitle">GPSL Dashboard</h1>
        <div id="userEmail"></div>
      </div>
    </div>

    <div id="headerRight">
      <h2 class="panelTitle">Club Details</h2>
      <div id="clubDetailsPanel">

        <div class="detailRow">
          <label>Club Name:</label>
          <span id="clubNameField"></span>
        </div>

        <!-- UPDATED OWNER ROW -->
        <div class="detailRow owner-row">
          <label>Owner:</label>
          <input id="ownerInput" type="text">
          <button id="editOwnerBtn" class="small-btn">Edit</button>
          <button id="saveOwnerBtn" class="small-btn">Save</button>
        </div>

        <div class="detailRow">
          <label>Stadium:</label>
          <span id="stadiumField"></span>
        </div>

        <div class="detailRow">
          <label>Capacity:</label>
          <span id="capacityField"></span>
        </div>

      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent">
    <div id="leftColumn">
      <h2 class="section-header">Squad</h2>
      <div id="squadContainer"></div>

      <h2 class="section-header">Your Listed Players</h2>

      <!-- NEW FILTER BAR -->
      <div id="listingFilters" style="margin: 10px 0; display: flex; gap: 15px; align-items: center;">
        <label><input type="checkbox" id="filterActive" checked> Active</label>
        <label><input type="checkbox" id="filterExpired" checked> Closed</label>
      </div>

      <div id="listedContainer"></div>
    </div>

    <div id="rightColumn"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase.js"></script>

  <!-- Dashboard Logic -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>
