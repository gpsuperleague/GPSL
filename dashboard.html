<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <!-- Button styling to match index.html -->
  <style>
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    /* Club area styling */
    #clubArea {
      width: 25%;
      min-width: 250px;
      max-width: 400px;
      height: 80vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>GPSL Dashboard</h1>

  <p id="welcome"></p>

  <!-- Dynamic navigation will be inserted here -->
  <div id="nav"></div>

  <hr>

  <h2>Your Club Area</h2>
  <div id="clubArea">
    <!-- Club-specific content will go here -->
  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

  <!-- Supabase (ESM module) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Make Supabase available globally
    window.supabaseClient = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );
  </script>

  <!-- Dashboard logic -->
  <script>
    // -------------------------------
    // AUTH + NAVIGATION
    // -------------------------------
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("welcome").innerText =
        "Logged in as: " + user.email;

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      console.log("User UID:", user.uid);

      // Load the user's assigned club
      loadClubArea(user.uid);
    });

    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    // -------------------------------
    // LOAD USER'S CLUB FROM FIRESTORE
    // -------------------------------
    function loadClubArea(uid) {
      db.collection("users").doc(uid).get().then(doc => {
        console.log("Firestore user doc:", doc.data());

        if (!doc.exists) {
          document.getElementById("clubArea").innerHTML =
            "<p>No club assigned. Contact admin.</p>";
          return;
        }

        const clubShort = doc.data().club;
        console.log("Assigned club:", clubShort);

        loadClubDetails(clubShort);
      });
    }

    // -------------------------------
    // LOAD CLUB BADGE + PLAYERS
    // -------------------------------
    function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      fetchClubPlayers(shortName).then(players => {
        console.log("Players loaded:", players);

        document.getElementById("clubArea").innerHTML = `
          <div style="text-align:center; margin-bottom:20px;">
            <img src="${badgePath}" style="width:140px; height:auto; margin-bottom:10px;">
            <h2 style="margin:0; color:#fff;">${shortName}</h2>
          </div>

          <h3 style="color:#ff9900; border-bottom:1px solid #444; padding-bottom:5px;">
            Squad
          </h3>

          <table style="width:100%; border-collapse:collapse; color:#ddd; font-size:14px;">
            <thead>
              <tr style="background:#222;">
                <th style="padding:6px; text-align:left;">Name</th>
                <th style="padding:6px; text-align:left;">Position</th>
                <th style="padding:6px; text-align:left;">Value</th>
              </tr>
            </thead>
            <tbody>
              ${players.map(p => `
                <tr style="border-bottom:1px solid #333;">
                  <td style="padding:6px;">${p.Name}</td>
                  <td style="padding:6px;">${p.Position || "-"}</td>
                  <td style="padding:6px;">£${p.MarketValue}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      });
    }

    // -------------------------------
    // FETCH PLAYERS FROM SUPABASE (2‑step lookup + position sorting)
    // -------------------------------
    async function fetchClubPlayers(shortName) {

      // Step 1 — Look up the full club name from Clubs table
      const { data: clubData, error: clubError } = await window.supabaseClient
        .from("Clubs")
        .select("Club")
        .eq("ShortName", shortName)
        .single();

      if (clubError) {
        console.error("Club lookup error:", clubError);
        return [];
      }

      const fullName = clubData?.Club;
      console.log("Full club name:", fullName);

      // Step 2 — Fetch players using the full club name
      const { data: players, error: playerError } = await window.supabaseClient
        .from("Players")
        .select("Name, Position, Nation, Age, Rating, Playstyle, Season_Signed, market_value")
        .eq("Contracted_Team", fullName)
        .order("Name", { ascending: true });

      if (playerError) {
        console.error("Player fetch error:", playerError);
        return [];
      }

      // Step 3 — Sort by football position order
      const positionOrder = {
        "GK": 1,
        "LB": 2,
        "CB": 3,
        "RB": 4,
        "DMF": 5,
        "LMF": 6,
        "CMF": 7,
        "RMF": 8,
        "AMF": 9,
        "LWF": 10,
        "CF": 11,
        "RWF": 12
      };

      players.sort((a, b) => {
        const posA = positionOrder[a.Position] || 999;
        const posB = positionOrder[b.Position] || 999;
        return posA - posB;
      });

      return players || [];
    }
  </script>

</body>
</html>
