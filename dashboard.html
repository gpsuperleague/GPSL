<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .button {
      background: #444;
      color: #fff;
      padding: 8px 14px;
      margin-right: 10px;
      border-radius: 4px;
      text-decoration: none;
    }

    /* ⭐ Floating Club Settings Panel */
    #clubSettingsPanel {
      position: absolute;
      top: 80px;
      right: 20px;
      background: #222;
      padding: 15px;
      border-radius: 8px;
      width: 260px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      border: 1px solid #444;
    }

    #clubSettingsPanel h3 {
      margin-top: 0;
      color: #ff9900;
    }

    #ownerInput {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
    }

    #ownerInput[readonly] {
      opacity: 0.6;
    }

    #editOwnerBtn, #saveOwnerBtn {
      margin-top: 10px;
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }

    #editOwnerBtn {
      background: #555;
      color: #fff;
    }

    #saveOwnerBtn {
      background: #ff9900;
      color: #000;
      display: none;
    }
  </style>
</head>

<body>

  <h1 id="dashboardTitle">GPSL Dashboard</h1>

  <div id="welcome"></div>
  <div id="nav"></div>

  <!-- ⭐ Floating Club Settings Panel -->
  <div id="clubSettingsPanel">
    <h3>Club Settings</h3>

    <label>Owner (Discord Name)</label>
    <input id="ownerInput" type="text" readonly>

    <button id="editOwnerBtn">Edit</button>
    <button id="saveOwnerBtn">Save</button>
  </div>

  <hr>

  <h2 id="clubAreaHeader">Your Club Area</h2>
  <div id="clubArea"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="firebase.js"></script>

  <!-- ⭐ EVERYTHING BELOW IS ONE CLEAN MODULE SCRIPT -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    /* ⭐ Supabase Client */
    const supabase = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "YOUR_ANON_KEY_HERE"
    );

    /* Utility */
    function formatBTC(num) {
      if (!num || isNaN(num)) return "₿ 0";
      return "₿ " + Number(num).toLocaleString("en-GB");
    }

    function timeRemaining(expiry) {
      const end = new Date(expiry).getTime();
      const now = Date.now();
      const diff = end - now;

      if (diff <= 0) return "Expired";

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

      return `${hours}h ${mins}m`;
    }

    /* ⭐ Firebase Auth Listener */
    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("welcome").innerHTML =
        `<strong>User:</strong> ${user.email}`;

      document.getElementById("nav").innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="all_listings.html" class="button">Transfer-List</a>
        <button onclick="auth.signOut().then(()=>window.location='login.html')" class="button">Logout</button>
      `;

      /* ⭐ Ensure OwnerUID is set ONCE */
      await supabase
        .from("Clubs")
        .update({ OwnerUID: user.uid })
        .eq("OwnerUID", null);

      loadOwnerSettings(user.uid);
      loadClubArea(user.uid);
    });

    /* ⭐ OWNER SETTINGS PANEL */
    async function loadOwnerSettings(uid) {
      const ownerInput = document.getElementById("ownerInput");
      const editBtn = document.getElementById("editOwnerBtn");
      const saveBtn = document.getElementById("saveOwnerBtn");

      const { data: club } = await supabase
        .from("Clubs")
        .select("Club, Owner")
        .eq("OwnerUID", uid)
        .single();

      if (club) {
        ownerInput.value = club.Owner || "";
      }

      editBtn.onclick = () => {
        ownerInput.removeAttribute("readonly");
        editBtn.style.display = "none";
        saveBtn.style.display = "block";
      };

      saveBtn.onclick = async () => {
        const newOwner = ownerInput.value.trim();

        await supabase
          .from("Clubs")
          .update({ Owner: newOwner })
          .eq("Club", club.Club);

        ownerInput.setAttribute("readonly", true);
        saveBtn.style.display = "none";
        editBtn.style.display = "block";
      };
    }

    /* ⭐ LOAD CLUB AREA */
    function loadClubArea(uid) {
      db.collection("users").doc(uid).get().then(doc => {
        if (!doc.exists) {
          document.getElementById("clubArea").innerHTML =
            "<p>No club assigned. Contact admin.</p>";
          return;
        }

        const clubShort = doc.data().club;
        loadClubDetails(clubShort);
      });
    }

    /* ⭐ LOAD CLUB DETAILS */
    async function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      const { data: clubData } = await supabase
        .from("Clubs")
        .select("Club")
        .eq("ShortName", shortName)
        .single();

      if (!clubData) {
        document.getElementById("clubArea").innerHTML =
          "<p>Unable to load club details.</p>";
        return;
      }

      const fullName = clubData.Club;

      const { data: players } = await supabase
        .from("Players")
        .select("*")
        .eq("Contracted_Team", fullName);

      const { data: listingsData } = await supabase
        .from("Player_Transfer_Listings")
        .select("*")
        .eq("seller_club_id", fullName);

      const listings = listingsData || [];
      const listedSet = new Set(listings.map(l => String(l.player_id)));

      const positionOrder = {
        "GK": 1, "LB": 2, "CB": 3, "RB": 4,
        "DMF": 5, "LMF": 6, "CMF": 7, "RMF": 8,
        "AMF": 9, "LWF": 10, "CF": 11, "SS": 12, "RWF": 13
      };

      players.sort((a, b) =>
        (positionOrder[a.Position] || 999) -
        (positionOrder[b.Position] || 999)
      );

      document.getElementById("dashboardTitle").innerHTML = `
        <img src="${badgePath}">
        ${fullName} Dashboard
      `;

      let html = `
        <div style="text-align:center; margin-bottom:20px;">
          <img src="${badgePath}" style="width:140px;">
          <h2 style="margin:0; color:#fff;">${fullName}</h2>
        </div>

        <h3 class="section-header">Squad</h3>

        <table class="gpsl-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Pos</th>
              <th>Nation</th>
              <th>Age</th>
              <th>Rating</th>
              <th>Style</th>
              <th>Value</th>
              <th>List Player</th>
            </tr>
          </thead>
          <tbody>
      `;

      players.forEach(p => {
        const isListed = listedSet.has(String(p.Konami_ID));

        html += `
          <tr>
            <td>${p.Name}</td>
            <td>${p.Position}</td>
            <td>${p.Nation}</td>
            <td>${p.Age}</td>
            <td>${p.Rating}</td>
            <td>${p.Playstyle}</td>
            <td>${formatBTC(p.market_value)}</td>
            <td>
              ${
                isListed
                  ? `<span class="listed-lock">🔒 LISTED</span>`
                  : `<input type="checkbox" class="listPlayer"
                       data-id="${p.Konami_ID}"
                       data-name="${p.Name}"
                       data-mv="${p.market_value}"
                     >`
              }
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>

        <h3 class="section-header">Your Listed Players</h3>

        <table class="gpsl-table" id="listedTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Pos</th>
              <th>Rating</th>
              <th>Reserve</th>
              <th>Time Remaining</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
      `;

      listings.forEach(l => {
        const player = players.find(p => String(p.Konami_ID) === String(l.player_id));
        if (!player) return;

        const timeLeft = timeRemaining(l.end_time);

        html += `
          <tr>
            <td>${player.Name}</td>
            <td>${player.Position}</td>
            <td>${player.Rating}</td>
            <td>${formatBTC(l.reserve_price)}</td>
            <td>${timeLeft}</td>
            <td>Active</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      document.getElementById("clubArea").innerHTML = html;

      document.querySelectorAll(".listPlayer").forEach(cb => {
        cb.addEventListener("change", async () => {
          if (!cb.checked) return;

          const name = cb.dataset.name;
          const id = cb.dataset.id;
          const mv = Number(cb.dataset.mv);

          const reserve = Math.round(mv * 1.5);

          const confirmMsg = `
You are about to list ${name} for transfer.

This action is permanent. There are NO take-backs.

The reserve price will be automatically set to:
${formatBTC(reserve)}

If any bid meets or exceeds this amount within 24 hours,
the player WILL be sold automatically.

Are you absolutely sure?
          `;

          if (!confirm(confirmMsg)) {
            cb.checked = false;
            return;
          }

          await supabase
            .from("Player_Transfer_Listings")
            .insert({
              player_id: String(id),
              seller_club_id: fullName,
              reserve_price: reserve,
              listing_type: "standard",
              hidden_bids: false,
              special_rules: {},
              start_time: new Date().toISOString(),
              end_time: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
              current_highest_bid: 0,
              current_highest_bidder: null
            });

          alert("Player listed successfully.");
          loadClubDetails(shortName);
        });
      });
    }
  </script>

</body>
</html>
