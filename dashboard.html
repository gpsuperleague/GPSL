<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <!-- Button styling to match index.html -->
  <style>
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>GPSL Dashboard</h1>

  <p id="welcome"></p>

  <!-- Dynamic navigation will be inserted here -->
  <div id="nav"></div>

  <hr>

  <h2>Your Club Area</h2>
  <div id="clubArea">
    <!-- Club-specific content will go here -->
  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

  <script>
    // Protect the page + build navigation
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        // Not logged in → redirect to login
        window.location = "login.html";
        return;
      }

      // Logged in → show user email
      document.getElementById("welcome").innerText =
        "Logged in as: " + user.email;

      // Build navigation bar
      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      // Load club area (placeholder for now)
      loadClubArea(user.uid);
    });

    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    function loadClubArea(uid) {
      document.getElementById("clubArea").innerHTML =
        "<p>Your club data will appear here.</p>";
    }
  </script>

</body>
</html>
