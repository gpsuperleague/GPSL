<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Dashboard</title>

  <!-- Button styling to match index.html -->
  <style>
    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    /* Club area styling */
    #clubArea {
      width: 50%;
      min-width: 500px;
      max-width: 900px;
      height: 80vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }

    /* Styled login badge */
    #welcome {
      background:#222;
      color:#ff9900;
      padding:8px 14px;
      border-radius:6px;
      display:inline-block;
      margin-bottom:10px;
      font-size:14px;
    }

    /* Styled dashboard title with badge */
    #dashboardTitle {
      background:#222;
      color:#ff9900;
      padding:10px 16px;
      border-radius:6px;
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:24px;
      font-weight:bold;
      width: fit-content;
    }

    #dashboardTitle img {
      width:32px;
      height:32px;
      border-radius:4px;
    }

    /* Styled Club Area header */
    #clubAreaHeader {
      background:#222;
      color:#ff9900;
      padding:8px 14px;
      border-radius:6px;
      display:inline-block;
      margin-bottom:10px;
      font-size:20px;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <h1 id="dashboardTitle">GPSL Dashboard</h1>

  <div id="welcome"></div>

  <!-- Dynamic navigation will be inserted here -->
  <div id="nav"></div>

  <hr>

  <h2 id="clubAreaHeader">Your Club Area</h2>
  <div id="clubArea">
    <!-- Club-specific content will go here -->
  </div>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

  <!-- Supabase (ESM module) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Make Supabase available globally
    window.supabaseClient = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );
  </script>

  <!-- Dashboard logic -->
  <script>

    // -------------------------------
    // FORMATTER: Bitcoin + space + commas
    // -------------------------------
    function formatBTC(num) {
      if (!num || isNaN(num)) return "₿ 0";
      return "₿ " + Number(num).toLocaleString("en-GB");
    }

    // -------------------------------
    // AUTH + NAVIGATION
    // -------------------------------
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      document.getElementById("welcome").innerHTML =
        `<strong>User:</strong> ${user.email}`;

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="GPDB.html" class="button">Player Database</a>
        <a href="clubs.html" class="button">Clubs</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      loadClubArea(user.uid);
    });

    function logout() {
      auth.signOut().then(() => {
        window.location = "login.html";
      });
    }

    // -------------------------------
    // LOAD USER'S CLUB FROM FIRESTORE
    // -------------------------------
    function loadClubArea(uid) {
      db.collection("users").doc(uid).get().then(doc => {

        if (!doc.exists) {
          document.getElementById("clubArea").innerHTML =
            "<p>No club assigned. Contact admin.</p>";
          return;
        }

        const clubShort = doc.data().club;
        loadClubDetails(clubShort);
      });
    }

    // -------------------------------
    // LOAD CLUB BADGE + PLAYERS
    // -------------------------------
    function loadClubDetails(shortName) {
      const badgePath = `images/club_badges/${shortName}.png`;

      fetchClubPlayers(shortName).then(result => {

        const { fullName, players } = result;

        // Update dashboard title dynamically WITH BADGE
        document.getElementById("dashboardTitle").innerHTML = `
          <img src="images/club_badges/${shortName}.png" alt="badge">
          ${fullName} Dashboard
        `;

        document.getElementById("clubArea").innerHTML = `
          <div style="text-align:center; margin-bottom:20px;">
            <img src="${badgePath}" style="width:140px; height:auto; margin-bottom:10px;">
            <h2 style="margin:0; color:#fff;">${shortName}</h2>
          </div>

          <h3 style="color:#ff9900; border-bottom:1px solid #444; padding-bottom:5px;">
            Squad
          </h3>

          <table style="width:100%; border-collapse:collapse; color:#ddd; font-size:14px;">
            <thead>
              <tr style="background:#222;">
                <th style="padding:6px; text-align:left;">Name</th>
                <th style="padding:6px; text-align:left;">Position</th>
                <th style="padding:6px; text-align:left;">Nation</th>
                <th style="padding:6px; text-align:left;">Age</th>
                <th style="padding:6px; text-align:left;">Rating</th>
                <th style="padding:6px; text-align:left;">Playstyle</th>
                <th style="padding:6px; text-align:left;">Signed</th>
                <th style="padding:6px; text-align:left;">Value</th>
              </tr>
            </thead>
            <tbody>
              ${players.map(p => `
                <tr style="border-bottom:1px solid #333;">
                  <td style="padding:6px;">${p.Name}</td>
                  <td style="padding:6px;">${p.Position}</td>
                  <td style="padding:6px;">${p.Nation}</td>
                  <td style="padding:6px;">${p.Age}</td>
                  <td style="padding:6px;">${p.Rating}</td>
                  <td style="padding:6px;">${p.Playstyle}</td>
                  <td style="padding:6px;">${p.Season_Signed}</td>
                  <td style="padding:6px;">${formatBTC(p.market_value)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      });
    }

    // -------------------------------
    // FETCH PLAYERS FROM SUPABASE
    // -------------------------------
    async function fetchClubPlayers(shortName) {

      const { data: clubData } = await window.supabaseClient
        .from("Clubs")
        .select("Club")
        .eq("ShortName", shortName)
        .single();

      const fullName = clubData?.Club;

      const { data: players } = await window.supabaseClient
        .from("Players")
        .select("Name, Position, Nation, Age, Rating, Playstyle, Season_Signed, market_value")
        .eq("Contracted_Team", fullName)
        .order("Name", { ascending: true });

      const positionOrder = {
        "GK": 1, "LB": 2, "CB": 3, "RB": 4,
        "DMF": 5, "LMF": 6, "CMF": 7, "RMF": 8,
        "AMF": 9, "LWF": 10, "CF": 11, "SS": 12, "RWF": 13
      };

      players.sort((a, b) =>
        (positionOrder[a.Position] || 999) -
        (positionOrder[b.Position] || 999)
      );

      return { fullName, players };
    }
  </script>

</body>
</html>
