<script>
  window.CURRENT_PAGE = "manager_draftauction_manager";
</script>
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Manager Draft — Bid</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .container { margin:20px; max-width:900px; }
    .manager-header { display:flex; gap:20px; align-items:flex-start; margin-bottom:16px; }
    .manager-portrait-wrap {
      width:140px; height:140px; flex-shrink:0;
      border-radius:10px; overflow:hidden;
      background:#0a0a0a; border:1px solid #333;
      display:flex; align-items:center; justify-content:center;
    }
    .manager-portrait { width:100%; height:100%; object-fit:cover; display:block; }
    .manager-portrait-fallback {
      font-size:42px; font-weight:bold; color:#ff9900; letter-spacing:1px;
    }
    .manager-header-text { flex:1; min-width:0; }
    .meta { font-size:13px; color:#ccc; margin-top:6px; }
    .bid-panel { background:#1a1a1a; border:1px solid #333; padding:16px; border-radius:8px; margin-top:20px; }
    .bid-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:10px; }
    input { padding:6px; border-radius:4px; border:1px solid #444; background:#111; color:#ddd; width:160px; }
    .inc-btn, .quick-btn { padding:6px 10px; background:#222; color:#ddd; border:1px solid #555; border-radius:4px; cursor:pointer; }
    .dec-btn { padding:6px 10px; background:#222; color:#ddd; border:1px solid #555; border-radius:4px; cursor:pointer; }
    #submitBidBtn { padding:8px 14px; background:#2f7a2f; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer; }
    #submitBidBtn:disabled { background:#444; color:#999; }
    table.history { width:100%; border-collapse:collapse; margin-top:12px; }
    table.history th, table.history td { border:1px solid #333; padding:6px; font-size:12px; }
    table.history th { color:#ff9900; background:#222; }
    #bidError { color:#f88; font-size:12px; min-height:16px; }
    a.button { display:inline-block; padding:10px 16px; background:#ff9900; color:#111; text-decoration:none; font-weight:bold; border-radius:6px; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="container">
    <p><a href="manager_draftauction.html" class="button">← Manager Draft Auction</a></p>
    <div class="manager-header">
      <div class="manager-portrait-wrap">
        <img id="managerPortrait" class="manager-portrait" alt="">
        <div id="managerPortraitFallback" class="manager-portrait-fallback" hidden>?</div>
      </div>
      <div class="manager-header-text">
        <h1 id="managerName" style="color:#ff9900;margin:0;">Loading…</h1>
        <div class="meta" id="managerMeta"></div>
        <div class="meta" id="managerValue"></div>
        <div class="meta" id="currentHighest"></div>
        <div class="meta" id="leadingClub"></div>
        <div class="meta" id="timeRemaining"></div>
        <div class="meta" id="timeRemainingSub" style="white-space:pre-line; line-height:1.4;"></div>
        <div class="meta" id="leadInfo"></div>
      </div>
    </div>

    <div class="bid-panel">
      <h3 style="color:#ff9900;margin-top:0;">Place bid</h3>
      <div class="bid-row">
        <span style="color:#ff9900;font-weight:bold;font-size:18px;">₿</span>
        <input type="text" id="bidAmount" inputmode="numeric" autocomplete="off">
        <button type="button" id="quickBidBtn" class="quick-btn">Min bid</button>
        <button type="button" class="dec-btn" data-delta="-5000000">−5m</button>
        <button type="button" class="dec-btn" data-delta="-1000000">−1m</button>
        <button type="button" class="dec-btn" data-delta="-500000">−500k</button>
        <button type="button" class="inc-btn" data-delta="500000">+500k</button>
        <button type="button" class="inc-btn" data-delta="1000000">+1m</button>
        <button type="button" class="inc-btn" data-delta="5000000">+5m</button>
        <button type="button" id="submitBidBtn">Submit bid</button>
      </div>
      <p id="bidError"></p>
    </div>

    <h3 style="color:#ff9900;">Bid history</h3>
    <table class="history">
      <thead><tr><th>Club</th><th>Amount</th><th>Time</th></tr></thead>
      <tbody id="bidHistory"></tbody>
    </table>
  </div>
  <script type="module" src="global.js"></script>
  <script type="module" src="manager_draftauction_manager.js?v=5"></script>
</body>
</html>
