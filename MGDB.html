<script>
  window.CURRENT_PAGE = "mgdb";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Manager Database</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    a.button, button.button {
      display: inline-block;
      padding: 8px 16px;
      background: #1a1a1a;
      color: #ff9900;
      border: 1px solid #666;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    a.button:hover, button.button:hover {
      background: #222;
      transform: scale(1.05);
    }

    #pageTitle {
      background: #222;
      color: #ff9900;
      padding: 10px 16px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .filter-group {
      background: #1a1a1a;
      color: #ff9900;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      border: 1px solid #333;
    }

    .filter-group strong {
      width: 100%;
      font-size: 14px;
      margin-bottom: 4px;
      color: #ffaa22;
    }

    input, select {
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      padding: 4px 6px;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      color: #ddd;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      font-size: 13px;
      border-bottom: 2px solid #444;
      border-right: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      text-align: center;
    }

    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    td {
      padding: 6px 8px;
      border-bottom: 1px solid #333;
      border-right: 1px solid #333;
      font-size: 12px;
      text-align: center;
    }

    tbody tr:nth-child(odd) { background: #1f1f1f; }
    tbody tr:nth-child(even) { background: #262626; }
    tbody tr:hover { background: #333 !important; }

    .money { white-space: nowrap; }

    .mgdb-expectancy {
      text-align: left;
      min-width: 200px;
      max-width: 320px;
      line-height: 1.35;
      font-size: 11px;
    }
    .mgdb-exp-targets { color: #eee; }
    #statusNote { color: #aaa; font-size: 12px; margin-bottom: 12px; }
    #mgdbError { color: #f88; margin-bottom: 12px; }

    .mgdb-free-only {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
      color: #ddd;
      font-size: 13px;
      cursor: pointer;
    }

    .text-filter {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      color: #ffaa22;
    }
    .text-filter input {
      margin-top: 2px;
      font-size: 12px;
      min-width: 160px;
    }

    /* GPDB-style searchable multi-select */
    .multi-filter {
      position: relative;
      min-width: 180px;
    }
    .multi-filter-label {
      font-size: 12px;
      color: #ffaa22;
      margin-bottom: 2px;
    }
    .multi-filter-control {
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 24px;
    }
    .multi-filter-control::after {
      content: "▾";
      font-size: 10px;
      color: #888;
      margin-left: 6px;
    }
    .multi-filter-panel {
      position: absolute;
      top: 100%;
      left: 0;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      margin-top: 2px;
      max-height: 260px;
      overflow: hidden;
      min-width: 100%;
      z-index: 50;
      display: none;
      flex-direction: column;
    }
    .multi-filter.open .multi-filter-panel {
      display: flex;
    }
    .multi-filter-search {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 12px;
      border: none;
      border-bottom: 1px solid #444;
      background: #1a1a1a;
      color: #eee;
      flex-shrink: 0;
    }
    .multi-filter-search:focus {
      outline: 1px solid #ff9900;
    }
    .multi-filter-options {
      overflow: auto;
      max-height: 200px;
    }
    .multi-filter-empty {
      padding: 8px;
      font-size: 12px;
      color: #888;
    }
    .multi-filter-option {
      display: flex;
      align-items: center;
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
      color: #ddd;
    }
    .multi-filter-option:hover {
      background: #222;
    }
    .multi-filter-option input {
      margin-right: 6px;
    }

    /* GPDB-style dual range sliders */
    .range-filter {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 168px;
      max-width: 280px;
      font-size: 12px;
      color: #ffaa22;
    }
    .range-filter--money {
      min-width: 220px;
      max-width: 320px;
    }
    .range-filter-label {
      font-weight: bold;
      line-height: 1.3;
    }
    .range-filter-range {
      font-weight: normal;
      color: #ddd;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .range-filter-sliders {
      position: relative;
      height: 26px;
      margin-top: 2px;
    }
    .range-filter-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 6px;
      transform: translateY(-50%);
      border-radius: 999px;
      background:
        linear-gradient(
          to right,
          #444 0%,
          #444 var(--range-min, 0%),
          #ff9900 var(--range-min, 0%),
          #ff9900 var(--range-max, 100%),
          #444 var(--range-max, 100%),
          #444 100%
        );
      pointer-events: none;
    }
    .range-filter-sliders input[type="range"] {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 26px;
      margin: 0;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
      pointer-events: none;
      z-index: 3;
    }
    .range-filter-sliders input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: transparent;
    }
    .range-filter-sliders input[type="range"]::-moz-range-track {
      height: 6px;
      background: transparent;
    }
    .range-filter-sliders input[type="range"].range-filter-min { z-index: 3; }
    .range-filter-sliders input[type="range"].range-filter-max { z-index: 4; }
    .range-filter-sliders input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff9900;
      border: 2px solid #111;
      box-shadow: 0 0 0 1px #aa6a00;
      margin-top: -4px;
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      z-index: 2;
    }
    .range-filter-sliders input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff9900;
      border: 2px solid #111;
      box-shadow: 0 0 0 1px #aa6a00;
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      z-index: 2;
    }
    .range-filter-sliders input[type="range"]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #draftCountdown {
      color: #ff9900;
      font-weight: bold;
      font-family: monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1 id="pageTitle">GPSL – Manager Database (MGDB)</h1>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:12px;">
    <p id="statusNote" style="margin:0;"></p>
    <div id="draftCountdownContainer" class="draft-timer" style="flex-direction:column; align-items:flex-end;">
      <span id="draftCountdown"></span>
      <div id="draftLocalStart" style="font-size:12px; color:#ccc; margin-top:2px; white-space:pre-line; line-height:1.4;"></div>
    </div>
  </div>
  <p id="mgdbError" hidden></p>

  <div id="controls">
    <div class="filter-group" id="filters"></div>

    <table id="managersTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="pagination" style="color:#ff9900;font-weight:bold;margin-top:20px;"></div>

    <div id="rowsPerPage" style="margin-top:20px;color:#ff9900;">
      <label>Rows per page:
        <select id="pageSizeSelect">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="250">250</option>
        </select>
      </label>
    </div>
  </div>

  <script type="module" src="global.js?v=20260706-v18"></script>
  <script type="module" src="mgdb.js?v=20260710-mv-slider2"></script>
</body>
</html>
