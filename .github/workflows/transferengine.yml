name: Transfer Engine Runner

# Calls Supabase Edge Function transferengine_run → transferengine_run_report().
# GitHub Actions schedule is UTC, best-effort, and minimum interval is 5 minutes
# (*/1 is ignored/coalesced — do not use sub-5-minute cron here).
on:
  schedule:
    # Baseline: every 5 minutes, 24/7 (transfer list, draft backlog, month tick).
    - cron: "*/5 * * * *"
    # Draft random finish 18:50–18:59 UK — 17:xx UTC (BST) and 18:xx UTC (GMT).
    - cron: "50-59 17,18 * * *"
    # 7pm UK transfer list + first anti-snipe extensions — 18:xx UTC (BST) / 19:xx UTC (GMT).
    - cron: "0-15 18,19 * * *"
    # Late extensions (~20:00–21:15 UK) — 19–21 UTC (BST) / 20–22 UTC (GMT).
    - cron: "0-15 20,21 * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Transfer Engine
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          KEY="$(printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | tr -d '\r\n')"
          if [ -z "$KEY" ]; then
            echo "Missing GitHub secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          URL="https://omyyogfumrjoaweuawjn.supabase.co/functions/v1/transferengine_run"
          CURL_ARGS=(-sS -w "%{http_code}" -o /tmp/transferengine_response.json -X POST \
            -H "Content-Type: application/json" -d '{}' "$URL")

          # Legacy service_role JWT (eyJ...) — use Authorization + apikey
          if [[ "$KEY" == eyJ* ]]; then
            echo "Using legacy service_role JWT"
            CURL_ARGS=(-sS -w "%{http_code}" -o /tmp/transferengine_response.json -X POST \
              -H "Authorization: Bearer ${KEY}" \
              -H "apikey: ${KEY}" \
              -H "Content-Type: application/json" -d '{}' "$URL")
          # New Supabase secret key (sb_secret_...) — apikey ONLY (not a JWT)
          elif [[ "$KEY" == sb_secret_* ]]; then
            echo "Using new sb_secret_ key (apikey header only)"
            echo "Edge Function must have Verify JWT = OFF in Supabase Dashboard"
            CURL_ARGS=(-sS -w "%{http_code}" -o /tmp/transferengine_response.json -X POST \
              -H "apikey: ${KEY}" \
              -H "Content-Type: application/json" -d '{}' "$URL")
          else
            echo "Unrecognized key format (expected eyJ... or sb_secret_...)"
            echo "Fix: Supabase Dashboard → Settings → API → Legacy API keys → copy service_role JWT"
            exit 1
          fi

          http_code=$(curl "${CURL_ARGS[@]}")

          echo "HTTP ${http_code}"
          cat /tmp/transferengine_response.json
          echo ""

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
