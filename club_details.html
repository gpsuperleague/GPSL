<!DOCTYPE html>
<html>
<head>

  <script>
    window.CURRENT_PAGE = "club_details";
  </script>

  <meta charset="UTF-8">
  <title>Club Details</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .page-container {
      width: 95%;
      max-width: 1400px;
      margin: 20px auto 40px auto;
    }

    h1 {
      color: #ff9900;
      margin-bottom: 16px;
    }

    #clubDetailsError {
      color: #f88;
      background: #2a1515;
      border: 1px solid #633;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    #clubDetailsError[hidden] {
      display: none;
    }
  </style>

</head>

<body>

  <div id="nav"></div>

  <div class="page-container">

    <h1>Club Details</h1>

    <p id="clubDetailsError" hidden role="alert"></p>

    <div class="panel panel-bg panel-club club-details-panel" id="clubDetailsPanel">

      <div class="detailRow">
        <label for="clubName">Club name</label>
        <span id="clubName">—</span>
      </div>

      <div class="detailRow">
        <label for="shortName">Short name</label>
        <span id="shortName">—</span>
      </div>

      <div class="detailRow detailRow--owner">
        <label for="ownerInput">Owner tag</label>
        <div class="owner-tag-field">
          <input
            type="text"
            id="ownerInput"
            maxlength="64"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="editOwnerTagBtn" class="small-btn is-hidden">Edit</button>
          <button type="button" id="saveOwnerBtn" class="small-btn">Save</button>
          <span id="ownerTagHint" class="owner-tag-hint" role="status"></span>
        </div>
      </div>

      <div class="detailRow">
        <label>Login email</label>
        <span id="accountEmail" class="detail-muted">—</span>
      </div>

      <div class="detailRow">
        <label>Stadium</label>
        <span id="stadiumName">—</span>
      </div>

      <div class="detailRow">
        <label>Capacity</label>
        <span id="stadiumCapacity">—</span>
      </div>

      <div class="detailRow">
        <label>Club nation</label>
        <span id="clubNation">—</span>
      </div>

      <div class="detailRow">
        <label>Division</label>
        <span id="compDivision">—</span>
      </div>

    </div>

  </div>

  <script type="module" src="club_details.js"></script>

</body>
</html>
