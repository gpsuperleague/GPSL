<script>
  const CURRENT_PAGE = "special_auction";
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Special Auction — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background: #111; color: #ddd; font-family: Arial, sans-serif; margin: 0; }
    #nav { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; text-align: center; }
    h1 { color: #ff9900; margin: 20px; }
    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      margin: 20px;
      padding: 20px;
      max-width: 900px;
    }
    .panel h2 { color: #ff9900; margin-top: 0; }
    .timer { font-family: monospace; font-size: 18px; color: #ff9900; }
    .timer.countup { color: #ff6666; }
    .timer-sub { display: block; font-size: 12px; color: #ccc; margin-top: 4px; font-family: Arial, sans-serif; }
    .clue-box {
      background: #222;
      border-left: 4px solid #ff9900;
      padding: 12px;
      margin: 12px 0;
    }
    table.gpsl-table { width: 100%; border-collapse: collapse; }
    table.gpsl-table th, table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }
    table.gpsl-table th { background: #222; color: #ff9900; }
    tr.winner-row { background: linear-gradient(90deg, #3d3200, #1a1a1a); }
    tr.winner-row td { color: #ffd700; font-weight: bold; }
    .winner-banner {
      white-space: pre-line;
      line-height: 1.45;
      background: #2a2200;
      border: 1px solid #ff9900;
      border-radius: 6px;
      padding: 12px 14px;
      margin: 12px 0;
      color: #ffd700;
      font-weight: bold;
    }
    .waiting-banner {
      background: #222;
      border-left: 4px solid #888;
      padding: 10px 12px;
      margin: 12px 0;
      color: #ccc;
    }
    .bid-time { display: block; white-space: nowrap; font-size: 12px; }
    .bid-time-local { display: block; white-space: nowrap; font-size: 11px; color: #aaa; margin-top: 2px; }
    .bid-modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .bid-modal-backdrop.open { display: flex; }
    .bid-modal {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
    }
    .bid-modal input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 10px;
      font-size: 16px;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      box-sizing: border-box;
    }
    .bid-amount-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 10px 0;
    }
    .bid-amount-prefix {
      color: #ff9900;
      font-weight: bold;
      font-size: 18px;
    }
    .bid-step-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .bid-step-row .button {
      padding: 4px 8px;
      font-size: 11px;
      margin: 0;
    }
    .secret-note { color: #888; font-size: 13px; }
    .button { padding: 10px 18px; background: #ff9900; color: #111; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 4px; }
    .button.secondary { background: #444; color: #ddd; }
    .button:disabled { opacity: 0.5; cursor: not-allowed; }
    #bidError { color: #ff6666; min-height: 1.2em; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <h1 id="pageTitle">Special Auction</h1>

  <div id="mainPanel" class="panel">
    <p id="emptyMsg">Loading…</p>
    <div id="auctionContent" style="display:none;">
      <h2 id="auctionTitle"></h2>
      <p id="auctionType"></p>
      <p class="timer" id="auctionTimer"></p>
      <span class="timer-sub" id="auctionTimerSub"></span>
      <p id="prizeLine"></p>
      <div id="winnerLine" class="winner-banner" style="display:none;"></div>
      <div id="waitingReveal" class="waiting-banner" style="display:none;"></div>
      <div id="playerReveal"></div>
      <p id="rulesLine" class="secret-note"></p>
      <p id="myBidLine"></p>
      <div class="sa-actions" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0 4px;">
        <button id="openBidBtn" class="button" style="display:none;">Place bid</button>
        <button id="refreshBtn" class="button secondary" type="button">Refresh bids</button>
        <span id="refreshHint" class="secret-note" style="margin:0;"></span>
      </div>
      <div id="resultsBlock" style="display:none; margin-top:20px;">
        <h3 id="resultsHeading">Results</h3>
        <table class="gpsl-table">
          <thead>
            <tr><th>Club</th><th>Bid</th><th>Bid placed</th><th>Fee</th><th></th></tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="bidModalBackdrop" class="bid-modal-backdrop">
    <div class="bid-modal">
      <h3 id="bidModalTitle">Submit bid</h3>
      <p id="bidModalHint" class="secret-note"></p>
      <div class="bid-amount-row">
        <span class="bid-amount-prefix" aria-hidden="true">₿</span>
        <input type="text" id="bidAmountInput" inputmode="numeric" autocomplete="off" placeholder="1,000,000">
      </div>
      <div class="bid-step-row">
        <button type="button" class="button secondary dec-btn" data-delta="-5000000">−5m</button>
        <button type="button" class="button secondary dec-btn" data-delta="-1000000">−1m</button>
        <button type="button" class="button secondary dec-btn" data-delta="-500000">−500k</button>
        <button type="button" class="button secondary" id="bidQuickMin">Min ₿1m</button>
        <button type="button" class="button secondary inc-btn" data-delta="500000">+500k</button>
        <button type="button" class="button secondary inc-btn" data-delta="1000000">+1m</button>
        <button type="button" class="button secondary inc-btn" data-delta="5000000">+5m</button>
      </div>
      <p id="roundedPreview" class="secret-note"></p>
      <p id="bidError"></p>
      <button id="confirmBidBtn" class="button">Submit</button>
      <button id="cancelBidBtn" class="button secondary">Cancel</button>
    </div>
  </div>

  <script type="module">
    import { supabase, initGlobal } from "./global.js";
    import { loadClubsMap, fullClubName } from "./clubs_lookup.js";
    import {
      formatMoney,
      roundToMillion,
      fetchActiveSpecialAuction,
      fetchAuctionById,
      refreshAuctionRecord,
      loadOwnerClub,
      fetchAuctionBids,
      submitSpecialBid,
      auctionPhase,
      timeRemainingLabel,
      formatAuctionTimerText,
      prizeDescription,
      formatBidTimeHtml,
      formatBidTimePlain,
      fetchVisibleClues,
      specialAuctionEffectiveEnd,
      snapIdentityHidden,
      snapBidUnitFee,
      snapBidFeeDisplay,
      snapWinnerSummaryText,
      formatSnapAuctionTimer,
      snapTimerMode,
    } from "./special_auction.js";
    import {
      playerThumbLinkHtml,
      playerNameLinkHtml,
    } from "./player_links.js";
    import {
      parseMoneyInput,
      wireMoneyBidInput,
    } from "./money_input.js";

    const MIN_BID = 1000000;
    const BID_INCREMENT = 500000;

    let auction = null;
    let clubShort = null;
    let timerInterval = null;
    let bidAmountControl = null;
    let modalStartAmount = MIN_BID;
    let snapMinBid = MIN_BID;
    let latestBids = [];

    const els = {
      emptyMsg: document.getElementById("emptyMsg"),
      content: document.getElementById("auctionContent"),
      title: document.getElementById("auctionTitle"),
      type: document.getElementById("auctionType"),
      timer: document.getElementById("auctionTimer"),
      timerSub: document.getElementById("auctionTimerSub"),
      prize: document.getElementById("prizeLine"),
      playerReveal: document.getElementById("playerReveal"),
      rules: document.getElementById("rulesLine"),
      myBidLine: document.getElementById("myBidLine"),
      openBid: document.getElementById("openBidBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      refreshHint: document.getElementById("refreshHint"),
      resultsBlock: document.getElementById("resultsBlock"),
      resultsBody: document.getElementById("resultsBody"),
      resultsHeading: document.getElementById("resultsHeading"),
      winnerLine: document.getElementById("winnerLine"),
      waitingReveal: document.getElementById("waitingReveal"),
    };

    const TIMER_MS = 1000;
    const DATA_POLL_LIVE_MS = 20000;
    const DATA_POLL_COUNTUP_MS = 5000;
    const DATA_POLL_IDLE_MS = 60000;

    let dataPollInterval = null;
    let lastDataRefreshAt = 0;
    let dataRefreshInFlight = false;

    function updateRoundedPreview(amount) {
      const preview = document.getElementById("roundedPreview");
      if (auction?.auction_type === "lowest_unique" && amount > 0) {
        preview.textContent = `Rounded bid: ${formatMoney(roundToMillion(amount))}`;
      } else {
        preview.textContent = "";
      }
    }

    function snapMinimumBid(bids) {
      const high = (bids || []).reduce(
        (max, b) => Math.max(max, Number(b.bid_amount) || 0),
        0
      );
      if (!high) return MIN_BID;
      return high + BID_INCREMENT;
    }

    function openBidModal() {
      const isLub = auction.auction_type === "lowest_unique";
      snapMinBid = isLub ? MIN_BID : snapMinimumBid(latestBids);
      modalStartAmount = snapMinBid;
      document.getElementById("bidModalTitle").textContent = isLub
        ? "Secret bid (one only)"
        : "Snap auction bid";
      document.getElementById("bidModalHint").textContent = isLub
        ? "Only you will see your bid until the window ends. Amount is rounded to the nearest ₿1,000,000."
        : `Each bid costs ₿300,000. Must raise by at least ${formatMoney(BID_INCREMENT)} (min ${formatMoney(snapMinBid)}). Highest bid wins. Winner pays full bid fees + discounted winning bid; non-winners pay 25% of their bid fees. First-bid timing sets your win discount (20% / 10% / 5% / 0%).`;
      document.getElementById("bidQuickMin").textContent = isLub
        ? "Min ₿1m"
        : `Min ${formatMoney(snapMinBid)}`;
      bidAmountControl?.set(modalStartAmount);
      updateRoundedPreview(modalStartAmount);
      document.getElementById("bidError").textContent = "";
      document.getElementById("bidModalBackdrop").classList.add("open");
    }

    function closeBidModal() {
      document.getElementById("bidModalBackdrop").classList.remove("open");
    }

    function wireBidModalControls() {
      const input = document.getElementById("bidAmountInput");
      bidAmountControl = wireMoneyBidInput(input, {
        min: () =>
          auction?.auction_type === "snap" ? snapMinBid : MIN_BID,
        onChange: updateRoundedPreview,
      });

      document.querySelectorAll("#bidModalBackdrop .inc-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          bidAmountControl?.adjust(Number(btn.dataset.delta) || 0);
        });
      });

      document.querySelectorAll("#bidModalBackdrop .dec-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          bidAmountControl?.adjust(Number(btn.dataset.delta) || 0);
        });
      });

      document.getElementById("bidQuickMin")?.addEventListener("click", () => {
        const min =
          auction?.auction_type === "snap" ? snapMinBid : MIN_BID;
        bidAmountControl?.set(min);
      });
    }

    wireBidModalControls();

    document.getElementById("cancelBidBtn").onclick = closeBidModal;
    document.getElementById("openBidBtn").onclick = openBidModal;

    document.getElementById("confirmBidBtn").onclick = async () => {
      const amount = bidAmountControl?.parse() ?? parseMoneyInput(
        document.getElementById("bidAmountInput").value
      );
      const isLub = auction?.auction_type === "lowest_unique";
      const minRequired = isLub ? MIN_BID : snapMinimumBid(latestBids);
      if (!amount || amount < minRequired) {
        document.getElementById("bidError").textContent =
          `Enter at least ${formatMoney(minRequired)}.`;
        return;
      }
      const { error } = await submitSpecialBid(supabase, auction.id, amount);
      if (error) {
        document.getElementById("bidError").textContent = error.message;
        return;
      }
      closeBidModal();
      await refreshData({ manual: true });
    };

    async function renderPlayerBlock() {
      els.playerReveal.innerHTML = "";
      const mode = auction.player_mode || "known";
      const pid = auction.known_player_id || auction.prize_player_id;
      const phase = auctionPhase(auction);
      const identityHidden = snapIdentityHidden(auction);

      if (auction.auction_type === "snap") {
        const clues = await fetchVisibleClues(supabase, auction.id);
        const visible = (clues || []).filter((c) => c.visible && c.text);
        const locked = (clues || []).filter((c) => !c.visible && c.text);
        let html = "";
        if (visible.length) {
          html += visible
            .map(
              (c) =>
                `<div class="clue-box"><b>Clue ${c.n}</b>${
                  c.discount_pct
                    ? ` · first bid here → ${c.discount_pct}% off if you win`
                    : " · no win discount"
                }<br>${String(c.text)
                  .replace(/&/g, "&amp;")
                  .replace(/</g, "&lt;")}</div>`
            )
            .join("");
        }
        if (identityHidden) {
          if (locked.length) {
            html += `<p style="color:#888;font-size:13px;">Next clue unlocks later in the auction.</p>`;
          }
          html += `<p class="secret-note">Player identity is revealed when the auction ends (random finish in the last 10 minutes).</p>`;
          els.playerReveal.innerHTML = html;
          return;
        }
        // Past random finish — show clues + reveal name
        if (html) {
          els.playerReveal.innerHTML = html;
        }
      }

      if (identityHidden) {
        if (mode === "mystery" && auction.mystery_clue) {
          els.playerReveal.innerHTML = `<div class="clue-box"><b>Mystery player clue</b><br>${auction.mystery_clue}</div>`;
        }
        return;
      }

      if (mode === "mystery" && auction.mystery_clue && auction.auction_type !== "snap") {
        els.playerReveal.innerHTML = `<div class="clue-box"><b>Mystery player clue</b><br>${auction.mystery_clue}</div>`;
        return;
      }
      if (pid) {
        const { data: p } = await supabase
          .from("Players")
          .select("Name, Position, Rating, Konami_ID")
          .eq("Konami_ID", pid)
          .maybeSingle();
        if (p) {
          const revealNote =
            auction.auction_type === "snap" && phase !== "live"
              ? `<p class="secret-note">Identity revealed at the snap finish.</p>`
              : "";
          els.playerReveal.innerHTML =
            (els.playerReveal.innerHTML || "") +
            `
            <div class="clue-box">
              ${playerThumbLinkHtml(p.Konami_ID, { alt: p.Name })}
              <b>${playerNameLinkHtml(p.Konami_ID, p.Name)}</b> — ${p.Position} · ${p.Rating}
            </div>${revealNote}`;
        }
      }
    }

    async function renderResults(bids) {
      const phase = auctionPhase(auction);
      const isLub = auction.auction_type === "lowest_unique";
      const revealed =
        auction.status === "revealed" || auction.status === "settled";
      const snapSettled = !isLub && auction.status === "settled";
      const show =
        revealed ||
        (isLub && phase === "ended_pending") ||
        auction.auction_type === "snap";

      if (!show && isLub) {
        els.resultsBlock.style.display = "none";
        return;
      }

      if (isLub && phase === "ended_pending" && !revealed) {
        els.resultsBlock.style.display = "block";
        els.resultsHeading.textContent = "Results";
        els.resultsBody.innerHTML =
          `<tr><td colspan="5">Bidding closed — waiting for the league to reveal bids.</td></tr>`;
        return;
      }

      // Snap: always show full bid history (live + after close)
      if (auction.auction_type === "snap") {
        const sorted = [...bids].sort((a, b) => {
          const d = Number(b.bid_amount) - Number(a.bid_amount);
          if (d !== 0) return d;
          return new Date(a.bid_time) - new Date(b.bid_time);
        });
        const high = sorted[0];
        const unit = snapBidUnitFee(auction);
        const live = phase === "live" && auction.status === "active";
        els.resultsBlock.style.display = "block";
        els.resultsHeading.textContent = live
          ? `Bid history (each bid fee ${formatMoney(unit)} — settled after close)`
          : snapSettled
          ? "Final bids (losers: 25% of bid fees · winner: 100% of bid fees)"
          : "Bid history — awaiting settlement";

        els.resultsBody.innerHTML =
          sorted
            .map((b) => {
              const isWin =
                snapSettled &&
                (b.is_winner ||
                  (auction.winning_club_id === b.club_id &&
                    Number(auction.winning_amount) === Number(b.bid_amount)));
              const isHigh = high && b.id === high.id;
              const fee = snapBidFeeDisplay(auction, b, { settled: snapSettled });
              let badge = "";
              if (snapSettled && isWin) badge = "🏆 Winner";
              else if (!live && isHigh) badge = "Winning bid";
              else if (live && isHigh) badge = "Leading";
              const highlight = Boolean(isWin || (!live && isHigh));
              return `<tr class="${highlight ? "winner-row" : ""}">
            <td>${fullClubName(b.club_id) || b.club_id}</td>
            <td>${formatMoney(b.bid_amount)}</td>
            <td>${formatBidTimeHtml(b.bid_time)}</td>
            <td>${fee.label}</td>
            <td>${badge}</td>
          </tr>`;
            })
            .join("") || `<tr><td colspan="5">No bids yet</td></tr>`;
        return;
      }

      els.resultsBlock.style.display = "block";
      els.resultsHeading.textContent = "All bids (lowest unique wins)";

      const sorted = [...bids].sort((a, b) => a.bid_amount - b.bid_amount);

      const counts = {};
      bids.forEach((b) => {
        counts[b.bid_amount] = (counts[b.bid_amount] || 0) + 1;
      });

      els.resultsBody.innerHTML = sorted
        .map((b) => {
          const unique = counts[b.bid_amount] === 1;
          const isWin =
            b.is_winner ||
            (auction.winning_club_id === b.club_id &&
              auction.winning_amount === b.bid_amount);
          const badge = isWin
            ? "🏆 Lowest unique"
            : !unique
            ? "Duplicate"
            : "";
          return `<tr class="${isWin ? "winner-row" : ""}">
            <td>${fullClubName(b.club_id) || b.club_id}</td>
            <td>${formatMoney(b.bid_amount)}</td>
            <td>${formatBidTimeHtml(b.bid_time)}</td>
            <td>${b.fee_charged != null ? formatMoney(b.fee_charged) : "—"}</td>
            <td>${badge}</td>
          </tr>`;
        })
        .join("") || `<tr><td colspan="5">No bids</td></tr>`;
    }

    function updateTimerOnly() {
      if (!auction) return;
      const phase = auctionPhase(auction);

      if (auction.auction_type === "snap") {
        const t = formatSnapAuctionTimer(auction);
        if (t) {
          els.timer.textContent = t.duration;
          els.timerSub.textContent = t.subline;
        }
        els.timer.classList.toggle(
          "countup",
          snapTimerMode(auction) === "countup"
        );
        return;
      }

      els.timer.classList.remove("countup");
      const endIso = specialAuctionEffectiveEnd(auction);
      if (phase === "live") {
        const t = formatAuctionTimerText("Time left", endIso);
        els.timer.textContent = t.duration;
        els.timerSub.textContent = t.subline;
      } else if (phase === "before_start") {
        const t = formatAuctionTimerText("Bidding opens in", auction.start_time);
        els.timer.textContent = t.duration;
        els.timerSub.textContent = t.subline;
      } else {
        els.timer.textContent = `Ended: ${new Date(endIso).toLocaleString()}`;
        const t = formatAuctionTimerText("Ended", endIso);
        els.timerSub.textContent = t.subline;
      }
    }

    function setRefreshHint(extra = "") {
      if (!els.refreshHint) return;
      const when = lastDataRefreshAt
        ? `Last updated ${new Date(lastDataRefreshAt).toLocaleTimeString()}`
        : "";
      els.refreshHint.textContent = [when, extra].filter(Boolean).join(" · ");
    }

    function dataPollMsForPhase(phase) {
      if (phase === "live" && auction?.auction_type === "snap") {
        const mode = snapTimerMode(auction);
        if (mode === "countup") return DATA_POLL_COUNTUP_MS;
      }
      if (phase === "live") return DATA_POLL_LIVE_MS;
      if (phase === "before_start" || phase === "ended_pending") return DATA_POLL_IDLE_MS;
      return 0;
    }

    function restartDataPoll() {
      if (dataPollInterval) {
        clearInterval(dataPollInterval);
        dataPollInterval = null;
      }
      if (!auction) return;
      const phase = auctionPhase(auction);
      const ms = dataPollMsForPhase(phase);
      if (!ms) return;
      dataPollInterval = setInterval(() => {
        refreshData({ quiet: true });
      }, ms);
    }

    let lastKnownPhase = null;
    let lastSnapTimerMode = null;

    async function render() {
      if (!auction) {
        els.emptyMsg.textContent = "No special auction is active right now.";
        els.emptyMsg.style.display = "block";
        els.content.style.display = "none";
        return;
      }

      auction = await refreshAuctionRecord(supabase, auction);

      els.emptyMsg.style.display = "none";
      els.content.style.display = "block";

      const isLub = auction.auction_type === "lowest_unique";
      const revealed =
        auction.status === "revealed" || auction.status === "settled";
      els.title.textContent = auction.title;
      els.type.textContent = isLub ? "Lowest unique bid" : "Snap auction";
      els.prize.textContent = prizeDescription(auction);

      const phase = auctionPhase(auction);
      lastKnownPhase = phase;
      els.waitingReveal.style.display = "none";
      els.winnerLine.style.display = "none";

      updateTimerOnly();

      els.rules.textContent = isLub
        ? "Submit one secret bid (nearest ₿1m). When the window ends, all bids are revealed; the lowest amount that only one club chose wins and pays that amount."
        : "Snap (~1 hour). Countdown until the final 10 minutes, then a count-up timer — auction ends at a random moment in that window. Each bid costs ₿300k and must be at least ₿500k above the current highest. Winner pays 100% of bid fees + winning bid (minus first-bid discount 20/10/5/0%). Non-winners pay 25% of bid fees. Clues unlock at 0 / 20 / 40 / 50 minutes.";

      await renderPlayerBlock();

      const bids = await fetchAuctionBids(supabase, auction.id);
      latestBids = bids || [];
      snapMinBid = isLub ? MIN_BID : snapMinimumBid(latestBids);
      const mineAll = bids.filter((b) => b.club_id === clubShort);
      const mine = mineAll.sort((a, b) => b.bid_amount - a.bid_amount)[0];

      if (revealed) {
        els.winnerLine.style.display = "block";
        if (!isLub) {
          els.winnerLine.textContent = snapWinnerSummaryText(
            auction,
            bids,
            fullClubName
          );
        } else if (auction.winning_club_id) {
          els.winnerLine.textContent =
            `Winner: ${fullClubName(auction.winning_club_id) || auction.winning_club_id} — ${formatMoney(auction.winning_amount)}`;
        } else {
          els.winnerLine.textContent =
            "No lowest unique bid — no winner this auction.";
        }
      } else if (isLub && phase === "ended_pending") {
        els.waitingReveal.style.display = "block";
        els.waitingReveal.textContent =
          "Bidding has closed. Results will appear here once the league reveals bids.";
      } else if (!isLub && phase === "ended_pending") {
        els.waitingReveal.style.display = "block";
        els.waitingReveal.textContent =
          "Snap finished — bid history below. Fees update when the league settles the auction.";
      }

      if (!clubShort) {
        els.myBidLine.textContent =
          "No club is linked to your account — you cannot bid.";
      } else if (phase === "before_start") {
        els.myBidLine.textContent =
          "Place bid will appear here when the window opens (see timer above).";
      } else if (mine && isLub) {
        const placed = formatBidTimePlain(mine.bid_time);
        els.myBidLine.textContent = placed
          ? `Your club's bid: ${formatMoney(mine.bid_amount)} (placed ${placed})`
          : `Your club's bid: ${formatMoney(mine.bid_amount)}`;
      } else if (mineAll.length && !isLub) {
        const placed = formatBidTimePlain(mine.bid_time);
        const unit = snapBidUnitFee(auction);
        els.myBidLine.textContent = placed
          ? `Your club: ${mineAll.length} bid(s), high ${formatMoney(mine.bid_amount)} (latest ${placed}) — each bid fee ${formatMoney(unit)} (pending until settle)`
          : `Your club: ${mineAll.length} bid(s), high ${formatMoney(mine.bid_amount)}`;
      } else if (isLub && phase === "live") {
        els.myBidLine.textContent = "You have not submitted a secret bid yet.";
      } else if (!isLub && phase === "live") {
        els.myBidLine.textContent = `No bids yet from your club — each bid costs ${formatMoney(snapBidUnitFee(auction))}.`;
      } else {
        els.myBidLine.textContent = "";
      }

      const canBid = phase === "live" && !!clubShort && (!isLub || !mine);
      els.openBid.style.display = canBid ? "inline-block" : "none";
      els.openBid.textContent = "Place bid";
      modalStartAmount = snapMinBid;

      await renderResults(bids);
    }

    async function refreshData({ quiet = false, manual = false } = {}) {
      if (!auction || dataRefreshInFlight) return;
      dataRefreshInFlight = true;
      if (manual && els.refreshBtn) {
        els.refreshBtn.disabled = true;
        els.refreshBtn.textContent = "Refreshing…";
      }
      try {
        await render();
        lastDataRefreshAt = Date.now();
        setRefreshHint(manual ? "Manual refresh" : quiet ? "Auto" : "");
        restartDataPoll();
      } finally {
        dataRefreshInFlight = false;
        if (els.refreshBtn) {
          els.refreshBtn.disabled = false;
          els.refreshBtn.textContent = "Refresh bids";
        }
      }
    }

    async function init() {
      await initGlobal();
      await loadClubsMap();
      const { clubShort: cs } = await loadOwnerClub(supabase);
      clubShort = cs;

      auction = await fetchActiveSpecialAuction(supabase);
      if (!auction) {
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
        if (id) auction = await fetchAuctionById(supabase, id);
      }

      await refreshData({ quiet: true });

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        updateTimerOnly();
        if (!auction) return;
        const phase = auctionPhase(auction);
        if (lastKnownPhase && phase !== lastKnownPhase) {
          lastKnownPhase = phase;
          refreshData({ quiet: true });
          return;
        }
        if (auction.auction_type === "snap") {
          const mode = snapTimerMode(auction);
          if (lastSnapTimerMode && mode !== lastSnapTimerMode) {
            lastSnapTimerMode = mode;
            restartDataPoll();
            refreshData({ quiet: true });
          } else {
            lastSnapTimerMode = mode;
          }
        }
      }, TIMER_MS);

      els.refreshBtn?.addEventListener("click", () => refreshData({ manual: true }));
    }

    init();
  </script>
</body>
</html>
