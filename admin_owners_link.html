<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Link login to club — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .card .note { color:#999; font-size:13px; line-height:1.45; margin:0 0 12px; }
    button.button.secondary { background:#444; color:#ddd; }
    button.button.secondary:hover { background:#555; }
  </style>
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Link existing login to club</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="ow-link-club">
        <h2>Link existing login to club</h2>
        <p class="note">
          For owners on break with no club, or first-time assignment to a vacant club.
          Set their <b>Discord tag</b> here so Discord NEW OWNER news shows @theirname.
        </p>
        <div class="row">
          <div><input id="linkOwnerEmail" placeholder="Existing owner email"></div>
          <div><input id="linkOwnerClub" placeholder="Club ShortName"></div>
          <div><input id="linkOwnerDiscordTag" placeholder="Discord tag / display name" autocomplete="off"></div>
        </div>
        <button id="linkOwnerBtn" class="button">Link club to account</button>
        <div id="linkOwnerStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_owners.js"></script>
</body>
</html>
