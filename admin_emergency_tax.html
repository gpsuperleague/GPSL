<!DOCTYPE html>
<html lang="en" class="admin-root">
<head>
  <meta charset="UTF-8">
  <style>html,body{background:#111;color:#ddd;margin:0}</style>
  <title>Emergency tax — GPSL Admin</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
  <div id="nav"></div>
  <h1 class="admin-title">Emergency tax</h1>
  <div id="adminLayout">
    <div class="admin-main" id="adminMain">
      <div class="card" id="sb-emergency-tax">
        <h2>Emergency tax</h2>
        <p class="note">
          Admin levy on club cash above the threshold — posts <code>gov_emergency_tax</code> to the ledger and GPSL Central Bank.
          Once per club per season when applied. Run <code>competition_wages_taxes.sql</code>.
          Other money settings remain on <a href="admin_money.html">Money management</a>.
        </p>
        <div class="row gov-subsidy-row">
          <div>
            <label>Emergency tax %</label>
            <input type="number" id="emergencyTacPct" min="0" max="100" step="0.1" style="width:80px;">
          </div>
          <div>
            <label>Emergency tax threshold (balance above)</label>
            <input type="number" id="emergencyTacThreshold" min="0" step="1000000" style="width:140px;">
          </div>
        </div>
        <div class="row" style="margin-top:12px;">
          <button type="button" id="saveEmergencyTaxBtn" class="button">Save emergency tax settings</button>
          <button type="button" id="applyEmergencyTacBtn" class="button">Apply emergency tax</button>
        </div>
        <div id="emergencyTaxStatus" class="status-line"></div>
      </div>
    </div>
  </div>
  <script type="module" src="admin_emergency_tax.js"></script>
</body>
</html>
