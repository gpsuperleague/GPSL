<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;

    h1 {

    #nav {

      margin-bottom: 16px;
    }

    a.button, button.button {
      display: inline-block;
      padding: 8px 16px;
      background: #1a1a1a;
      color: #ff9900;
      border: 1px solid #666;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 5px;
      cursor: pointer;
    }

    .page-wrap {
      width: 92%;
      max-width: 1220px;
      margin: 0 auto 40px;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin: 0 0 16px;
      line-height: 1.5;

    .toolbar {

      flex-wrap: wrap;
      align-items: center;

      margin-bottom: 16px;

    .filter-btn {

      color: #ccc;
      border: 1px solid #555;

      font-size: 13px;

    .filter-btn.active {

    table.gpsl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #1a1a1a;

    table.gpsl-table th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    table.gpsl-table td {
      border: 1px solid #333;
      padding: 8px;
      vertical-align: middle;
    }

    table.gpsl-table tr:nth-child(even) {
      background: #161616;
    }

    .gpsl-link {
      color: #6cf;
      text-decoration: none;
    }

    .gpsl-link:hover {
      text-decoration: underline;
    }

      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      background: #333;
      color: #ccc;
    }

    .type-pill.draft { background: #3d3520; color: #ffcc66; }
    .type-pill.market { background: #2a3d2a; color: #9fdf9f; }
    .type-pill.assign { background: #2a2a3d; color: #aabfff; }

    .empty {
      color: #888;
      font-style: italic;
      padding: 24px 0;
    }

    .manager-list-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .manager-list-thumb-wrap {
      width: 28px;
      height: 28px;

      width: 28px;
      height: 28px;
      border-radius: 4px;
      object-fit: cover;
    }

      width: 28px;
      height: 28px;

      <a href="MGDB.html" class="button">MGDB</a>
      <span id="seasonLabel"></span>
    </p>

    <div id="summaryBar" hidden></div>

    <div class="toolbar" id="filterBar">
      <button type="button" class="filter-btn active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="draft">Draft signings</button>
      <button type="button" class="filter-btn" data-filter="market">Market transfers</button>
      <button type="button" class="filter-btn" data-filter="assign">Direct / admin</button>
