<script>window.CURRENT_PAGE = "fixtures";</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fixtures — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background:#111; color:#ddd; font-family:Arial,sans-serif; margin:0; }
    .page-container { width:95%; max-width:1200px; margin:20px auto 40px; }
    h1 { color:#ff9900; margin-bottom:8px; }
    .meta { color:#aaa; margin-bottom:16px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; align-items:center; }
    .toolbar select, .toolbar button {
      padding:8px 12px; background:#222; border:1px solid #444; color:#ddd; border-radius:6px;
    }
    .toolbar button.active { border-color:#ff9900; color:#ff9900; }
    .matchday-block {
      background:#1a1a1a; border:1px solid #333; border-radius:8px;
      margin-bottom:16px; overflow:hidden;
    }
    .matchday-head {
      background:#222; padding:10px 14px; color:#ff9900; font-weight:bold;
      display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
    }
    table.gpsl-table { width:100%; border-collapse:collapse; }
    table.gpsl-table th, table.gpsl-table td {
      border-top:1px solid #333; padding:8px 10px; font-size:13px;
    }
    table.gpsl-table th { color:#ff9900; text-align:left; background:#1a1a1a; }
    tr.my-fixture { background:#2a2200; }
    .score { font-weight:bold; color:#fff; text-align:center; min-width:48px; }
    .weather { color:#888; font-size:12px; text-transform:capitalize; }
    .empty { color:#888; padding:24px; }
    .btn-result {
      padding:4px 10px; font-size:12px; background:#ff9900; color:#111;
      border:none; border-radius:4px; font-weight:bold; cursor:pointer;
    }
    .btn-result.secondary { background:#555; color:#eee; }
    .modal-backdrop {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
      z-index:300; align-items:center; justify-content:center;
    }
    .modal-backdrop.open { display:flex; }
    .modal-box {
      background:#1a1a1a; border:1px solid #444; border-radius:8px;
      padding:24px; width:90%; max-width:420px;
    }
    .modal-box h3 { color:#ff9900; margin:0 0 12px; }
    .modal-box label { display:block; color:#ccc; margin-bottom:4px; font-size:13px; }
    .modal-box input {
      width:100%; padding:10px; background:#222; border:1px solid #444;
      color:#ddd; border-radius:6px; box-sizing:border-box; margin-bottom:10px;
    }
    .modal-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    #modalStatus { color:#ffcc00; min-height:1.2em; font-size:13px; margin-top:8px; }
    .my-actions { text-align:center; white-space:nowrap; }
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Fixtures</h1>
    <p id="seasonMeta" class="meta">Loading…</p>
    <p id="fixturesHint" class="meta" style="margin-top:-8px;">
      Your club’s games are highlighted — use <b>Enter result</b> or go to
      <a href="matchday.html" style="color:#ff9900;">Match Day</a>.
    </p>
    <div class="toolbar" id="divisionToolbar"></div>
    <div id="fixturesRoot"></div>
  </div>

  <div id="resultModal" class="modal-backdrop">
    <div class="modal-box">
      <h3 id="modalTitle">Enter result</h3>
      <p id="modalFixtureLine" style="color:#ccc;font-size:14px;margin:0 0 12px;"></p>
      <label id="modalHomeLabel">Home goals</label>
      <input type="number" id="modalHomeGoals" min="0" max="99" value="0">
      <label id="modalAwayLabel">Away goals</label>
      <input type="number" id="modalAwayGoals" min="0" max="99" value="0">
      <div class="modal-actions">
        <button type="button" id="modalSubmitBtn" class="button" style="padding:10px 18px;background:#ff9900;color:#111;border:none;border-radius:6px;font-weight:bold;cursor:pointer;">Submit for confirmation</button>
        <button type="button" id="modalCancelBtn" class="button secondary" style="padding:10px 18px;background:#444;color:#ddd;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
      </div>
      <div id="modalStatus"></div>
    </div>
  </div>

  <script type="module" src="fixtures.js"></script>
</body>
</html>
