  window.CURRENT_PAGE = "progress";
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Competition Progress — GPSL</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { background: #111; color: #ddd; font-family: Arial, sans-serif; margin: 0; }
    .page-container { width: 95%; max-width: 1400px; margin: 20px auto 40px; }
    h1 { color: #ff9900; margin-bottom: 8px; }
    .season-meta { color: #aaa; margin-bottom: 16px; }
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px 16px;
      margin-bottom: 24px; font-size: 12px; color: #aaa;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i {
      display: inline-block; width: 12px; height: 12px; border-radius: 2px;
    }
    #tablesRoot {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .division-panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }
    .division-panel h2 {
      color: #ff9900;
      margin: 0 0 12px;
      font-size: 20px;
    }

    table.standings-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 960px;
    }
    table.standings-table col.col-pos { width: 40px; }
    table.standings-table col.col-club { width: 24%; }
    table.standings-table col.col-zone { width: 14%; }
    table.standings-table col.col-stat { width: 44px; }
    table.standings-table col.col-prize { width: 76px; }
    table.standings-table col.col-form { width: 96px; }

    table.standings-table th,
    table.standings-table td {
      border: 1px solid #333;
      padding: 7px 8px;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.standings-table th {
      background: #222;
      color: #ff9900;
      text-align: center;
      white-space: nowrap;
    }
    table.standings-table th.club-col,
    table.standings-table td.club-col {
      text-align: left;
      white-space: nowrap;
    }
    table.standings-table th.zone-col,
    table.standings-table td.zone-col {
      text-align: left;
      font-size: 11px;
      color: #bbb;
      white-space: normal;
      line-height: 1.35;
    }
    table.standings-table td.num { text-align: center; white-space: nowrap; }

    /* Zebra + zone tint (two shades per zone block) */
    table.standings-table tbody tr:nth-child(odd) td { background: #1a1a1a; }
    table.standings-table tbody tr:nth-child(even) td { background: #232323; }
    table.standings-table tbody tr.zone-super8:nth-child(odd) td { background: #1a221c; }
    table.standings-table tbody tr.zone-super8:nth-child(even) td { background: #242c26; }
    table.standings-table tbody tr.zone-plate:nth-child(odd) td { background: #1a1f26; }
    table.standings-table tbody tr.zone-plate:nth-child(even) td { background: #242a32; }
    table.standings-table tbody tr.zone-playoff:nth-child(odd) td { background: #26201a; }
    table.standings-table tbody tr.zone-playoff:nth-child(even) td { background: #302824; }
    table.standings-table tbody tr.zone-relegation:nth-child(odd) td { background: #261a1a; }
    table.standings-table tbody tr.zone-relegation:nth-child(even) td { background: #302424; }
    table.standings-table tbody tr.zone-promotion:nth-child(odd) td { background: #1a221c; }
    table.standings-table tbody tr.zone-promotion:nth-child(even) td { background: #242c26; }
    table.standings-table tbody tr.zone-playoffs:nth-child(odd) td { background: #211a26; }
    table.standings-table tbody tr.zone-playoffs:nth-child(even) td { background: #2b2430; }
    table.standings-table tbody tr.zone-shield:nth-child(odd) td { background: #1a1f26; }
    table.standings-table tbody tr.zone-shield:nth-child(even) td { background: #242a32; }
    table.standings-table tbody tr.zone-spoon:nth-child(odd) td { background: #261a1a; }
    table.standings-table tbody tr.zone-spoon:nth-child(even) td { background: #302424; }

    /* Zone boundary separators */
    table.standings-table tbody tr.zone-boundary td {
      border-top-width: 2px;
      border-top-style: solid;
      border-top-color: #555;
    }
    table.standings-table tbody tr.zone-boundary.zone-super8 td,
    table.standings-table tbody tr.zone-boundary.zone-promotion td { border-top-color: #2ecc71; }
    table.standings-table tbody tr.zone-boundary.zone-plate td,
    table.standings-table tbody tr.zone-boundary.zone-shield td { border-top-color: #3498db; }
    table.standings-table tbody tr.zone-boundary.zone-playoffs td { border-top-color: #9b59b6; }
    table.standings-table tbody tr.zone-boundary.zone-playoff td { border-top-color: #e67e22; }
    table.standings-table tbody tr.zone-boundary.zone-relegation td,
    table.standings-table tbody tr.zone-boundary.zone-spoon td { border-top-color: #c0392b; }

    /* Left accent by zone */
    table.standings-table tbody tr td:first-child {
      box-shadow: inset 4px 0 0 transparent;
    }
    table.standings-table tbody tr.zone-super8 td:first-child,
    table.standings-table tbody tr.zone-promotion td:first-child { box-shadow: inset 4px 0 0 #2ecc71; }
    table.standings-table tbody tr.zone-plate td:first-child,
    table.standings-table tbody tr.zone-shield td:first-child { box-shadow: inset 4px 0 0 #3498db; }
    table.standings-table tbody tr.zone-playoffs td:first-child { box-shadow: inset 4px 0 0 #9b59b6; }
    table.standings-table tbody tr.zone-playoff td:first-child { box-shadow: inset 4px 0 0 #e67e22; }
    table.standings-table tbody tr.zone-relegation td:first-child,
    table.standings-table tbody tr.zone-spoon td:first-child { box-shadow: inset 4px 0 0 #c0392b; }

    table.standings-table tbody tr.my-club td {
      background: #2a2418 !important;
      box-shadow: inset 0 0 0 1px #ff990066;
    }
    table.standings-table tbody tr.my-club td:first-child {
      box-shadow: inset 4px 0 0 #ff9900, inset 0 0 0 1px #ff990066;
    }

    .form-cell { letter-spacing: 2px; font-weight: bold; text-align: center; white-space: nowrap; }
    .form-w { color: #6f6; }
    .form-d { color: #aaa; }
    .form-l { color: #f66; }
    .footer-note { color: #888; font-size: 12px; margin-top: 8px; }
    .empty-msg { color: #888; padding: 20px; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="page-container">
    <h1>Competition Progress</h1>
    <p id="seasonMeta" class="season-meta">Loading…</p>
    <div id="zoneLegend" class="legend"></div>
    <div id="tablesRoot"></div>
    <p class="footer-note">
      Form shows last 10 results in <b>matchday order</b> (oldest → newest, left → right).
      Results update when fixtures are marked played via <a href="matchday.html" style="color:#ff9900;">Match Day</a>.
      <a href="fixtures.html" style="color:#ff9900;">Fixtures</a>
      · <a href="league_stats.html" style="color:#ff9900;">League stats</a>
    </p>
  </div>
  <script type="module" src="progress.js"></script>
</body>
</html>
