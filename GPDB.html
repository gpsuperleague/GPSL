<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>

  <!-- Use the same stylesheet as Dashboard -->
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <!-- ============================================
       NAVIGATION (populated after auth)
       ============================================ -->
  <div id="nav" style="margin-bottom:20px;"></div>

  <!-- ============================================
       PAGE TITLE (Dashboard style)
       ============================================ -->
  <h1 class="section-header">GPSL – Player Database</h1>

  <!-- ============================================
       FILTER PANEL (Dashboard-style panel)
       ============================================ -->
  <div class="panel">

    <!-- Clear Filters -->
    <div style="margin-bottom:16px;">
      <button id="clearFiltersBtn" class="small-btn" style="background:#ff9900;color:#111;">Clear Filters</button>
    </div>

    <!-- Market Value -->
    <h2>Market Value</h2>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
      <label>Min 
        <input type="number" id="mv-min" class="gpsl-input" style="width:100px;">
      </label>

      <label>Max 
        <input type="number" id="mv-max" class="gpsl-input" style="width:100px;">
      </label>

      <button id="applyMV" class="small-btn" style="background:#ff9900;color:#111;">Apply</button>
    </div>

    <!-- Dropdown Filters (injected by JS) -->
    <h2 style="margin-top:20px;">Filters</h2>
    <div id="filters"></div>

  </div>

  <!-- ============================================
       PLAYER TABLE PANEL
       ============================================ -->
  <div class="panel">

    <h2>Players</h2>

    <table class="gpsl-table" id="playersTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>

    <!-- Pagination -->
    <div id="pagination" style="margin-top:20px;color:#ff9900;font-weight:bold;"></div>

    <!-- Rows per page -->
    <div id="rowsPerPage" style="margin-top:20px;">
      <label>Rows per page:
        <select id="pageSizeSelect" class="gpsl-select">
          <option value="100">100</option>
          <option value="250">250</option>
          <option value="500">500</option>
          <option value="1000" selected>1000</option>
        </select>
      </label>
    </div>

  </div>

  <!-- ============================================
       GPDB LOGIC (external module)
       ============================================ -->
  <script type="module" src="gpdb_v2.js"></script>

  <!-- ============================================
       FIREBASE INITIALISATION
       ============================================ -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>

  <!-- ============================================
       AUTH + NAVIGATION LOGIC
       ============================================ -->
  <script>
    auth.onAuthStateChanged(user => {
      const nav = document.getElementById("nav");

      if (!user) {
        window.location = "login.html";
        return;
      }

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <a href="all_listings.html" class="button">Transfer List</a>
        <button onclick="logout()" class="button">Logout</button>
      `;
    });

    function logout() {
      auth.signOut().then(() => window.location = "login.html");
    }
  </script>

</body>
</html>
