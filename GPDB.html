<script>
  // CURRENT PAGE MUST BE GLOBAL FOR NAV
  window.CURRENT_PAGE = "gpdb";
</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>
  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    /* Modern nav button style */
    a.button, button.button {
      display: inline-block;
      padding: 8px 16px;
      background: #1a1a1a;
      color: #ff9900;
      border: 1px solid #666;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    a.button:hover, button.button:hover {
      background: #222;
      transform: scale(1.05);
    }

    button.button.secondary {
      background: #444;
      color: #ddd;
    }

    button.button.secondary:hover {
      background: #555;
    }

    .gpdb-callup-col {
      text-align: center;
      white-space: nowrap;
    }

    .gpdb-scout-col {
      text-align: center;
      white-space: nowrap;
    }

    button.scout-btn {
      background: transparent;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    button.scout-btn.scout-on {
      color: #ff9900;
    }

    button.call-up-btn {
      padding: 4px 8px;
      font-size: 11px;
      margin: 0;
    }

    .locked-msg {
      color: #ff9900;
      font-size: 12px;
      font-weight: bold;
    }

    #pageTitle {
      background:#222;
      color:#ff9900;
      padding:10px 16px;
      border-radius:6px;
      display:inline-block;
      margin-bottom:20px;
      font-size:24px;
      font-weight:bold;
    }

    .money {
      white-space: nowrap;
    }

    .filter-group {
      background:#1a1a1a;
      color:#ff9900;
      padding:10px 14px;
      border-radius:6px;
      margin-bottom:12px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:flex-start;
      border:1px solid #333;
    }

    .filter-group strong {
      width:100%;
      font-size:14px;
      margin-bottom:4px;
      color:#ffaa22;
    }

    input {
      background:#222;
      color:#ddd;
      border:1px solid #444;
      padding:4px 6px;
      border-radius:4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      color: #ddd;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      font-size: 13px;
      border-bottom: 2px solid #444;
      border-right: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      text-align: center;
    }

    th:last-child { border-right: none; }

    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    td {
      padding: 6px 8px;
      border-bottom: 1px solid #333;
      border-right: 1px solid #333;
      font-size: 12px;
      text-align: center;
    }

    td:last-child { border-right: none; }

    tbody tr:nth-child(odd) { background: #1f1f1f; }
    tbody tr:nth-child(even) { background: #262626; }
    tbody tr:hover { background: #333 !important; }

    #pagination {
      color: #ff9900;
      font-weight: bold;
      margin-top: 20px;
    }

    #rowsPerPage {
      margin-top: 20px;
      color: #ff9900;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
      width: 480px;
      color:#ddd;
    }

    #offerError {
      color: #ff4444;
      font-size: 12px;
      min-height: 14px;
      margin-top: 6px;
    }

    .modal-buttons {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
    }

    .player-header {
      display:flex;
      gap:15px;
      margin-bottom:15px;
    }

    .player-header img {
      width: auto;
      height: 130px;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      border: 1px solid #444;
      padding: 2px;
      display: block;
      margin: 0;
    }

    .player-header-info {
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:14px;
    }

    .bid-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
      font-size: 14px;
    }

    .bid-row label {
      color:#ff9900;
      margin-right:6px;
    }

    .inc-btn {
      padding: 6px 10px;
      margin-right: 6px;
      background:#444;
      color:#fff;
      border-radius:4px;
      cursor:pointer;
      border:1px solid #666;
      font-size:13px;
    }

    .inc-btn:hover { background:#666; }

    .dec-btn {
      padding: 6px 10px;
      margin-right: 6px;
      background:#552222;
      color:#fff;
      border-radius:4px;
      cursor:pointer;
      border:1px solid #884444;
      font-size:13px;
    }

    .dec-btn:hover { background:#773333; }

    /* Custom multi-select dropdowns */

    .multi-filter {
      position: relative;
      min-width: 180px;
    }

    .multi-filter-label {
      font-size: 12px;
      color: #ffaa22;
      margin-bottom: 2px;
    }

    .gpdb-draft-filter-tag {
      color: #ff9900;
      font-weight: bold;
    }

    .multi-filter-draft-hint {
      font-size: 11px;
      color: #aaa;
      line-height: 1.35;
      margin: -2px 0 6px 0;
      max-width: 220px;
    }

    .multi-filter-draft-hint b {
      color: #ffcc66;
    }

    .multi-filter-control {
      background:#222;
      color:#ddd;
      border:1px solid #444;
      padding:4px 8px;
      border-radius:4px;
      font-size:12px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:24px;
    }

    .multi-filter-control::after {
      content:"▾";
      font-size:10px;
      color:#888;
      margin-left:6px;
    }

    .multi-filter-panel {
      position:absolute;
      top:100%;
      left:0;
      background:#111;
      border:1px solid #444;
      border-radius:4px;
      margin-top:2px;
      max-height:260px;
      overflow:hidden;
      min-width:100%;
      z-index:50;
      display:none;
      flex-direction:column;
    }

    .multi-filter.open .multi-filter-panel {
      display:flex;
    }

    .multi-filter-search {
      width:100%;
      box-sizing:border-box;
      padding:6px 8px;
      font-size:12px;
      border:none;
      border-bottom:1px solid #444;
      background:#1a1a1a;
      color:#eee;
      flex-shrink:0;
    }

    .multi-filter-search:focus {
      outline:1px solid #ff9900;
    }

    .multi-filter-options {
      overflow:auto;
      max-height:200px;
    }

    .multi-filter-empty {
      padding:8px;
      font-size:12px;
      color:#888;
    }

    .multi-filter-option {
      display:flex;
      align-items:center;
      padding:4px 6px;
      font-size:12px;
      cursor:pointer;
    }

    .multi-filter-option:hover {
      background:#222;
    }

    .multi-filter-option input {
      margin-right:6px;
    }

    .text-filter {
      display:flex;
      flex-direction:column;
      font-size:12px;
      color:#ffaa22;
    }

    .text-filter input {
      margin-top:2px;
      font-size:12px;
    }

    /* Local start time line (same ids as dashboard) */
    #draftLocalStart {
      font-size: 12px;
      color: #ccc;
      margin-left: 2px;
    }

    .draft-timer {
      background:#1a1a1a;
      border:1px solid #666;
      padding:6px 10px;
      border-radius:6px;
      display:flex;
      align-items:center;
    }

    #draftCountdown {
      color:#ff9900;
      font-weight:bold;
      font-family:monospace;
      font-size:16px;
    }

    /* Match Dashboard Logout button */
    #logoutBtn {
      background: #cc0000 !important;
      color: #fff !important;
      border: none !important;
    }

    #logoutBtn:hover {
      background: #e60000 !important;
      transform: scale(1.05);
    }

    /* Thumbnails */
    .player-thumb {
      height: 130px;
      width: auto;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      border: 1px solid #333;
      padding: 2px;
      display: block;
      margin: 0 auto;
    }

    #make-offer-modal table tr,
    #make-offer-modal table td {
      height: auto !important;
      overflow: visible !important;
    }

    .gpdb-thumb {
      height: 70px;
      width: auto;
      object-fit: contain;
      background: #000;
      border-radius: 3px;
      border: 1px solid #333;
      padding: 1px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>

<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1 id="pageTitle">GPSL – Player Database</h1>

  <!-- Draft credits panel + dashboard-style countdown -->
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">

    <!-- Draft Credits -->
    <p id="draftCreditsPanel" class="status-note" style="margin:0;"></p>

    <!-- Dashboard-style Countdown (same ids as dashboard) -->
    <div id="draftCountdownContainer" class="draft-timer" style="flex-direction:column; align-items:flex-start;">
      <span id="draftCountdown"></span>
      <div id="draftLocalStart" style="font-size:12px; color:#ccc; margin-top:2px;"></div>
    </div>

  </div>

  <div id="controls">
    <div class="filter-group">
      <button id="clearFiltersBtn" class="button">Clear Filters</button>
      <button id="myNationFilterBtn" class="button secondary" type="button" hidden>My nation</button>
    </div>

    <p id="nationalSquadPanel" class="status-note" style="margin:0 0 12px;display:none;"></p>

    <div class="filter-group">
      <strong>Market Value</strong>

      <label>
        Min
        <input
          type="text"
          id="mv-min"
          style="width:140px; text-align:right;"
          inputmode="numeric"
          autocomplete="off"
        >
      </label>

      <label>
        Max
        <input
          type="text"
          id="mv-max"
          style="width:140px; text-align:right;"
          inputmode="numeric"
          autocomplete="off"
        >
      </label>

      <button id="applyMV" class="button">Apply</button>
    </div>

    <div class="filter-group" id="filters" style="margin-bottom:20px;">
      <strong>Filters</strong>
      <!-- JS builds all custom dropdowns + text filters here -->
    </div>

    <table id="playersTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="pagination"></div>

    <div id="rowsPerPage">
      <label>Rows per page:
        <select id="pageSizeSelect">
          <option value="100">100</option>
          <option value="250">250</option>
          <option value="500">500</option>
          <option value="1000" selected>1000</option>
        </select>
      </label>
    </div>

    <!-- MAKE OFFER MODAL -->
    <div id="make-offer-modal-backdrop" class="modal-backdrop">
      <div id="make-offer-modal" class="modal">

        <div class="player-header">
          <img id="offerPlayerImg" class="player-thumb" alt="Player">
          <div class="player-header-info">
            <div id="offerPlayerName" style="font-size:18px; color:#ff9900; font-weight:bold;"></div>
            <div id="offerPlayerPosition"></div>
            <div id="offerPlayerPlaystyle"></div>
            <div id="offerPlayerRating"></div>
            <div id="offerPlayerMV"></div>
          </div>
        </div>

        <div id="offerMinNote" class="status-note" style="margin:8px 0; font-size:12px; color:#ccc;"></div>

        <div class="bid-row">
          <label>Your Offer (₿):</label>
          <input type="text" id="offerAmount" inputmode="numeric" style="width:140px; padding:6px; border-radius:4px; border:1px solid #444; background:#111; color:#ddd; font-size:15px;">
        </div>

        <div style="margin-top:10px; text-align:center;">
          <button class="dec-btn" data-inc="-500000">-500k</button>
          <button class="dec-btn" data-inc="-1000000">-1m</button>
          <button class="dec-btn" data-inc="-5000000">-5m</button>

          <button class="inc-btn" data-inc="500000">+500k</button>
          <button class="inc-btn" data-inc="1000000">+1m</button>
          <button class="inc-btn" data-inc="5000000">+5m</button>

          <button class="button" id="quickBidBtn">Quick Bid</button>
        </div>

        <div id="offerError"></div>

        <div class="modal-buttons">
          <button class="button" id="cancelOfferBtn">Cancel</button>
          <button class="button" id="confirmOfferBtn">Submit Offer for Review</button>
        </div>

      </div>
    </div>

  </div>

  <!-- MODULES: global first, then page logic -->
  <script type="module" src="global.js"></script>
  <script type="module" src="gpdb_v2.js?v=5"></script>

</body>
</html>
