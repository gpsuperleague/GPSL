<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size: 12px;
    }
    th {
      position: sticky;
      top: 0;
      background: #f5f5f5;
      cursor: pointer;
      z-index: 1;
    }
    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    #controls {
      margin-bottom: 10px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

<h1>GPSL – Player Database</h1>

<div id="controls">
  <div>
    <label>Rows per page:
      <select id="pageSizeSelect">
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
      </select>
    </label>
  </div>

  <div>
    <strong>Market value:</strong>
    <label>Min
      <input type="number" id="mv-min" style="width:80px;">
    </label>
    <label>Max
      <input type="number" id="mv-max" style="width:80px;">
    </label>
    <button id="applyMV">Apply</button>
  </div>

  <button id="clearFiltersBtn">Clear filters</button>
</div>

<div id="filters" style="margin-bottom:20px;"></div>

<table id="playersTable">
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="pagination" style="margin-top:20px;"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabase = createClient(
    'https://omyyogfumrjoaweuawjn.supabase.co',
    'sb_publishable_CURtFl2L_eTebwwjNvm_Yw_A_D5tudt'
  )

  const COLUMNS = [
    "Name",
    "Position",
    "Nation",
    "Age",
    "Rating",
    "Playstyle",
    "Maximum_Reserve_Price",
    "market_value",
    "Contracted_Team",
    "Season_Signed"
  ]

  const DROPDOWN_COLUMNS = [
    "Nation",
    "Position",
    "Age",
    "Rating",
    "Playstyle",
    "Contracted_Team"
  ]

  let PAGE_SIZE = 1000
  let TOTAL_ROWS = 0
  let CURRENT_PAGE = 1
  let CURRENT_FILTERS = {}
  let CURRENT_SORT_COLUMN = null
  let CURRENT_SORT_DIR = 'asc'
  let MV_MIN = null
  let MV_MAX = null

  async function loadTotalCount() {
    const { count } = await supabase
      .from('Players')
      .select('*', { count: 'exact', head: true })

    TOTAL_ROWS = count
  }

  async function loadPage(page = 1) {
    CURRENT_PAGE = page

    const from = (page - 1) * PAGE_SIZE
    const to = from + PAGE_SIZE - 1

    let query = supabase
      .from('Players')
      .select(COLUMNS.join(','), { count: 'exact' })

    Object.entries(CURRENT_FILTERS).forEach(([col, value]) => {
      if (value.trim() !== "") {
        if (DROPDOWN_COLUMNS.includes(col)) {
          query = query.eq(col, value)
        } else {
          query = query.ilike(col, `%${value}%`)
        }
      }
    })

    if (MV_MIN !== null) query = query.gte("market_value", MV_MIN)
    if (MV_MAX !== null) query = query.lte("market_value", MV_MAX)

    if (CURRENT_SORT_COLUMN) {
      query = query.order(CURRENT_SORT_COLUMN, {
        ascending: CURRENT_SORT_DIR === 'asc'
      })
    }

    query = query.range(from, to)

    const { data, error, count } = await query

    if (error) {
      console.error(error)
      return
    }

    TOTAL_ROWS = count
    renderTable(data)
    renderPagination()
  }

  function renderTable(players) {
    const tableHead = document.getElementById("tableHead")
    const tableBody = document.getElementById("tableBody")

    if (!players || players.length === 0) {
      tableHead.innerHTML = "<tr><th>No data</th></tr>"
      tableBody.innerHTML = ""
      return
    }

    tableHead.innerHTML = `
      <tr>
        ${COLUMNS.map(col => {
          let cls = ""
          if (CURRENT_SORT_COLUMN === col) {
            cls = CURRENT_SORT_DIR === 'asc' ? 'sort-asc' : 'sort-desc'
          }
          return `<th data-col="${col}" class="${cls}">${col.replace(/_/g, " ")}</th>`
        }).join("")}
      </tr>
    `

    tableBody.innerHTML = players
      .map(player => `
        <tr>
          ${COLUMNS.map(col => {
            let value = player[col]

            // ⭐ Display market_value as Bitcoin, no decimals
          if (col === "market_value" && value !== null) {
            value = "₿ " + new Intl.NumberFormat("en-GB", {
              maximumFractionDigits: 0,
              minimumFractionDigits: 0
            }).format(value)
          }

            return `<td>${value}</td>`
          }).join("")}
        </tr>
      `)
      .join("")

    Array.from(tableHead.querySelectorAll("th")).forEach(th => {
      const col = th.getAttribute("data-col")
      th.onclick = () => {
        if (CURRENT_SORT_COLUMN === col) {
          CURRENT_SORT_DIR = CURRENT_SORT_DIR === 'asc' ? 'desc' : 'asc'
        } else {
          CURRENT_SORT_COLUMN = col
          CURRENT_SORT_DIR = 'asc'
        }
        loadPage(1)
      }
    })
  }

  function renderPagination() {
    const pages = Math.ceil(TOTAL_ROWS / PAGE_SIZE)
    const container = document.getElementById("pagination")

    container.innerHTML = ""

    if (pages <= 1) return

    for (let i = 1; i <= pages; i++) {
      const btn = document.createElement("button")
      btn.textContent = i
      btn.style.margin = "4px"
      btn.disabled = i === CURRENT_PAGE
      btn.onclick = () => loadPage(i)
      container.appendChild(btn)
    }
  }

async function populateDropdowns() {
  for (const col of DROPDOWN_COLUMNS) {

    // Step 1 — get total rows
    const { count } = await supabase
      .from("Players")
      .select("id", { count: "exact", head: true });

    if (!count) continue;

    // Step 2 — fetch ALL rows (bypass 1000-row limit by selecting 2 columns)
    const { data } = await supabase
      .from("Players")
      .select(`id, ${col}`)
      .range(0, count - 1);

    if (!data) continue;

    const select = document.getElementById(`filter-${col}`);

    // Step 3 — extract unique values
    const uniqueValues = [...new Set(
      data
        .map(row => row[col])
        .filter(v => v && v !== "" && v !== " ")   // remove empty strings
        .map(v => typeof v === "string" ? v.trim() : v)
    )].sort((a, b) => {
      if (typeof a === "number" && typeof b === "number") return a - b;
      return String(a).localeCompare(String(b));
    });

    // Step 4 — populate dropdown
    uniqueValues.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      select.appendChild(opt);
    });
  }
}

  function setupFilters() {
    const filtersDiv = document.getElementById("filters")

    filtersDiv.innerHTML = COLUMNS
      .map(col => {
        if (DROPDOWN_COLUMNS.includes(col)) {
          return `
            <label>${col.replace(/_/g, " ")}:
              <select id="filter-${col}">
                <option value="">All</option>
              </select>
            </label>
          `
        } else {
          return `
            <label>${col.replace(/_/g, " ")}:
              <input type="text" id="filter-${col}" placeholder="Filter ${col}">
            </label>
          `
        }
      })
      .join(" &nbsp; ")

    COLUMNS.forEach(col => {
      const el = document.getElementById(`filter-${col}`)
      el.addEventListener("change", () => {
        CURRENT_FILTERS[col] = el.value
        loadPage(1)
      })
    })
  }

  function setupControls() {
    const pageSizeSelect = document.getElementById("pageSizeSelect")
    pageSizeSelect.addEventListener("change", () => {
      PAGE_SIZE = Number(pageSizeSelect.value)
      loadPage(1)
    })

    const mvMinInput = document.getElementById("mv-min")
    const mvMaxInput = document.getElementById("mv-max")
    const applyMV = document.getElementById("applyMV")

    applyMV.addEventListener("click", () => {
      const minVal = mvMinInput.value.trim()
      const maxVal = mvMaxInput.value.trim()

      MV_MIN = minVal === "" ? null : Number(minVal)
      MV_MAX = maxVal === "" ? null : Number(maxVal)

      loadPage(1)
    })

    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      CURRENT_FILTERS = {}
      MV_MIN = null
      MV_MAX = null
      CURRENT_SORT_COLUMN = null
      CURRENT_SORT_DIR = 'asc'

      document.querySelectorAll('#filters input, #filters select').forEach(i => i.value = "")
      mvMinInput.value = ""
      mvMaxInput.value = ""

      loadPage(1)
    })
  }

  async function init() {
    setupControls()
    setupFilters()
    await populateDropdowns()
    await loadTotalCount()
    loadPage(1)
  }

  init()
</script>

</body>
</html>
