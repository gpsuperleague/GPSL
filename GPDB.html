<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>

  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    a.button, button.button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      margin: 5px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    #pageTitle {
      background:#222;
      color:#ff9900;
      padding:10px 16px;
      border-radius:6px;
      display:inline-block;
      margin-bottom:20px;
      font-size:24px;
      font-weight:bold;
    }

    .filter-group {
      background:#1a1a1a;
      color:#ff9900;
      padding:10px 14px;
      border-radius:6px;
      margin-bottom:12px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      border:1px solid #333;
    }

    .filter-group strong {
      width:100%;
      font-size:14px;
      margin-bottom:4px;
      color:#ffaa22;
    }

    input, select {
      background:#222;
      color:#ddd;
      border:1px solid #444;
      padding:4px 6px;
      border-radius:4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      color: #ddd;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    th {
      background: #222;
      color: #ff9900;
      padding: 8px;
      font-size: 13px;
      border-bottom: 2px solid #444;
      border-right: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      text-align: center;
    }

    th:last-child { border-right: none; }

    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    td {
      padding: 6px 8px;
      border-bottom: 1px solid #333;
      border-right: 1px solid #333;
      font-size: 12px;
      text-align: center;
    }

    td:last-child { border-right: none; }

    tbody tr:nth-child(odd) { background: #1f1f1f; }
    tbody tr:nth-child(even) { background: #262626; }

    tbody tr:hover { background: #333 !important; }

    #pagination {
      color: #ff9900;
      font-weight: bold;
      margin-top: 20px;
    }

    #rowsPerPage {
      margin-top: 20px;
      color: #ff9900;
    }
  </style>
</head>

<body>

  <div id="nav" style="margin-bottom:20px;"></div>

  <h1 id="pageTitle">GPSL – Player Database</h1>

  <div id="controls">
    <div class="filter-group">
      <button id="clearFiltersBtn" class="button">Clear Filters</button>
    </div>

    <div class="filter-group">
      <strong>Market Value</strong>
      <label>Min <input type="number" id="mv-min" style="width:80px;"></label>
      <label>Max <input type="number" id="mv-max" style="width:80px;"></label>
      <button id="applyMV" class="button">Apply</button>
    </div>
  </div>

  <div class="filter-group" id="filters" style="margin-bottom:20px;">
    <strong>Filters</strong>
  </div>

  <table id="playersTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div id="pagination"></div>

  <div id="rowsPerPage">
    <label>Rows per page:
      <select id="pageSizeSelect">
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
      </select>
    </label>
  </div>

  <script type="module" src="gpdb_v2.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>

  <!-- ⭐ FIXED NAV + AUTH (SAFE, DOM-READY, RACE-PROOF) -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {

    let currentUser = null;

    function logout() {
      try {
        if (window.auth) {
          auth.signOut().then(() => window.location = "login.html");
        } else {
          window.location = "login.html";
        }
      } catch (err) {
        console.error("Logout failed:", err);
        window.location = "login.html";
      }
    }

    function buildNav() {
      const nav = document.getElementById("nav");
      if (!nav) {
        console.error("NAV element missing");
        return;
      }

      nav.innerHTML = `
        <a href="index.html" class="button">Home</a>
        <a href="clubs.html" class="button">Clubs</a>
        <a href="dashboard.html" class="button">Dashboard</a>
        <a href="all_listings.html" class="button">Transfer List</a>
        <button onclick="logout()" class="button">Logout</button>
      `;

      const adminEmails = ["rotavator66@outlook.com"];
      if (currentUser && adminEmails.includes(currentUser.email)) {
        nav.innerHTML += `<a href="admin.html" class="button">GPSL Admin</a>`;
      }
    }

    function safeInit() {
      console.log("Initialising GPDB page...");
      buildNav();
    }

    try {
      if (window.auth) {
        window.auth.onAuthStateChanged(user => {
          currentUser = user;

          if (!user) {
            window.location = "login.html";
            return;
          }

          safeInit();
        });
      } else {
        console.warn("Firebase auth not found — continuing anonymously");
        safeInit();
      }
    } catch (err) {
      console.error("Auth init failed:", err);
      safeInit();
    }

  });
  </script>

</body>
</html>
