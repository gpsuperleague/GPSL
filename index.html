<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL – Home</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      max-width: 600px;
      margin-bottom: 40px;
      opacity: 0.85;
    }

    a.button, button.button {
      display: inline-block;
      padding: 14px 28px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-size: 20px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <img src="images/League/Logos/GPSL_logo.png"
       alt="GPSL Logo"
       style="width:350px; height:auto; margin-bottom:20px;">

  <p>Welcome to the GP Super League.</p>

  <div id="authButtons"></div>

  <footer>© GPSL</footer>

  <!-- Firebase (still present for now) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="firebase.js"></script>

  <!-- FIXED AUTH + BUTTON LOGIC -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {

    let currentUser = null;

    function logout() {
      try {
        if (window.auth) {
          auth.signOut().then(() => window.location = "index.html");
        } else {
          window.location = "index.html";
        }
      } catch (err) {
        console.error("Logout failed:", err);
        window.location = "index.html";
      }
    }

    function buildButtons() {
      const container = document.getElementById("authButtons");

      if (!container) return;

      if (currentUser) {
        container.innerHTML = `
          <a href="dashboard.html" class="button">Dashboard</a>
          <button onclick="logout()" class="button">Logout</button>
        `;
      } else {
        container.innerHTML = `
          <a href="login.html" class="button">Login</a>
        `;
      }
    }

    try {
      if (window.auth) {
        window.auth.onAuthStateChanged(user => {
          currentUser = user;
          buildButtons();
        });
      } else {
        console.warn("Firebase auth not found — continuing anonymously");
        currentUser = null;
        buildButtons();
      }
    } catch (err) {
      console.error("Auth init failed:", err);
      currentUser = null;
      buildButtons();
    }

  });
  </script>

</body>
</html>
