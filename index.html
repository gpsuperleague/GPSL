<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #111; color: #eee; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 8px; border-bottom: 1px solid #444; text-align: left; }
    th { cursor: pointer; background: #222; }
    tr:hover { background: #1a1a1a; }
    input, select { padding: 6px; margin-right: 10px; }
    .pagination { margin-top: 20px; }
    button { padding: 6px 12px; margin-right: 10px; }
  </style>
</head>
<body>

  <h1>Players</h1>

  <!-- Filters -->
  <div>
    <input id="searchName" placeholder="Search name">
    <input id="searchClub" placeholder="Search club">
    <input id="searchNation" placeholder="Search nation">
    <input id="minValue" type="number" placeholder="Min market value">
    <input id="maxValue" type="number" placeholder="Max market value">
    <button onclick="applyFilters()">Apply</button>
  </div>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th onclick="setSort('name')">Name</th>
        <th onclick="setSort('club')">Club</th>
        <th onclick="setSort('nation')">Nation</th>
        <th onclick="setSort('market_value')">Market Value</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Pagination -->
  <div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
  </div>

<script>
  const supabase = supabase.createClient(
    "YOUR_URL",
    "YOUR_ANON_KEY"
  );

  let page = 1;
  const pageSize = 1000;

  let sortColumn = "name";
  let sortDirection = "asc";

  let filters = {
    name: "",
    club: "",
    nation: "",
    minValue: null,
    maxValue: null
  };

  function applyFilters() {
    filters.name = document.getElementById("searchName").value.trim();
    filters.club = document.getElementById("searchClub").value.trim();
    filters.nation = document.getElementById("searchNation").value.trim();
    filters.minValue = document.getElementById("minValue").value || null;
    filters.maxValue = document.getElementById("maxValue").value || null;

    page = 1;
    loadPlayers();
  }

  function setSort(column) {
    if (sortColumn === column) {
      sortDirection = sortDirection === "asc" ? "desc" : "asc";
    } else {
      sortColumn = column;
      sortDirection = "asc";
    }
    loadPlayers();
  }

  async function loadPlayers() {
    let query = supabase.from("Players").select("*", { count: "exact" });

    // Text filters
    if (filters.name) query = query.ilike("name", `%${filters.name}%`);
    if (filters.club) query = query.ilike("club", `%${filters.club}%`);
    if (filters.nation) query = query.ilike("nation", `%${filters.nation}%`);

    // Numeric filters (server-side)
    if (filters.minValue) query = query.gte("market_value", filters.minValue);
    if (filters.maxValue) query = query.lte("market_value", filters.maxValue);

    // Sorting
    query = query.order(sortColumn, { ascending: sortDirection === "asc" });

    // Pagination
    const from = (page - 1) * pageSize;
    const to = from + pageSize - 1;
    query = query.range(from, to);

    const { data, count, error } = await query;

    if (error) {
      console.error(error);
      return;
    }

    renderTable(data);
    document.getElementById("pageInfo").textContent =
      `Page ${page} — Showing ${data.length} of ${count}`;
  }

  function renderTable(players) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    players.forEach(p => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${p.name}</td>
        <td>${p.club}</td>
        <td>${p.nation}</td>
        <td>${p.market_value.toLocaleString()}</td>
      `;
      tbody.appendChild(row);
    });
  }

  function nextPage() {
    page++;
    loadPlayers();
  }

  function prevPage() {
    if (page > 1) {
      page--;
      loadPlayers();
    }
  }

  loadPlayers();
</script>

</body>
</html>
