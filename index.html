<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL – Home</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      max-width: 600px;
      margin-bottom: 40px;
      opacity: 0.85;
    }

    a.button, button.button {
      display: inline-block;
      padding: 14px 28px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-size: 20px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    a.button:hover, button.button:hover {
      background: #ffaa22;
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <img src="images/League/Logos/GPSL_logo.png"
       alt="GPSL Logo"
       style="width:350px; height:auto; margin-bottom:20px;">

  <p>Welcome to the GP Super League.</p>

  <div id="authButtons"></div>

  <footer>© GPSL</footer>

  <!-- SUPABASE CLIENT -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://omyyogfumrjoaweuawjn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9teXlvZ2Z1bXJqb2F3ZXVhd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTUxMzUsImV4cCI6MjA5MDUzMTEzNX0.7UVkpi4DOtC9VNjFLnE_ZnK6vhDtlfesZ_8rfnrkno4"
    );

    window.supabase = supabase;

    /* AUTH BUTTON LOGIC */
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById("authButtons");

      const { data: { user } } = await supabase.auth.getUser();

      if (user) {
        container.innerHTML = `
          <a href="dashboard.html" class="button">Dashboard</a>
          <button id="logoutBtn" class="button">Logout</button>
        `;

        document.getElementById("logoutBtn").onclick = async () => {
          await supabase.auth.signOut();
          window.location = "index.html";
        };

      } else {
        container.innerHTML = `
          <a href="login.html" class="button">Login</a>
        `;
      }
    });
  </script>

</body>
</html>
