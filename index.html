<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GPSL – Home</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 24px 20px 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .league-logo {
      width: min(320px, 85vw);
      height: auto;
      margin: 0 0 16px 0;
      display: block;
    }

    .welcome {
      font-size: 20px;
      max-width: 520px;
      margin: 0;
      line-height: 1.45;
      color: #ddd;
      letter-spacing: 0.3px;
    }

    .auth-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    a.button,
    button.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      background: #ff9900;
      color: #111;
      text-decoration: none;
      font-size: 18px;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
      cursor: pointer;
      border: none;
      line-height: 1.2;
    }

    a.button:hover,
    button.button:hover {
      background: #ffaa22;
      transform: scale(1.03);
    }

    a.dashboard-entry {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 12px 22px 12px 14px;
      background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
      border: 1px solid #444;
      border-radius: 10px;
      color: #ff9900;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    a.dashboard-entry:hover {
      border-color: #ff9900;
      background: linear-gradient(135deg, #222 0%, #2a2a2a 100%);
      transform: scale(1.03);
      color: #ffcc66;
    }

    .dashboard-entry .club-badge {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
    }

    .dashboard-entry .dashboard-label {
      text-align: left;
    }

    button.button.logout {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      font-size: 16px;
      padding: 12px 22px;
    }

    button.button.logout:hover {
      background: #444;
      border-color: #777;
    }

    footer {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      font-size: 13px;
      opacity: 0.45;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="hero">
    <img
      src="images/League/Logos/GPSL_logo.png"
      alt="GPSL Logo"
      class="league-logo"
    >
    <p class="welcome">Welcome to the GP Super League.</p>
  </div>

  <div id="authButtons" class="auth-row"></div>

  <footer>© GPSL</footer>

  <script type="module" src="supabase.js"></script>

  <script type="module">
    import { loadClubsMap, fullClubName } from "./clubs_lookup.js";

    const supabase = window.supabase;

    async function resolveClubDashboard(user) {
      const { data: club, error } = await supabase
        .from("Clubs")
        .select("ShortName, Club")
        .eq("owner_id", user.id)
        .maybeSingle();

      if (error) {
        console.error("Club lookup:", error);
      }

      if (!club?.ShortName) {
        return {
          label: "GPSL Dashboard",
          badgeSrc: null,
        };
      }

      await loadClubsMap();
      const name =
        fullClubName(club.ShortName) || club.Club || club.ShortName;

      return {
        label: `${name} Dashboard`,
        badgeSrc: `images/club_badges/${club.ShortName}.png`,
      };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById("authButtons");
      const { data } = await supabase.auth.getUser();
      const user = data?.user;

      if (user) {
        const { label, badgeSrc } = await resolveClubDashboard(user);
        const badgeHtml = badgeSrc
          ? `<img class="club-badge" src="${badgeSrc}" alt="" onerror="this.style.display='none'">`
          : "";

        container.innerHTML = `
          <a href="dashboard.html" class="dashboard-entry">
            ${badgeHtml}
            <span class="dashboard-label">${label}</span>
          </a>
          <button type="button" id="logoutBtn" class="button logout">Logout</button>
        `;

        document.getElementById("logoutBtn").onclick = async () => {
          await supabase.auth.signOut();
          window.location = "index.html";
        };
      } else {
        container.innerHTML = `
          <a href="login.html" class="button">Login</a>
          <button type="button" id="resetBtn" class="button">Reset Password</button>
        `;

        document.getElementById("resetBtn").onclick = async () => {
          const email = prompt("Enter your email to reset your password");
          if (!email) return;

          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo:
              "https://gpsuperleague.github.io/GPSL/reset_password.html",
          });

          if (error) {
            alert(error.message);
          } else {
            alert("Password reset email sent.");
          }
        };
      }
    });
  </script>

</body>
</html>
