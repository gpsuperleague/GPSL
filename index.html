<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>
</head>

<body>

<h1>GPSL – Player Database</h1>

<!-- FILTERS GO HERE -->
<div id="filters" style="margin-bottom:20px;"></div>

<!-- TABLE GOES HERE -->
<table id="playersTable" border="1" cellpadding="6" style="margin-top:20px; border-collapse: collapse;">
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- PAGINATION BUTTONS -->
<div id="pagination" style="margin-top:20px;"></div>

<!-- YOUR SCRIPT -->
<script type="module">
  console.log("Script loaded")

  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabase = createClient(
    'https://omyyogfumrjoaweuawjn.supabase.co',
    'sb_publishable_CURtFl2L_eTebwwjNvm_Yw_A_D5tudt'
  )

  const PAGE_SIZE = 1000
  let TOTAL_ROWS = 0
  let CURRENT_PAGE = 1
  let CURRENT_FILTERS = {}

  async function loadTotalCount() {
    const { count } = await supabase
      .from('Players')
      .select('*', { count: 'exact', head: true })

    TOTAL_ROWS = count
    console.log("Total players:", TOTAL_ROWS)
  }

  async function loadPage(page = 1) {
    CURRENT_PAGE = page

    const from = (page - 1) * PAGE_SIZE
    const to = from + PAGE_SIZE - 1

    let query = supabase
      .from('Players')
      .select('*', { count: 'exact', head: false })   // FIXED

    Object.entries(CURRENT_FILTERS).forEach(([col, value]) => {
      if (value.trim() !== "") {
        query = query.ilike(col, `%${value}%`)
      }
    })

    query = query.range(from, to)

    const { data, error, count } = await query

    if (error) {
      console.error(error)
      return
    }

    TOTAL_ROWS = count
    renderTable(data)
    renderPagination()
  }

  function renderTable(players) {
    const tableHead = document.getElementById("tableHead")
    const tableBody = document.getElementById("tableBody")

    if (players.length === 0) {
      tableHead.innerHTML = "<tr><th>No data</th></tr>"
      tableBody.innerHTML = ""
      return
    }

    const columns = Object.keys(players[0])

    tableHead.innerHTML = `
      <tr>${columns.map(col => `<th>${col}</th>`).join("")}</tr>
    `

    tableBody.innerHTML = players
      .map(player => `
        <tr>${columns.map(col => `<td>${player[col]}</td>`).join("")}</tr>
      `)
      .join("")
  }

  function renderPagination() {
    const pages = Math.ceil(TOTAL_ROWS / PAGE_SIZE)
    const container = document.getElementById("pagination")

    container.innerHTML = ""

    for (let i = 1; i <= pages; i++) {
      const btn = document.createElement("button")
      btn.textContent = i
      btn.style.margin = "4px"
      btn.disabled = i === CURRENT_PAGE
      btn.onclick = () => loadPage(i)
      container.appendChild(btn)
    }
  }

  function setupFilters(columns) {
    const filtersDiv = document.getElementById("filters")

    filtersDiv.innerHTML = columns
      .map(col => `
        <label>${col}: 
          <input type="text" id="filter-${col}" placeholder="Filter ${col}">
        </label>
      `)
      .join("<br>")

    columns.forEach(col => {
      document.getElementById(`filter-${col}`).addEventListener("input", () => {
        CURRENT_FILTERS[col] = document.getElementById(`filter-${col}`).value
        loadPage(1)
      })
    })
  }

  async function init() {
    await loadTotalCount()

    const { data } = await supabase
      .from('Players')
      .select('*')
      .range(0, 0)

    if (data && data.length > 0) {
      setupFilters(Object.keys(data[0]))
    }

    loadPage(1)
  }

  init()
</script>

</body>
</html>
