<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size: 12px;
    }
    th {
      position: sticky;
      top: 0;
      background: #f5f5f5;
      cursor: pointer;
      z-index: 1;
    }
    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    #controls {
      margin-bottom: 10px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

<h1>GPSL – Player Database</h1>

<div id="controls">
  <div>
    <label>Rows per page:
      <select id="pageSizeSelect">
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
      </select>
    </label>
  </div>

  <div>
    <strong>Market value:</strong>
    <label>Min
      <input type="number" id="mv-min" style="width:80px;">
    </label>
    <label>Max
      <input type="number" id="mv-max" style="width:80px;">
    </label>
    <button id="applyMV">Apply</button>
  </div>

  <button id="clearFiltersBtn">Clear filters</button>
</div>

<div id="filters" style="margin-bottom:20px;"></div>

<table id="playersTable">
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="pagination" style="margin-top:20px;"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabase = createClient(
    'https://omyyogfumrjoaweuawjn.supabase.co',
    'sb_publishable_CURtFl2L_eTebwwjNvm_Yw_A_D5tudt'
  )

  let PAGE_SIZE = 1000
  let TOTAL_ROWS = 0
  let CURRENT_PAGE = 1
  let CURRENT_FILTERS = {}
  let CURRENT_SORT_COLUMN = null
  let CURRENT_SORT_DIR = 'asc'
  let MV_MIN = null
  let MV_MAX = null

  async function loadTotalCount() {
    const { count } = await supabase
      .from('Players')
      .select('*', { count: 'exact', head: true })

    TOTAL_ROWS = count
  }

  async function loadPage(page = 1) {
    CURRENT_PAGE = page

    const from = (page - 1) * PAGE_SIZE
    const to = from + PAGE_SIZE - 1

    let query = supabase
      .from('Players')
      .select('*', { count: 'exact', head: false })

    // Text filters
    Object.entries(CURRENT_FILTERS).forEach(([col, value]) => {
      if (value.trim() !== "") {
        query = query.ilike(col, `%${value}%`)
      }
    })

    // Server-side numeric filtering
    if (MV_MIN) query = query.gte("market_value", MV_MIN)
    if (MV_MAX) query = query.lte("market_value", MV_MAX)

    // Sorting
    if (CURRENT_SORT_COLUMN) {
      query = query.order(CURRENT_SORT_COLUMN, {
        ascending: CURRENT_SORT_DIR === 'asc'
      })
    }

    // Pagination
    query = query.range(from, to)

    const { data, error, count } = await query

    if (error) {
      console.error(error)
      return
    }

    TOTAL_ROWS = count
    renderTable(data)
    renderPagination()
  }

  function renderTable(players) {
    const tableHead = document.getElementById("tableHead")
    const tableBody = document.getElementById("tableBody")

    if (!players || players.length === 0) {
      tableHead.innerHTML = "<tr><th>No data</th></tr>"
      tableBody.innerHTML = ""
      return
    }

    const columns = Object.keys(players[0])

    // Header with sorting
    tableHead.innerHTML = `
      <tr>
        ${columns.map(col => {
          let cls = ""
          if (CURRENT_SORT_COLUMN === col) {
            cls = CURRENT_SORT_DIR === 'asc' ? 'sort-asc' : 'sort-desc'
          }
          return `<th data-col="${col}" class="${cls}">${col}</th>`
        }).join("")}
      </tr>
    `

    // Rows
    tableBody.innerHTML = players
      .map(player => `
        <tr>
          ${columns.map(col => `<td>${player[col]}</td>`).join("")}
        </tr>
      `)
      .join("")

    // Sorting handlers
    Array.from(tableHead.querySelectorAll("th")).forEach(th => {
      const col = th.getAttribute("data-col")
      th.onclick = () => {
        if (CURRENT_SORT_COLUMN === col) {
          CURRENT_SORT_DIR = CURRENT_SORT_DIR === 'asc' ? 'desc' : 'asc'
        } else {
          CURRENT_SORT_COLUMN = col
          CURRENT_SORT_DIR = 'asc'
        }
        loadPage(1)
      }
    })
  }

  function renderPagination() {
    const pages = Math.ceil(TOTAL_ROWS / PAGE_SIZE)
    const container = document.getElementById("pagination")

    container.innerHTML = ""

    if (pages <= 1) return

    for (let i = 1; i <= pages; i++) {
      const btn = document.createElement("button")
      btn.textContent = i
      btn.style.margin = "4px"
      btn.disabled = i === CURRENT_PAGE
      btn.onclick = () => loadPage(i)
      container.appendChild(btn)
    }
  }

  function setupFilters(columns) {
    const filtersDiv = document.getElementById("filters")

    filtersDiv.innerHTML = columns
      .map(col => `
        <label>${col}:
          <input type="text" id="filter-${col}" placeholder="Filter ${col}">
        </label>
      `)
      .join(" &nbsp; ")

    columns.forEach(col => {
      const el = document.getElementById(`filter-${col}`)
      el.addEventListener("input", () => {
        CURRENT_FILTERS[col] = el.value
        loadPage(1)
      })
    })
  }

  function setupControls() {
    const pageSizeSelect = document.getElementById("pageSizeSelect")
    pageSizeSelect.addEventListener("change", () => {
      PAGE_SIZE = Number(pageSizeSelect.value)
      loadPage(1)
    })

    const mvMinInput = document.getElementById("mv-min")
    const mvMaxInput = document.getElementById("mv-max")
    const applyMV = document.getElementById("applyMV")

    applyMV.addEventListener("click", () => {
      MV_MIN = mvMinInput.value
      MV_MAX = mvMaxInput.value
      loadPage(1)
    })

    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      CURRENT_FILTERS = {}
      MV_MIN = null
      MV_MAX = null
      CURRENT_SORT_COLUMN = null
      CURRENT_SORT_DIR = 'asc'

      document.querySelectorAll('#filters input').forEach(i => i.value = "")
      mvMinInput.value = ""
      mvMaxInput.value = ""

      loadPage(1)
    })
  }

  async function init() {
    setupControls()
    await loadTotalCount()

    const { data } = await supabase
      .from('Players')
      .select('*')
      .range(0, 0)

    if (data && data.length > 0) {
      setupFilters(Object.keys(data[0]))
    }

    loadPage(1)
  }

  init()
</script>

</body>
</html>
