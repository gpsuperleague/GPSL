<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPSL Player Database</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size: 12px;
    }
    th {
      position: sticky;
      top: 0;
      background: #f5f5f5;
      cursor: pointer;
      z-index: 1;
    }
    th.sort-asc::after { content: " ▲"; font-size: 10px; }
    th.sort-desc::after { content: " ▼"; font-size: 10px; }

    #controls {
      margin-bottom: 10px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    #info {
      margin: 10px 0;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>GPSL – Player Database</h1>

<div id="controls">
  <div>
    <label>Rows per page:
      <select id="pageSizeSelect">
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
      </select>
    </label>
  </div>

  <div>
    <strong>Market value:</strong>
    <label>Min
      <input type="number" id="mv-min" style="width:80px;">
    </label>
    <label>Max
      <input type="number" id="mv-max" style="width:80px;">
    </label>
    <button id="applyMV">Apply</button>
  </div>

  <button id="clearFiltersBtn">Clear filters</button>
</div>

<div id="info"></div>
<div id="filters" style="margin-bottom:20px;"></div>

<table id="playersTable">
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="pagination" style="margin-top:20px;"></div>

<!-- ⭐ SCRIPT MOVED TO THE BOTTOM (Option C) -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabase = createClient(
    'https://omyyogfumrjoaweuawjn.supabase.co',
    'sb_publishable_CURtFl2L_eTebwwjNvm_Yw_A_D5tudt'
  )

  const COLUMNS = [
    "Name",
    "Position",
    "Nation",
    "Age",
    "Rating",
    "Playstyle",
    "Maximum_Reserve_Price",
    "market_value",
    "Contracted_Team",
    "Season_Signed"
  ]

  let ALL_PLAYERS = []
  let FILTERED_PLAYERS = []

  let PAGE_SIZE = 1000
  let CURRENT_PAGE = 1
  let CURRENT_FILTERS = {}
  let CURRENT_SORT_COLUMN = null
  let CURRENT_SORT_DIR = 'asc'
  let MV_MIN = null
  let MV_MAX = null

  function applyAllFiltersAndSorting() {
    let data = [...ALL_PLAYERS]

    Object.entries(CURRENT_FILTERS).forEach(([col, value]) => {
      const v = value.trim().toLowerCase()
      if (!v) return
      data = data.filter(row => {
        const cell = row[col]
        return cell !== null && String(cell).toLowerCase().includes(v)
      })
    })

    if (MV_MIN !== null) data = data.filter(row => row.market_value >= MV_MIN)
    if (MV_MAX !== null) data = data.filter(row => row.market_value <= MV_MAX)

    if (CURRENT_SORT_COLUMN) {
      const col = CURRENT_SORT_COLUMN
      const dir = CURRENT_SORT_DIR === 'asc' ? 1 : -1

      data.sort((a, b) => {
        const va = a[col]
        const vb = b[col]

        if (["Age", "Rating", "market_value", "Maximum_Reserve_Price"].includes(col)) {
          return (Number(va) - Number(vb)) * dir
        }

        const sa = (va ?? "").toString().toLowerCase()
        const sb = (vb ?? "").toString().toLowerCase()
        if (sa < sb) return -1 * dir
        if (sa > sb) return 1 * dir
        return 0
      })
    }

    FILTERED_PLAYERS = data
    CURRENT_PAGE = 1
    render()
  }

  function render() {
    renderInfo()
    renderTable()
    renderPagination()
  }

  function renderInfo() {
    const info = document.getElementById("info")
    info.textContent = `Showing ${FILTERED_PLAYERS.length} players (from ${ALL_PLAYERS.length} total)`
  }

  function renderTable() {
    const tableHead = document.getElementById("tableHead")
    const tableBody = document.getElementById("tableBody")

    if (!FILTERED_PLAYERS.length) {
      tableHead.innerHTML = "<tr><th>No data</th></tr>"
      tableBody.innerHTML = ""
      return
    }

    tableHead.innerHTML = `
      <tr>
        ${COLUMNS.map(col => {
          let cls = ""
          if (CURRENT_SORT_COLUMN === col) {
            cls = CURRENT_SORT_DIR === 'asc' ? 'sort-asc' : 'sort-desc'
          }
          return `<th data-col="${col}" class="${cls}">${col.replace(/_/g, " ")}</th>`
        }).join("")}
      </tr>
    `

    const start = (CURRENT_PAGE - 1) * PAGE_SIZE
    const end = start + PAGE_SIZE
    const rows = FILTERED_PLAYERS.slice(start, end)

    tableBody.innerHTML = rows
      .map(player => `
        <tr>
          ${COLUMNS.map(col => `<td>${player[col]}</td>`).join("")}
        </tr>
      `)
      .join("")

    Array.from(tableHead.querySelectorAll("th")).forEach(th => {
      const col = th.getAttribute("data-col")
      th.onclick = () => {
        if (CURRENT_SORT_COLUMN === col) {
          CURRENT_SORT_DIR = CURRENT_SORT_DIR === 'asc' ? 'desc' : 'asc'
        } else {
          CURRENT_SORT_COLUMN = col
          CURRENT_SORT_DIR = 'asc'
        }
        applyAllFiltersAndSorting()
      }
    })
  }

  function renderPagination() {
    const container = document.getElementById("pagination")
    container.innerHTML = ""

    const pages = Math.ceil(FILTERED_PLAYERS.length / PAGE_SIZE)
    if (pages <= 1) return

    for (let i = 1; i <= pages; i++) {
      const btn = document.createElement("button")
      btn.textContent = i
      btn.style.margin = "4px"
      btn.disabled = i === CURRENT_PAGE
      btn.onclick = () => {
        CURRENT_PAGE = i
        render()
      }
      container.appendChild(btn)
    }
  }

  function setupFilters() {
    const filtersDiv = document.getElementById("filters")

    filtersDiv.innerHTML = COLUMNS
      .map(col => `
        <label>${col.replace(/_/g, " ")}:
          <input type="text" id="filter-${col}" placeholder="Filter ${col}">
        </label>
      `)
      .join(" &nbsp; ")

    COLUMNS.forEach(col => {
      const el = document.getElementById(`filter-${col}`)
      el.addEventListener("input", () => {
        CURRENT_FILTERS[col] = el.value
        applyAllFiltersAndSorting()
      })
    })
  }

  function setupControls() {
    const pageSizeSelect = document.getElementById("pageSizeSelect")
    pageSizeSelect.addEventListener("change", () => {
      PAGE_SIZE = Number(pageSizeSelect.value)
      CURRENT_PAGE = 1
      render()
    })

    const mvMinInput = document.getElementById("mv-min")
    const mvMaxInput = document.getElementById("mv-max")
    const applyMV = document.getElementById("applyMV")

    applyMV.addEventListener("click", () => {
      const minVal = mvMinInput.value.trim()
      const maxVal = mvMaxInput.value.trim()

      MV_MIN = minVal === "" ? null : Number(minVal)
      MV_MAX = maxVal === "" ? null : Number(maxVal)

      applyAllFiltersAndSorting()
    })

    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      CURRENT_FILTERS = {}
      MV_MIN = null
      MV_MAX = null
      CURRENT_SORT_COLUMN = null
      CURRENT_SORT_DIR = 'asc'

      document.querySelectorAll('#filters input').forEach(i => i.value = "")
      mvMinInput.value = ""
      mvMaxInput.value = ""

      applyAllFiltersAndSorting()
    })
  }

  async function init() {
    setupControls()
    setupFilters()

    const { data, error } = await supabase
      .from('Players')
      .select(COLUMNS.join(','))

    if (error) {
      console.error(error)
      return
    }

    ALL_PLAYERS = data || []
    FILTERED_PLAYERS = [...ALL_PLAYERS]

    render()
  }

  init()
</script>

</body>
</html>
