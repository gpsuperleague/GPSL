<div id="list-player-modal-backdrop">
  <div id="list-player-modal">
    <h3>List Player</h3>

    <div id="modalPlayerName"></div>
    <div id="modalPlayerInfo"></div>

    <div class="modal-row">
      <label>Market Value</label>
      <div id="modalMarketValue">₿ 0</div>
    </div>

    <div class="modal-row">
      <label>Max Allowed Reserve</label>
      <div id="modalMaxReserve">₿ 0</div>
    </div>

    <div class="modal-row">
      <label for="reserveInput">Reserve Price</label>
      <input type="text" id="reserveInput" inputmode="numeric">
      <div id="reserveError"></div>

      <div style="margin-top:10px;">
        <button class="dec-btn" id="dec-500k-list">-500k</button>
        <button class="dec-btn" id="dec-1m-list">-1m</button>
        <button class="dec-btn" id="dec-5m-list">-5m</button>

        <button class="inc-btn" id="inc-500k-list">+500k</button>
        <button class="inc-btn" id="inc-1m-list">+1m</button>
        <button class="inc-btn" id="inc-5m-list">+5m</button>
      </div>

      <div style="margin-top:10px;">
        <button id="useMarketValueBtn" class="button">Use Market Value</button>
        <button id="useMaxReserveBtn" class="button">Use Max Allowed Reserve</button>
      </div>
    </div>

    <div id="modalWarning">
      Listing a player is irreversible once confirmed.
    </div>

    <div class="modal-buttons">
      <button class="button" id="cancelListBtn">Cancel</button>
      <button class="button" id="confirmListBtn">Confirm Listing</button>
    </div>

  </div>
</div>
